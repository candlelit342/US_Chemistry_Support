<svg viewBox="0 0 1700 1220" xmlns="http://www.w3.org/2000/svg" role="img"><title>IB Chemistry Equilibrium Mind Map</title><rect x="0" y="0" width="1700" height="1220" fill="#ffffff"/><text x="850.0" y="42" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a" font-family="Arial, sans-serif">IB Chemistry — Equilibrium Mind Map</text><text x="850.0" y="66" text-anchor="middle" font-size="14" fill="#475569" font-family="Arial, sans-serif">HL syllabus · Reactivity 2.3 “How far? The extent of chemical change” (first exams 2025)</text><rect x="700.0" y="542.0" width="300.0" height="96.0" rx="16" ry="16" fill="#0f172a"/><text x="850" y="582" text-anchor="middle" font-size="22" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">EQUILIBRIUM</text><text x="850" y="606" text-anchor="middle" font-size="12.5" fill="#cbd5e1" font-family="Arial, sans-serif">Reactivity 2.3 — How far does a reaction go?</text><path d="M 515.0 330.0 C 607.5 330.0, 607.5 590.0, 700.0 590.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="245.0" y="306.0" width="270.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="380" y="326" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">DYNAMIC EQUILIBRIUM</text><text x="380" y="345" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.3.1</text><rect x="215.0" y="368.0" width="330.0" height="150.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="235.0" cy="393.0" r="2.8" fill="#2563eb"/><text x="245.0" y="397.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">Closed system, constant conditions</text><circle cx="235.0" cy="417.0" r="2.8" fill="#2563eb"/><text x="245.0" y="421.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">Forward rate = backward rate</text><circle cx="235.0" cy="441.0" r="2.8" fill="#2563eb"/><text x="245.0" y="445.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">Reactants &amp; products both present</text><circle cx="235.0" cy="465.0" r="2.8" fill="#2563eb"/><text x="245.0" y="469.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">Macroscopic properties stay constant</text><circle cx="235.0" cy="489.0" r="2.8" fill="#2563eb"/><text x="245.0" y="493.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">Applies to physical &amp; chemical systems</text><path d="M 515.0 590.0 C 607.5 590.0, 607.5 590.0, 700.0 590.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="245.0" y="566.0" width="270.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="380" y="586" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">THE EQUILIBRIUM LAW</text><text x="380" y="605" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.3.2</text><rect x="215.0" y="628.0" width="330.0" height="126.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="235.0" cy="653.0" r="2.8" fill="#2563eb"/><text x="245.0" y="657.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">K expression from balanced equation</text><circle cx="235.0" cy="677.0" r="2.8" fill="#2563eb"/><text x="245.0" y="681.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">Products ÷ reactants, coeffs → powers</text><circle cx="235.0" cy="701.0" r="2.8" fill="#2563eb"/><text x="245.0" y="705.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">Only homogeneous equilibria assessed</text><circle cx="235.0" cy="725.0" r="2.8" fill="#2563eb"/><text x="245.0" y="729.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">Pure solids/liquids excluded from K</text><path d="M 515.0 850.0 C 607.5 850.0, 607.5 590.0, 700.0 590.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="245.0" y="826.0" width="270.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="380" y="846" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">THE EQUILIBRIUM CONSTANT, K</text><text x="380" y="865" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.3.3</text><rect x="215.0" y="888.0" width="330.0" height="150.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="235.0" cy="913.0" r="2.8" fill="#2563eb"/><text x="245.0" y="917.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">Magnitude shows extent of reaction</text><circle cx="235.0" cy="937.0" r="2.8" fill="#2563eb"/><text x="245.0" y="941.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">K ≪ 1 → mostly reactants</text><circle cx="235.0" cy="961.0" r="2.8" fill="#2563eb"/><text x="245.0" y="965.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">K ≫ 1 → mostly products</text><circle cx="235.0" cy="985.0" r="2.8" fill="#2563eb"/><text x="245.0" y="989.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">K varies with temperature only</text><circle cx="235.0" cy="1009.0" r="2.8" fill="#2563eb"/><text x="245.0" y="1013.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">Reverse reaction: K′ = 1/K</text><path d="M 1000.0 590.0 C 1092.5 590.0, 1092.5 230.0, 1185.0 230.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1185.0" y="206.0" width="270.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="1320" y="226" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">LE CHATELIER'S PRINCIPLE</text><text x="1320" y="245" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.3.4</text><rect x="1155.0" y="268.0" width="330.0" height="150.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="1175.0" cy="293.0" r="2.8" fill="#2563eb"/><text x="1185.0" y="297.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">Predicts shifts from Δconc, ΔT, ΔP</text><circle cx="1175.0" cy="317.0" r="2.8" fill="#2563eb"/><text x="1185.0" y="321.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">Conc./pressure change: shifts only, K same</text><circle cx="1175.0" cy="341.0" r="2.8" fill="#2563eb"/><text x="1185.0" y="345.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">Temperature change: shifts AND changes K</text><circle cx="1175.0" cy="365.0" r="2.8" fill="#2563eb"/><text x="1185.0" y="369.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">Catalyst: reaches eq. faster, no shift, K same</text><circle cx="1175.0" cy="389.0" r="2.8" fill="#2563eb"/><text x="1185.0" y="393.0" font-size="13" fill="#1e3a8a" font-family="Arial, sans-serif">Also applies to heterogeneous eq., e.g. X(g)⇌X(aq)</text><path d="M 1000.0 590.0 C 1092.5 590.0, 1092.5 475.0, 1185.0 475.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1185.0" y="451.0" width="270.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1320" y="471" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">REACTION QUOTIENT, Q</text><text x="1320" y="490" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.3.5 • HL</text><rect x="1155.0" y="513.0" width="330.0" height="126.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1175.0" cy="538.0" r="2.8" fill="#7c3aed"/><text x="1185.0" y="542.0" font-size="13" fill="#4c1d95" font-family="Arial, sans-serif">Same expression as K, non-eq. concentrations</text><circle cx="1175.0" cy="562.0" r="2.8" fill="#7c3aed"/><text x="1185.0" y="566.0" font-size="13" fill="#4c1d95" font-family="Arial, sans-serif">Q &lt; K → reaction shifts forward</text><circle cx="1175.0" cy="586.0" r="2.8" fill="#7c3aed"/><text x="1185.0" y="590.0" font-size="13" fill="#4c1d95" font-family="Arial, sans-serif">Q &gt; K → reaction shifts backward</text><circle cx="1175.0" cy="610.0" r="2.8" fill="#7c3aed"/><text x="1185.0" y="614.0" font-size="13" fill="#4c1d95" font-family="Arial, sans-serif">Q = K → system at equilibrium</text><path d="M 1000.0 590.0 C 1092.5 590.0, 1092.5 735.0, 1185.0 735.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1185.0" y="711.0" width="270.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1320" y="731" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">QUANTIFYING EQUILIBRIUM</text><text x="1320" y="750" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.3.6 • HL</text><rect x="1155.0" y="773.0" width="330.0" height="150.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1175.0" cy="798.0" r="2.8" fill="#7c3aed"/><text x="1185.0" y="802.0" font-size="13" fill="#4c1d95" font-family="Arial, sans-serif">ICE-style method using K expression</text><circle cx="1175.0" cy="822.0" r="2.8" fill="#7c3aed"/><text x="1185.0" y="826.0" font-size="13" fill="#4c1d95" font-family="Arial, sans-serif">Solve for equilibrium concentrations</text><circle cx="1175.0" cy="846.0" r="2.8" fill="#7c3aed"/><text x="1185.0" y="850.0" font-size="13" fill="#4c1d95" font-family="Arial, sans-serif">If K tiny: [reactant]initial ≈ [reactant]eqm</text><circle cx="1175.0" cy="870.0" r="2.8" fill="#7c3aed"/><text x="1185.0" y="874.0" font-size="13" fill="#4c1d95" font-family="Arial, sans-serif">No quadratic equations required</text><circle cx="1175.0" cy="894.0" r="2.8" fill="#7c3aed"/><text x="1185.0" y="898.0" font-size="13" fill="#4c1d95" font-family="Arial, sans-serif">Homogeneous equilibria only</text><path d="M 1000.0 590.0 C 1092.5 590.0, 1092.5 985.0, 1185.0 985.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1185.0" y="961.0" width="270.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1320" y="981" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">GIBBS ENERGY &amp; K</text><text x="1320" y="1000" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.3.7 • HL</text><rect x="1155.0" y="1023.0" width="330.0" height="150.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1175.0" cy="1048.0" r="2.8" fill="#7c3aed"/><text x="1185.0" y="1052.0" font-size="13" fill="#4c1d95" font-family="Arial, sans-serif">ΔG⊖ = −RT ln K (data booklet)</text><circle cx="1175.0" cy="1072.0" r="2.8" fill="#7c3aed"/><text x="1185.0" y="1076.0" font-size="13" fill="#4c1d95" font-family="Arial, sans-serif">ΔG⊖ &lt; 0 → K &gt; 1 (products favoured)</text><circle cx="1175.0" cy="1096.0" r="2.8" fill="#7c3aed"/><text x="1185.0" y="1100.0" font-size="13" fill="#4c1d95" font-family="Arial, sans-serif">ΔG⊖ = 0 → K = 1</text><circle cx="1175.0" cy="1120.0" r="2.8" fill="#7c3aed"/><text x="1185.0" y="1124.0" font-size="13" fill="#4c1d95" font-family="Arial, sans-serif">ΔG⊖ &gt; 0 → K &lt; 1 (reactants favoured)</text><circle cx="1175.0" cy="1144.0" r="2.8" fill="#7c3aed"/><text x="1185.0" y="1148.0" font-size="13" fill="#4c1d95" font-family="Arial, sans-serif">Links to entropy &amp; spontaneity (Reactivity 1.4)</text><rect x="30.0" y="1150.0" width="16.0" height="16.0" rx="4" ry="4" fill="#2563eb"/><text x="54" y="1163" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">Core content (SL &amp; HL)</text><rect x="250.0" y="1150.0" width="16.0" height="16.0" rx="4" ry="4" fill="#7c3aed"/><text x="274" y="1163" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">HL only</text><text x="1670" y="1163" text-anchor="end" font-size="11" fill="#94a3b8" font-family="Arial, sans-serif">Source: IB Chemistry syllabus (ibchem.com/IB25, msjchem.com)</text></svg>