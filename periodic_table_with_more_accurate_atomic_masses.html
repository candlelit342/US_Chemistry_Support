  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    height: 100%;
    overflow: auto;
  }
  #wrap {
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: pinch-zoom pan-x pan-y;
    position: relative;
  }
  svg {
    width: 100%;
    height: 100%;
    font-family: 'Noteworthy', 'Comic Sans MS', cursive, sans-serif;
  }
  .sketch {
    fill: none;
    stroke: #1a1a1a;
    stroke-width: 2.2;
    stroke-linejoin: round;
    stroke-linecap: round;
    transition: stroke .2s ease, stroke-width .2s ease;
  }
  text {
    font-family: 'Noteworthy', 'Comic Sans MS', cursive, sans-serif;
    fill: #111;
    transition: fill .2s ease;
  }
  .atomicnum { font-size: 13px; }
  .symbol { font-size: 26px; font-weight: bold; text-anchor: middle; }
  .mass { font-size: 12.5px; text-anchor: middle; }
  .groupnum { font-size: 18px; text-anchor: middle; }
  .dagger { font-size: 20px; text-anchor: middle; }
  .title { font-size: 34px; font-weight: bold; }

  .cell {
    cursor: pointer;
    transform-box: fill-box;
    transform-origin: 50% 50%;
    transition: transform .25s ease, opacity .25s ease;
  }
  .cell.dimmed { opacity: .2; }
  .cell.highlight {
    transform: scale(1.22);
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.5));
  }
  .cell.highlight .sketch { stroke: #d9480f; stroke-width: 4; }
  .cell.highlight text { fill: #d9480f; }

  #panel {
    position: fixed;
    background: #fffdf6;
    border: 6px solid #111;
    border-radius: 30px;
    padding: 30px 120px 48px;
    text-align: center;
    box-shadow: 12px 16px 0 rgba(0,0,0,0.18);
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s ease;
    font-family: 'Noteworthy', 'Comic Sans MS', cursive, sans-serif;
    z-index: 1000;
    user-select: none;
  }
  #panel.show { opacity: 1; }
  /* default quadrant placements -- JS picks whichever corner is farthest
     from the cell currently being examined, so the banner never sits under
     the cursor */
  #panel.pos-bl { left: 26px; bottom: 26px; top: auto; right: auto; transform: rotate(-0.6deg); }
  #panel.pos-br { right: 26px; bottom: 26px; top: auto; left: auto; transform: rotate(0.6deg); }
  #panel.pos-tl { left: 26px; top: 26px; bottom: auto; right: auto; transform: rotate(-0.6deg); }
  #panel.pos-tr { right: 26px; top: 26px; bottom: auto; left: auto; transform: rotate(0.6deg); }
  #panel .p-num { font-size: 48px; color: #666; }
  #panel .p-sym { font-size: 216px; font-weight: bold; line-height: 1; color: #d9480f; }
  #panel .p-name { font-size: 72px; margin-top: 6px; }
  #panel .p-mass { font-size: 48px; color: #555; margin-top: 6px; }
  #panel .drag-handle {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 34px;
    cursor: grab;
    pointer-events: auto;
    touch-action: none;
    border-radius: 24px 24px 0 0;
  }
  #panel .drag-handle:active { cursor: grabbing; }
  #panel .drag-handle::after {
    content: '\2022\2022\2022';
    position: absolute;
    top: 4px;
    left: 50%;
    transform: translateX(-50%);
    letter-spacing: 4px;
    color: #ccc;
    font-size: 18px;
  }

  #hint {
    position: fixed;
    bottom: 14px;
    right: 20px;
    font-family: 'Noteworthy', 'Comic Sans MS', cursive, sans-serif;
    font-size: 14px;
    color: #888;
  }
</style>

<div id="panel">
  <div class="drag-handle" id="drag-handle"></div>
  <div class="p-num" id="p-num"></div>
  <div class="p-sym" id="p-sym"></div>
  <div class="p-name" id="p-name"></div>
  <div class="p-mass" id="p-mass"></div>
</div>
<div id="hint">click an element to focus &middot; drag the dots at the top of the banner to move it &middot; click again (or the background) to release</div>
</div>
<script>
(function() {
  var svg = document.getElementById('ptable');
  var cells = Array.prototype.slice.call(svg.querySelectorAll('.cell'));
  var panel = document.getElementById('panel');
  var pNum = document.getElementById('p-num');
  var pSym = document.getElementById('p-sym');
  var pName = document.getElementById('p-name');
  var pMass = document.getElementById('p-mass');
  var pinned = null;

  function showPanel(cell) {
    pNum.textContent = 'Atomic number ' + cell.getAttribute('data-z');
    pSym.textContent = cell.getAttribute('data-sym');
    pName.textContent = cell.getAttribute('data-name');
    pMass.textContent = 'Relative atomic mass ' + cell.getAttribute('data-mass');
    panel.classList.add('show');
  }
  function hidePanel() { panel.classList.remove('show'); }

  // place the banner in whichever screen quadrant is farthest from the cell
  // being examined, so it is never sitting under (or near) the cursor
  function positionPanelFor(cell) {
    var r = cell.getBoundingClientRect();
    var cx = r.left + r.width / 2;
    var cy = r.top + r.height / 2;
    var leftHalf = cx < window.innerWidth / 2;
    var topHalf = cy < window.innerHeight / 2;
    var cls;
    if (leftHalf && topHalf) cls = 'pos-br';
    else if (leftHalf && !topHalf) cls = 'pos-tr';
    else if (!leftHalf && topHalf) cls = 'pos-bl';
    else cls = 'pos-tl';
    panel.classList.remove('pos-bl', 'pos-br', 'pos-tl', 'pos-tr');
    panel.style.left = '';
    panel.style.right = '';
    panel.style.top = '';
    panel.style.bottom = '';
    panel.style.transform = '';
    panel.classList.add(cls);
  }

  function setFocus(cell) {
    cells.forEach(function(c) {
      if (c === cell) {
        c.classList.add('highlight');
        c.classList.remove('dimmed');
        c.parentNode.appendChild(c);
      } else {
        c.classList.remove('highlight');
        c.classList.add('dimmed');
      }
    });
    positionPanelFor(cell);
    showPanel(cell);
  }
  function clearFocus() {
    cells.forEach(function(c) {
      c.classList.remove('highlight');
      c.classList.remove('dimmed');
    });
    hidePanel();
  }

  // let the teacher drag the banner by its handle (the whole panel stays
  // pointer-events:none so it never blocks hovering/clicking the cell beneath it)
  var handle = document.getElementById('drag-handle');
  var dragging = false, dragOffX = 0, dragOffY = 0, everDragged = false;
  handle.addEventListener('pointerdown', function(e) {
    dragging = true;
    var rect = panel.getBoundingClientRect();
    if (!everDragged) {
      // switch from bottom/left-anchored positioning to absolute px positioning
      panel.style.left = rect.left + 'px';
      panel.style.top = rect.top + 'px';
      panel.style.bottom = 'auto';
      panel.style.transform = 'none';
      everDragged = true;
    }
    dragOffX = e.clientX - rect.left;
    dragOffY = e.clientY - rect.top;
    handle.setPointerCapture(e.pointerId);
  });
  handle.addEventListener('pointermove', function(e) {
    if (!dragging) return;
    var x = e.clientX - dragOffX;
    var y = e.clientY - dragOffY;
    x = Math.max(0, Math.min(window.innerWidth - panel.offsetWidth, x));
    y = Math.max(0, Math.min(window.innerHeight - panel.offsetHeight, y));
    panel.style.left = x + 'px';
    panel.style.top = y + 'px';
  });
  handle.addEventListener('pointerup', function() {
    dragging = false;
  });

  cells.forEach(function(cell) {
    cell.addEventListener('mouseenter', function() {
      if (pinned) return;
      setFocus(cell);
    });
    cell.addEventListener('mouseleave', function() {
      if (pinned) return;
      clearFocus();
    });
    cell.addEventListener('click', function(e) {
      e.stopPropagation();
      if (pinned === cell) {
        pinned = null;
        clearFocus();
        return;
      }
      pinned = cell;
      setFocus(cell);
    });
    cell.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        cell.dispatchEvent(new MouseEvent('click'));
      }
    });
  });

  svg.addEventListener('click', function(e) {
    if (!e.target.closest('.cell')) {
      pinned = null;
      clearFocus();
    }
  });
})();
</script>
