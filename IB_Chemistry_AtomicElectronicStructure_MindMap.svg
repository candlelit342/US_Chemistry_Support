<?xml version="1.0" encoding="UTF-8" standalone="no"?><svg viewBox="0 0 1700 1260" xmlns="http://www.w3.org/2000/svg" role="img"><title>IB Chemistry HL Atomic and Electronic Structure Mind Map</title><rect x="0" y="0" width="1700" height="1260" fill="#ffffff"/><text x="850.0" y="42" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a" font-family="Arial, sans-serif">IB Chemistry HL — Atomic &amp; Electronic Structure</text><text x="850.0" y="66" text-anchor="middle" font-size="14" fill="#475569" font-family="Arial, sans-serif">Structure 1.2 "The nuclear atom" &amp; Structure 1.3 "Electron configurations" (first exams 2025)</text><rect x="700.0" y="582.0" width="300.0" height="96.0" rx="16" ry="16" fill="#0f172a"/><text x="850" y="622" text-anchor="middle" font-size="17" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">ATOMIC &amp; ELECTRONIC</text><text x="850" y="642" text-anchor="middle" font-size="17" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">STRUCTURE</text><text x="850" y="664" text-anchor="middle" font-size="11.5" fill="#cbd5e1" font-family="Arial, sans-serif">Structure 1.2 &amp; 1.3</text><path d="M 600.0 245.0 C 650.0 245.0, 650.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="221.0" width="340.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="430" y="241" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">THE NUCLEAR ATOM &amp; ISOTOPES</text><text x="430" y="260" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 1.2.1-1.2.2</text><rect x="230.0" y="283.0" width="400.0" height="150.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="250.0" cy="308.0" r="2.8" fill="#2563eb"/><text x="260.0" y="312.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Nucleus: protons &amp; neutrons (nucleons); electrons outside</text><circle cx="250.0" cy="332.0" r="2.8" fill="#2563eb"/><text x="260.0" y="336.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Nuclear symbol ZXA gives p/n/e- counts (atoms &amp; ions)</text><circle cx="250.0" cy="356.0" r="2.8" fill="#2563eb"/><text x="260.0" y="360.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Relative masses/charges of subatomic particles (data booklet)</text><circle cx="250.0" cy="380.0" r="2.8" fill="#2563eb"/><text x="260.0" y="384.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Isotopes: same element, different neutron number</text><circle cx="250.0" cy="404.0" r="2.8" fill="#2563eb"/><text x="260.0" y="408.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Calculate relative atomic mass from isotopic abundances</text><path d="M 600.0 500.0 C 650.0 500.0, 650.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="476.0" width="340.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="430" y="496" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">EMISSION &amp; HYDROGEN SPECTRA</text><text x="430" y="515" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 1.3.1-1.3.2</text><rect x="230.0" y="538.0" width="400.0" height="150.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="250.0" cy="563.0" r="2.8" fill="#2563eb"/><text x="260.0" y="567.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Emission: photon released as an electron falls to a lower level</text><circle cx="250.0" cy="587.0" r="2.8" fill="#2563eb"/><text x="260.0" y="591.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Continuous spectrum vs line spectrum</text><circle cx="250.0" cy="611.0" r="2.8" fill="#2563eb"/><text x="260.0" y="615.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Colour/wavelength/frequency/energy across the EM spectrum</text><circle cx="250.0" cy="635.0" r="2.8" fill="#2563eb"/><text x="260.0" y="639.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">H emission spectrum: lines converge at higher energy</text><circle cx="250.0" cy="659.0" r="2.8" fill="#2563eb"/><text x="260.0" y="663.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Lines show electron transitions to n=1, 2, 3 levels</text><path d="M 600.0 755.0 C 650.0 755.0, 650.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="731.0" width="340.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="430" y="751" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">MAIN ENERGY LEVELS &amp; SUB-LEVELS</text><text x="430" y="770" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 1.3.3-1.3.4</text><rect x="230.0" y="793.0" width="400.0" height="150.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="250.0" cy="818.0" r="2.8" fill="#2563eb"/><text x="260.0" y="822.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Main level n holds a maximum of 2n^2 electrons</text><circle cx="250.0" cy="842.0" r="2.8" fill="#2563eb"/><text x="260.0" y="846.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Main level splits into s, p, d, f sub-levels</text><circle cx="250.0" cy="866.0" r="2.8" fill="#2563eb"/><text x="260.0" y="870.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Sub-level energy increases: s &amp;lt; p &amp;lt; d &amp;lt; f</text><circle cx="250.0" cy="890.0" r="2.8" fill="#2563eb"/><text x="260.0" y="894.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Shapes: s orbital (spherical), 3 p orbitals (dumbbell)</text><circle cx="250.0" cy="914.0" r="2.8" fill="#2563eb"/><text x="260.0" y="918.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Links to the periodic table's block structure</text><path d="M 600.0 1010.0 C 650.0 1010.0, 650.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="986.0" width="340.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="430" y="1006" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">ELECTRON CONFIGURATIONS - AUFBAU</text><text x="430" y="1025" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 1.3.5</text><rect x="230.0" y="1048.0" width="400.0" height="150.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="250.0" cy="1073.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1077.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Orbitals hold 2 electrons of opposite spin</text><circle cx="250.0" cy="1097.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1101.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Aufbau principle: fill lowest-energy orbitals first</text><circle cx="250.0" cy="1121.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1125.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Hund's rule: one electron per orbital before pairing</text><circle cx="250.0" cy="1145.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1149.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Pauli exclusion principle: no 2 electrons identical in an orbital</text><circle cx="250.0" cy="1169.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1173.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Full &amp; condensed configs up to Z=36; Cr and Cu exceptions</text><path d="M 1000.0 630.0 C 1050.0 630.0, 1050.0 330.0, 1100.0 330.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="306.0" width="340.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1270" y="326" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">MASS SPECTROMETRY</text><text x="1270" y="345" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 1.2.3 . HL</text><rect x="1070.0" y="368.0" width="400.0" height="126.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1090.0" cy="393.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="397.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Mass spectra show the isotopic composition of an element</text><circle cx="1090.0" cy="417.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="421.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Interpret peaks: identity &amp; relative abundance of isotopes</text><circle cx="1090.0" cy="441.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="445.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Used to calculate the relative atomic mass</text><circle cx="1090.0" cy="465.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="469.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Operational details of the instrument are not assessed</text><path d="M 1000.0 630.0 C 1050.0 630.0, 1050.0 630.0, 1100.0 630.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="606.0" width="340.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1270" y="626" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">CONVERGENCE LIMIT &amp; IONIZATION ENERGY</text><text x="1270" y="645" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 1.3.6 . HL</text><rect x="1070.0" y="668.0" width="400.0" height="126.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1090.0" cy="693.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="697.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Convergence limit (higher frequency) marks ionization</text><circle cx="1090.0" cy="717.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="721.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Calculate 1st IE from wavelength/frequency at convergence</text><circle cx="1090.0" cy="741.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="745.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Uses E=hf and c=lambda*f (data booklet; Planck constant h)</text><circle cx="1090.0" cy="765.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="769.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Explains trends &amp; discontinuities in IE across period/group</text><path d="M 1000.0 630.0 C 1050.0 630.0, 1050.0 930.0, 1100.0 930.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="906.0" width="340.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1270" y="926" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">SUCCESSIVE IONIZATION ENERGIES</text><text x="1270" y="945" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 1.3.7 . HL</text><rect x="1070.0" y="968.0" width="400.0" height="126.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1090.0" cy="993.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="997.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Successive IE data reveal an element's electron configuration</text><circle cx="1090.0" cy="1017.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="1021.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Large jumps in IE indicate a new (lower) energy level</text><circle cx="1090.0" cy="1041.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="1045.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Deduce an element's group from its successive IE pattern</text><circle cx="1090.0" cy="1065.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="1069.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Explains variable oxidation states of transition elements</text><rect x="30.0" y="1190.0" width="16.0" height="16.0" rx="4" ry="4" fill="#2563eb"/><text x="54" y="1203" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">Core content (SL &amp; HL)</text><rect x="250.0" y="1190.0" width="16.0" height="16.0" rx="4" ry="4" fill="#7c3aed"/><text x="274" y="1203" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">HL only</text><text x="1670" y="1203" text-anchor="end" font-size="11" fill="#94a3b8" font-family="Arial, sans-serif">Source: IB Chemistry syllabus (ibchem.com/IB25 — Structure 1.2.1-1.2.3, 1.3.1-1.3.7)</text></svg>