  { id:26, name:'Gunvor Raffinerie — Ingolstadt', river:'Danube', lat:48.760, lng:11.430,

    fact:'💡 Wacker produces silicon for solar panels and computer chips with a purity of 99.9999999% — nine nines. The Burghausen site is Europe\'s largest contiguous single-company chemical plant, covering 2.4 million m².' },
];

// ─────────────────────────────────────────────
// MAP INIT
// ─────────────────────────────────────────────
const map = L.map('map', { center:[51.0,10.5], zoom:6, zoomControl:true });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap contributors © CARTO', subdomains:'abcd', maxZoom:18
}).addTo(map);

// Draw rivers
Object.entries(RIVERS).forEach(([key, r]) => {
  L.polyline(r.path, { color:r.color, weight:r.weight, opacity:.75, smoothFactor:2 })
    .addTo(map)
    .bindTooltip(r.label, { sticky:true, direction:'top' });
});

// River labels on map
const riverLabelData = [
  { river:'Rhine',   pos:[50.3,7.45],  text:'Rhine' },
  { river:'Main',    pos:[50.12,9.05], text:'Main' },
  { river:'Neckar',  pos:[48.6,9.0],   text:'Neckar' },
  { river:'Ruhr',    pos:[51.44,7.6],  text:'Ruhr' },
  { river:'Lippe',   pos:[51.69,7.8],  text:'Lippe' },
  { river:'Weser',   pos:[52.3,9.0],   text:'Weser' },
  { river:'Elbe',    pos:[51.8,12.5],  text:'Elbe' },
  { river:'Saale',   pos:[51.0,11.7],  text:'Saale' },
  { river:'Oder',    pos:[52.5,14.4],  text:'Oder' },
  { river:'Danube',  pos:[48.5,10.5],  text:'Danube' },
];
riverLabelData.forEach(d => {
  const r = RIVERS[d.river];
  const icon = L.divIcon({
    className:'',
    html:`<div style="background:${r.color}22;color:${r.color};padding:2px 8px;border-radius:99px;font-size:.65rem;font-weight:700;white-space:nowrap;border:1px solid ${r.color}66;pointer-events:none">${d.text}</div>`,
    iconAnchor:[30,8]
  });
  L.marker(d.pos, { icon, interactive:false }).addTo(map);
});

// ─────────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────────
let filterIndustry = 'all';
let filterRiver = 'all';
let markers = [];
let selectedId = null;

function visibleSites() {
  return SITES.filter(s =>
    (filterIndustry === 'all' || s.type === filterIndustry) &&
    (filterRiver === 'all' || s.river === filterRiver)
  );
}

// Industry filter buttons
const indRow = document.getElementById('filter-industry');
[['all','All','#334155','#e2e8f0','#64748b'], ...Object.entries(TYPES).map(([k,t])=>[k,t.label.split(' ')[0],t.bg,t.text,t.color])].forEach(([k,lbl,bg,tc,bc])=>{
  const b=document.createElement('button');
  b.className='filter-btn'+(k==='all'?' active':'');
  b.textContent=lbl; b.style.background=bg; b.style.color=tc; b.style.borderColor=bc; b.dataset.k=k;
  b.addEventListener('click',()=>{ filterIndustry=k; document.querySelectorAll('#filter-industry .filter-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); refresh(); });
  indRow.appendChild(b);
});

// River filter buttons
const rivRow = document.getElementById('filter-river');
const riverKeys = ['all',...Object.keys(RIVERS).filter(k=>SITES.some(s=>s.river===k))];
riverKeys.forEach(k=>{
  const r = k==='all' ? {color:'#64748b',label:'All'} : RIVERS[k];
  const b=document.createElement('button');
  b.className='filter-btn'+(k==='all'?' active':'');
  b.textContent=k==='all'?'All':k; b.style.background=r.color+'22'; b.style.color=r.color; b.style.borderColor=r.color; b.dataset.k=k;
  b.addEventListener('click',()=>{ filterRiver=k; document.querySelectorAll('#filter-river .filter-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); refresh(); });
  rivRow.appendChild(b);
});

// ─────────────────────────────────────────────
// MARKER ICON
// ─────────────────────────────────────────────
function makeIcon(site) {
  const t=TYPES[site.type]; const r=RIVERS[site.river];
  return L.divIcon({
    className:'',
    html:`<div style="width:20px;height:20px;border-radius:50%;background:${t.color};border:3px solid ${r?r.color:'#fff'};box-shadow:0 0 0 2px rgba(0,0,0,.45),0 3px 8px rgba(0,0,0,.4);cursor:pointer"></div>`,
    iconAnchor:[10,10]
  });
}

// ─────────────────────────────────────────────
// POPUP
// ─────────────────────────────────────────────
function makePopup(s) {
  const t=TYPES[s.type]; const r=RIVERS[s.river]||{color:'#888',label:s.river};
  const tags=s.companies.map(c=>`<span class="popup-co-tag">${c}</span>`).join('');
  const gmapsUrl=`https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}`;
  return `<div class="popup-inner">
    <div class="popup-badges">
      <span class="popup-badge" style="background:${t.bg};color:${t.text}">${t.label}</span>
      <span class="popup-badge" style="background:${r.color}22;color:${r.color};border:1px solid ${r.color}66">${r.label}</span>
    </div>
    <div class="popup-name">${s.name}</div>
    <div class="popup-location">📍 ${s.country}</div>
    <div class="popup-co-title">Key Companies</div>
    <div style="margin-bottom:8px">${tags}</div>
    <div class="popup-activities">${s.activities}</div>
    <div class="popup-fact">${s.fact}</div>
    <a class="popup-gmaps" href="${gmapsUrl}" target="_blank" rel="noopener noreferrer">🗺 View on Google Maps</a>
  </div>`;
}

// ─────────────────────────────────────────────
// BUILD MARKERS
// ─────────────────────────────────────────────
function buildMarkers() {
  markers.forEach(m=>map.removeLayer(m.marker));
  markers=[];
  const vis=visibleSites();
  document.getElementById('count-total').textContent=vis.length;
  document.getElementById('count-desc').textContent=
    filterRiver!=='all'?`On the ${filterRiver}`:(filterIndustry!=='all'?TYPES[filterIndustry].label:'All rivers · All industry types');
  vis.forEach(s=>{
    const m=L.marker([s.lat,s.lng],{icon:makeIcon(s)});
    m.addTo(map);
    m.bindPopup(makePopup(s),{maxWidth:330});
    m.on('click',()=>selectSite(s.id,false));
    markers.push({id:s.id,marker:m});
  });
}

// ─────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────
function buildSidebar() {
  const list=document.getElementById('site-list');
  list.innerHTML='';
  const vis=visibleSites();
  // Group by river (maintain order of river keys)
  const grouped={};
  Object.keys(RIVERS).forEach(r=>{ grouped[r]=[]; });
  vis.forEach(s=>{ if(grouped[s.river]) grouped[s.river].push(s); });
  Object.entries(grouped).forEach(([rKey,sites])=>{
    if(!sites.length) return;
    const r=RIVERS[rKey];
    // River header
    const hdr=document.createElement('div');
    hdr.className='river-group-header';
    hdr.innerHTML=`<div class="river-line-swatch" style="background:${r.color}"></div><span style="color:${r.color}">${r.label}</span>`;
    list.appendChild(hdr);
    sites.forEach(s=>{
      const t=TYPES[s.type];
      const div=document.createElement('div');
      div.className='site-item';
      div.dataset.id=s.id;
      const gmapsUrl=`https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}`;
      div.innerHTML=`<div class="site-dot" style="background:${t.color}"></div><div><div class="site-item-name">${s.name}</div><div class="site-item-sub">${s.country} · ${t.label.split(' ')[0]}</div><a href="${gmapsUrl}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" style="font-size:.63rem;color:#3b82f6;text-decoration:none;display:inline-flex;align-items:center;gap:3px;margin-top:2px;opacity:.75">🗺 Maps</a></div>`;
      div.addEventListener('click',()=>selectSite(s.id,true));
      list.appendChild(div);
    });
  });
}

// ─────────────────────────────────────────────
// LEGEND
// ─────────────────────────────────────────────
function buildLegend() {
  const indEl=document.getElementById('legend-industry');
  indEl.innerHTML='';
  const indGrid=document.createElement('div'); indGrid.className='legend-grid';
  Object.entries(TYPES).forEach(([k,t])=>{
    const d=document.createElement('div'); d.className='legend-item';
    d.innerHTML=`<div class="legend-dot" style="background:${t.color}"></div><span>${t.label}</span>`;
    indGrid.appendChild(d);
  });
  indEl.appendChild(indGrid);

  const rivEl=document.getElementById('legend-rivers');
  rivEl.innerHTML='<div style="font-size:.68rem;color:#64748b;margin-bottom:5px">Line colour = river · Dot border = river</div>';
  const rivGrid=document.createElement('div'); rivGrid.className='legend-grid';
  Object.entries(RIVERS).forEach(([k,r])=>{
    if(!SITES.some(s=>s.river===k)&&k!=='Elbe'&&k!=='Rhine'&&k!=='Danube') return;
    const d=document.createElement('div'); d.className='legend-item';
    d.innerHTML=`<div class="legend-line" style="background:${r.color}"></div><span>${r.label}</span>`;
    rivGrid.appendChild(d);
  });
  rivEl.appendChild(rivGrid);
}

// ─────────────────────────────────────────────
// SELECT SITE
// ─────────────────────────────────────────────
function selectSite(id, fromSidebar) {
  selectedId=id;
  document.querySelectorAll('.site-item').forEach(el=>{
    el.classList.toggle('selected', parseInt(el.dataset.id)===id);
    if(parseInt(el.dataset.id)===id) el.scrollIntoView({block:'nearest'});
  });
  const s=SITES.find(x=>x.id===id);
  if(s){
    map.flyTo([s.lat,s.lng],11,{duration:.8});
    const m=markers.find(x=>x.id===id);
    if(m) setTimeout(()=>m.marker.openPopup(),900);
  }
}

// ─────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────
function showTab(t) {
  document.getElementById('tab-list').classList.toggle('active',t==='list');
  document.getElementById('tab-legend').classList.toggle('active',t==='legend');
  document.getElementById('site-list').style.display=t==='list'?'':'none';
  document.getElementById('legend-tab').style.display=t==='legend'?'flex':'none';
  if(t==='legend') document.getElementById('legend-tab').style.flexDirection='column';
}

// ─────────────────────────────────────────────
// REFRESH
// ─────────────────────────────────────────────
function refresh() { buildMarkers(); buildSidebar(); }

map.on('click',()=>document.querySelectorAll('.site-item').forEach(el=>el.classList.remove('selected')));

// INIT
buildLegend();
refresh();
</script>
</body>
</html>
