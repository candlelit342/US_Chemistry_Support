mily="Arial, sans-serif">pH depends on pKa/pKb &amp; acid:conjugate-base ratio</text><circle cx="1100.0" cy="1169.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="1173.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Explain the effect of dilution on buffer pH</text><rect x="30.0" y="1190.0" width="16.0" height="16.0" rx="4" ry="4" fill="#2563eb"/><text x="54" y="1203" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">Core content (SL &amp; HL)</text><rect x="250.0" y="1190.0" width="16.0" height="16.0" rx="4" ry="4" fill="#7c3aed"/><text x="274" y="1203" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">HL only</text><text x="1670" y="1203" text-anchor="end" font-size="11" fill="#94a3b8" font-family="Arial, sans-serif">Source: IB Chemistry syllabus (ibchem.com/IB25 — Reactivity 3.1.1-3.1.17)</text></svg>