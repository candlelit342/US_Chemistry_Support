<?xml version="1.0" encoding="UTF-8" standalone="no"?><svg viewBox="0 0 1700 1260" xmlns="http://www.w3.org/2000/svg" role="img"><title>IB Chemistry HL Acids and Bases Mind Map</title><rect x="0" y="0" width="1700" height="1260" fill="#ffffff"/><text x="850.0" y="42" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a" font-family="Arial, sans-serif">IB Chemistry HL — Acids and Bases</text><text x="850.0" y="66" text-anchor="middle" font-size="14" fill="#475569" font-family="Arial, sans-serif">Reactivity 3.1 "Proton transfer reactions" (first exams 2025)</text><rect x="700.0" y="582.0" width="300.0" height="96.0" rx="16" ry="16" fill="#0f172a"/><text x="850" y="622" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">ACIDS &amp; BASES</text><text x="850" y="646" text-anchor="middle" font-size="12.5" fill="#cbd5e1" font-family="Arial, sans-serif">Reactivity 3.1 — Proton transfer reactions</text><path d="M 580.0 245.0 C 640.0 245.0, 640.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="221.0" width="320.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="420" y="241" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">BRONSTED-LOWRY THEORY</text><text x="420" y="260" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 3.1.1-3.1.3</text><rect x="220.0" y="283.0" width="400.0" height="150.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="240.0" cy="308.0" r="2.8" fill="#2563eb"/><text x="250.0" y="312.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Acid = proton donor; base = proton acceptor</text><circle cx="240.0" cy="332.0" r="2.8" fill="#2563eb"/><text x="250.0" y="336.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">H+(aq) is really H3O+ (hydronium ion)</text><circle cx="240.0" cy="356.0" r="2.8" fill="#2563eb"/><text x="250.0" y="360.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Conjugate acid-base pair differs by one proton</text><circle cx="240.0" cy="380.0" r="2.8" fill="#2563eb"/><text x="250.0" y="384.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Amphiprotic species act as both acid &amp; base (e.g. HCO3-)</text><circle cx="240.0" cy="404.0" r="2.8" fill="#2563eb"/><text x="250.0" y="408.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Distinguish the terms "base" and "alkali"</text><path d="M 580.0 500.0 C 640.0 500.0, 640.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="476.0" width="320.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="420" y="496" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">THE pH SCALE &amp; Kw</text><text x="420" y="515" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 3.1.4-3.1.5</text><rect x="220.0" y="538.0" width="400.0" height="150.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="240.0" cy="563.0" r="2.8" fill="#2563eb"/><text x="250.0" y="567.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">pH = -log10[H+]; [H+] = 10^-pH (data booklet)</text><circle cx="240.0" cy="587.0" r="2.8" fill="#2563eb"/><text x="250.0" y="591.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Estimate pH with universal indicator; measure with pH probe</text><circle cx="240.0" cy="611.0" r="2.8" fill="#2563eb"/><text x="250.0" y="615.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Kw = [H+][OH-] - inverse relationship between ions</text><circle cx="240.0" cy="635.0" r="2.8" fill="#2563eb"/><text x="250.0" y="639.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Recognize acidic/neutral/basic from [H+] vs [OH-]</text><circle cx="240.0" cy="659.0" r="2.8" fill="#2563eb"/><text x="250.0" y="663.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Kw increases with temperature (endothermic ionization)</text><path d="M 580.0 755.0 C 640.0 755.0, 640.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="731.0" width="320.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="420" y="751" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">STRONG VS WEAK ACIDS &amp; BASES</text><text x="420" y="770" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 3.1.6</text><rect x="220.0" y="793.0" width="400.0" height="150.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="240.0" cy="818.0" r="2.8" fill="#2563eb"/><text x="250.0" y="822.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Difference is extent of ionization, not concentration</text><circle cx="240.0" cy="842.0" r="2.8" fill="#2563eb"/><text x="250.0" y="846.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">HCl, HBr, HI, HNO3, H2SO4 = strong acids</text><circle cx="240.0" cy="866.0" r="2.8" fill="#2563eb"/><text x="250.0" y="870.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Group 1 hydroxides = strong bases</text><circle cx="240.0" cy="890.0" r="2.8" fill="#2563eb"/><text x="250.0" y="894.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Equilibrium lies toward the weaker conjugate</text><circle cx="240.0" cy="914.0" r="2.8" fill="#2563eb"/><text x="250.0" y="918.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Distinguish strong/weak from concentrated/dilute</text><path d="M 580.0 1010.