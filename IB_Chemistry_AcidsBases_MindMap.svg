ont-family="Arial, sans-serif">pOH &amp; ACID/BASE STRENGTH</text><text x="1280" y="260" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 3.1.9-3.1.10 . HL</text><rect x="1080.0" y="283.0" width="400.0" height="126.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1100.0" cy="308.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="312.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">pOH = -log10[OH-]; [OH-]=10^-pOH (data booklet)</text><circle cx="1100.0" cy="332.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="336.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Interconvert [H+], [OH-], pH and pOH</text><circle cx="1100.0" cy="356.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="360.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Ka, Kb, pKa, pKb describe weak acid/base strength</text><circle cx="1100.0" cy="380.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="384.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Larger Ka / smaller pKa means a stronger acid</text><path d="M 1000.0 630.0 C 1060.0 630.0, 1060.0 500.0, 1120.0 500.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1120.0" y="476.0" width="320.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1280" y="496" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">Ka x Kb = Kw &amp; SALT HYDROLYSIS</text><text x="1280" y="515" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 3.1.11-3.1.12 . HL</text><rect x="1080.0" y="538.0" width="400.0" height="150.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1100.0" cy="563.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="567.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Derive Ka x Kb = Kw for a conjugate pair</text><circle cx="1100.0" cy="587.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="591.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Solve problems without needing quadratic equations</text><circle cx="1100.0" cy="611.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="615.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Salt pH depends on parent acid/base strength</text><circle cx="1100.0" cy="635.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="639.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Hydrolysis of NH4+, RCOO-, CO3(2-), HCO3-</text><circle cx="1100.0" cy="659.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="663.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Transition-metal ion / Al3+ acidity not required</text><path d="M 1000.0 630.0 C 1060.0 630.0, 1060.0 755.0, 1120.0 755.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1120.0" y="731.0" width="320.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1280" y="751" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">pH CURVES &amp; INDICATORS</text><text x="1280" y="770" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 3.1.13-3.1.15 . HL</text><rect x="1080.0" y="793.0" width="400.0" height="150.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1100.0" cy="818.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="822.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Interpret all 4 strong/weak acid-base curve combinations</text><circle cx="1100.0" cy="842.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="846.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Identify equivalence point, buffer region, pH=pKa point</text><circle cx="1100.0" cy="866.0" r="2.