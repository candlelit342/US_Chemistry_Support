<svg viewBox="0 0 1700 1220" xmlns="http://www.w3.org/2000/svg" role="img"><title>IB Chemistry Equilibrium Practical Labs Mind Map</title><rect x="0" y="0" width="1700" height="1220" fill="#ffffff"/><text x="850.0" y="42" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a" font-family="Arial, sans-serif">IB Chemistry HL — Equilibrium Practical Labs</text><text x="850.0" y="66" text-anchor="middle" font-size="14" fill="#475569" font-family="Arial, sans-serif">Laboratory experiments &amp; IA ideas for Reactivity 2.3 “How far? The extent of chemical change”</text><rect x="690.0" y="562.0" width="320.0" height="96.0" rx="16" ry="16" fill="#0f172a"/><text x="850" y="602" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">EQUILIBRIUM LABS</text><text x="850" y="626" text-anchor="middle" font-size="12.5" fill="#cbd5e1" font-family="Arial, sans-serif">Practical experiments — HL Chemistry</text><path d="M 560.0 300.0 C 625.0 300.0, 625.0 610.0, 690.0 610.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="276.0" width="300.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="410" y="296" text-anchor="middle" font-size="15.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">CONCENTRATION-SHIFT DEMOS</text><text x="410" y="315" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Le Chatelier · qualitative</text><rect x="220.0" y="338.0" width="380.0" height="150.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="240.0" cy="363.0" r="2.8" fill="#2563eb"/><text x="250.0" y="367.0" font-size="12.5" fill="#1e3a8a" font-family="Arial, sans-serif">Fe3+ + SCN- &lt;=&gt; FeSCN2+ — add/remove ions (blood-red)</text><circle cx="240.0" cy="387.0" r="2.8" fill="#2563eb"/><text x="250.0" y="391.0" font-size="12.5" fill="#1e3a8a" font-family="Arial, sans-serif">CrO4(2-) &lt;=&gt; Cr2O7(2-) — add acid/alkali (yellow &lt;=&gt; orange)</text><circle cx="240.0" cy="411.0" r="2.8" fill="#2563eb"/><text x="250.0" y="415.0" font-size="12.5" fill="#1e3a8a" font-family="Arial, sans-serif">Cu2+ + 4Cl- &lt;=&gt; CuCl4(2-) — conc. HCl/water (blue &lt;=&gt; yellow-green)</text><circle cx="240.0" cy="435.0" r="2.8" fill="#2563eb"/><text x="250.0" y="439.0" font-size="12.5" fill="#1e3a8a" font-family="Arial, sans-serif">[Co(H2O)6]2+ &lt;=&gt; [CoCl4]2- — HCl/water (pink &lt;=&gt; blue)</text><circle cx="240.0" cy="459.0" r="2.8" fill="#2563eb"/><text x="250.0" y="463.0" font-size="12.5" fill="#1e3a8a" font-family="Arial, sans-serif">[Cu(H2O)6]2+ + NH3 &lt;=&gt; [Cu(NH3)4]2+ complex</text><path d="M 560.0 610.0 C 625.0 610.0, 625.0 610.0, 690.0 610.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="586.0" width="300.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="410" y="606" text-anchor="middle" font-size="15.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">TEMPERATURE-SHIFT DEMOS</text><text x="410" y="625" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Le Chatelier · qualitative</text><rect x="220.0" y="648.0" width="380.0" height="126.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="240.0" cy="673.0" r="2.8" fill="#2563eb"/><text x="250.0" y="677.0" font-size="12.5" fill="#1e3a8a" font-family="Arial, sans-serif">N2O4(g) &lt;=&gt; 2NO2(g) — hot/cold baths (colourless &lt;=&gt; brown)</text><circle cx="240.0" cy="697.0" r="2.8" fill="#2563eb"/><text x="250.0" y="701.0" font-size="12.5" fill="#1e3a8a" font-family="Arial, sans-serif">Cobalt chloride equilibrium — also endothermic w/ heat</text><circle cx="240.0" cy="721.0" r="2.8" fill="#2563eb"/><text x="250.0" y="725.0" font-size="12.5" fill="#1e3a8a" font-family="Arial, sans-serif">ICl(l) + Cl2(g) &lt;=&gt; ICl3(s) — heated/cooled U-tube</text><circle cx="240.0" cy="745.0" r="2.8" fill="#2563eb"/><text x="250.0" y="749.0" font-size="12.5" fill="#1e3a8a" font-family="Arial, sans-serif">NH4Cl(s) &lt;=&gt; NH4+(aq) + Cl-(aq) — endothermic dissolving</text><path d="M 560.0 920.0 C 625.0 920.0, 625.0 610.0, 690.0 610.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="896.0" width="300.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="410" y="916" text-anchor="middle" font-size="15.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">PRESSURE &amp; HETEROGENEOUS EQ.</text><text x="410" y="935" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Le Chatelier · qualitative</text><rect x="220.0" y="958.0" width="380.0" height="126.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="240.0" cy="983.0" r="2.8" fill="#2563eb"/><text x="250.0" y="987.0" font-size="12.5" fill="#1e3a8a" font-family="Arial, sans-serif">CO2(g) &lt;=&gt; CO2(aq) — carbonated drink, syllabus example</text><circle cx="240.0" cy="1007.0" r="2.8" fill="#2563eb"/><text x="250.0" y="1011.0" font-size="12.5" fill="#1e3a8a" font-family="Arial, sans-serif">ICl(l) &lt;=&gt; ICl3(s) system — heterogeneous phases</text><circle cx="240.0" cy="1031.0" r="2.8" fill="#2563eb"/><text x="250.0" y="1035.0" font-size="12.5" fill="#1e3a8a" font-family="Arial, sans-serif">Rubber balloon analogy for pressure response</text><circle cx="240.0" cy="1055.0" r="2.8" fill="#2563eb"/><text x="250.0" y="1059.0" font-size="12.5" fill="#1e3a8a" font-family="Arial, sans-serif">True gas-pressure demo rare in school labs — discuss/model</text><path d="M 1010.0 610.0 C 1075.0 610.0, 1075.0 250.0, 1140.0 250.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1140.0" y="226.0" width="300.0" height="48.0" rx=