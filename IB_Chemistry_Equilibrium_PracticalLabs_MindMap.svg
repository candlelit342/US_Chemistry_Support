3.0" r="2.8" fill="#7c3aed"/><text x="1130.0" y="627.0" font-size="12.5" fill="#4c1d95" font-family="Arial, sans-serif">Measure [X] or absorbance before equilibrium reached</text><circle cx="1120.0" cy="647.0" r="2.8" fill="#7c3aed"/><text x="1130.0" y="651.0" font-size="12.5" fill="#4c1d95" font-family="Arial, sans-serif">Calculate Q, compare with known K value</text><circle cx="1120.0" cy="671.0" r="2.8" fill="#7c3aed"/><text x="1130.0" y="675.0" font-size="12.5" fill="#4c1d95" font-family="Arial, sans-serif">Predict &amp; confirm shift direction (Q&lt;K vs Q&gt;K)</text><circle cx="1120.0" cy="695.0" r="2.8" fill="#7c3aed"/><text x="1130.0" y="699.0" font-size="12.5" fill="#4c1d95" font-family="Arial, sans-serif">Track Q → K over time as system equilibrates</text><path d="M 1010.0 610.0 C 1075.0 610.0, 1075.0 870.0, 1140.0 870.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1140.0" y="846.0" width="300.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1290" y="866" text-anchor="middle" font-size="15.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">IA EXTENSION IDEAS</text><text x="1290" y="885" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Quantitative · HL</text><rect x="1100.0" y="908.0" width="380.0" height="126.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1120.0" cy="933.0" r="2.8" fill="#7c3aed"/><text x="1130.0" y="937.0" font-size="12.5" fill="#4c1d95" font-family="Arial, sans-serif">Kc vs temperature → find ΔH (van't Hoff-style plot)</text><circle cx="1120.0" cy="957.0" r="2.8" fill="#7c3aed"/><text x="1130.0" y="961.0" font-size="12.5" fill="#4c1d95" font-family="Arial, sans-serif">Combine with ΔG⊖=−RT ln K to estimate ΔS⊖</text><circle cx="1120.0" cy="981.0" r="2.8" fill="#7c3aed"/><text x="1130.0" y="985.0" font-size="12.5" fill="#4c1d95" font-family="Arial, sans-serif"