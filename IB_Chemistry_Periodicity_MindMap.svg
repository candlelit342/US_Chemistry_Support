<?xml version="1.0" encoding="UTF-8" standalone="no"?><svg viewBox="0 0 1700 1260" xmlns="http://www.w3.org/2000/svg" role="img"><title>IB Chemistry HL Periodicity Mind Map</title><rect x="0" y="0" width="1700" height="1260" fill="#ffffff"/><text x="850.0" y="42" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a" font-family="Arial, sans-serif">IB Chemistry HL — Periodicity</text><text x="850.0" y="66" text-anchor="middle" font-size="14" fill="#475569" font-family="Arial, sans-serif">Structure 3.1 "The periodic table: Classification of elements" (first exams 2025)</text><rect x="700.0" y="582.0" width="300.0" height="96.0" rx="16" ry="16" fill="#0f172a"/><text x="850" y="622" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">PERIODICITY</text><text x="850" y="646" text-anchor="middle" font-size="12" fill="#cbd5e1" font-family="Arial, sans-serif">Structure 3.1 — The periodic table</text><path d="M 600.0 245.0 C 650.0 245.0, 650.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="221.0" width="340.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="430" y="241" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">STRUCTURE OF THE PERIODIC TABLE</text><text x="430" y="260" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 3.1.1-3.1.2</text><rect x="230.0" y="283.0" width="400.0" height="150.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="250.0" cy="308.0" r="2.8" fill="#2563eb"/><text x="260.0" y="312.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Arranged by periods, groups &amp; blocks (s, p, d, f)</text><circle cx="250.0" cy="332.0" r="2.8" fill="#2563eb"/><text x="260.0" y="336.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Groups numbered 1-18; period = outer energy level</text><circle cx="250.0" cy="356.0" r="2.8" fill="#2563eb"/><text x="260.0" y="360.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Elements in a group share the number of valence electrons</text><circle cx="250.0" cy="380.0" r="2.8" fill="#2563eb"/><text x="260.0" y="384.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Deduce electron configuration from position (up to Z=36)</text><circle cx="250.0" cy="404.0" r="2.8" fill="#2563eb"/><text x="260.0" y="408.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Know: alkali metals, halogens, transition elements, noble gases</text><path d="M 600.0 500.0 C 650.0 500.0, 650.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="476.0" width="340.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="430" y="496" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">PERIODICITY TRENDS</text><text x="430" y="515" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 3.1.3</text><rect x="230.0" y="538.0" width="400.0" height="126.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="250.0" cy="563.0" r="2.8" fill="#2563eb"/><text x="260.0" y="567.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Atomic radius, ionic radius trends across period/down group</text><circle cx="250.0" cy="587.0" r="2.8" fill="#2563eb"/><text x="260.0" y="591.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Ionization energy, electron affinity trends</text><circle cx="250.0" cy="611.0" r="2.8" fill="#2563eb"/><text x="260.0" y="615.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Electronegativity trend across period and down a group</text><circle cx="250.0" cy="635.0" r="2.8" fill="#2563eb"/><text x="260.0" y="639.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">"Periodicity" = repeating property trends</text><path d="M 600.0 755.0 C 650.0 755.0, 650.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="731.0" width="340.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="430" y="751" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">GROUP TRENDS &amp; REACTIVITY</text><text x="430" y="770" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 3.1.4</text><rect x="230.0" y="793.0" width="400.0" height="126.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="250.0" cy="818.0" r="2.8" fill="#2563eb"/><text x="260.0" y="822.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Group 1: increasing metallic character down the group</text><circle cx="250.0" cy="842.0" r="2.8" fill="#2563eb"/><text x="260.0" y="846.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Group 1 metals + water -&gt; increasingly vigorous reaction</text><circle cx="250.0" cy="866.0" r="2.8" fill="#2563eb"/><text x="260.0" y="870.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Group 17: decreasing non-metallic character down the group</text><circle cx="250.0" cy="890.0" r="2.8" fill="#2563eb"/><text x="260.0" y="894.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Halogens + halide ions: displacement reactions</text><path d="M 600.0 1010.0 C 650.0 1010.0, 650.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="986.0" width="340.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="430" y="1006" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">OXIDATION STATES &amp; OXIDES</text><text x="430" y="1025" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 3.1.5-3.1.6</text><rect x="230.0" y="1048.0" width="400.0" height="150.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="250.0" cy="1073.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1077.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Metal/non-metal character is a continuum of oxides</text><circle cx="250.0" cy="1097.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1101.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Basic (metal) -&gt; amphoteric -&gt; acidic (non-metal) oxides</text><circle cx="250.0" cy="1121.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1125.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Acid rain (SO2/NOx) &amp; ocean acidification (CO2) linked</text><circle cx="250.0" cy="1145.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1149.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Oxidation state = charge if the compound were fully ionic</text><circle cx="250.0" cy="1169.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1173.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Oxidation state of an element (uncombined) is zero</text><path d="M 1000.0 630.0 C 1050.0 630.0, 1050.0 245.0, 1100.0 245.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="221.0" width="340.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1270" y="241" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">1st IE DISCONTINUITIES</text><text x="1270" y="260" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 3.1.7 . HL</text><rect x="1070.0" y="283.0" width="400.0" height="126.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1090.0" cy="308.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="312.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Discontinuities appear in the rising 1st IE across a period</text><circle cx="1090.0" cy="332.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="336.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Provide evidence for energy sublevels (s, p, d, f)</text><circle cx="1090.0" cy="356.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="360.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Explained by the electron's own energy, not "special stability"</text><circle cx="1090.0" cy="380.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="384.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Links electron configuration to periodic trends</text><path d="M 1000.0 630.0 C 1050.0 630.0, 1050.0 500.0, 1100.0 500.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="476.0" width="340.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1270" y="496" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">TRANSITION ELEMENTS - PROPERTIES</text><text x="1270" y="515" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 3.1.8 . HL</text><rect x="1070.0" y="538.0" width="400.0" height="150.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1090.0" cy="563.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="567.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Incomplete d-sublevels give characteristic properties</text><circle cx="1090.0" cy="587.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="591.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Variable oxidation states</text><circle cx="1090.0" cy="611.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="615.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">High melting points; magnetic properties</text><circle cx="1090.0" cy="635.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="639.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Catalytic properties</text><circle cx="1090.0" cy="659.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="663.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Coloured compounds &amp; complex ions with ligands</text><path d="M 1000.0 630.0 C 1050.0 630.0, 1050.0 755.0, 1100.0 755.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="731.0" width="340.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1270" y="751" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">VARIABLE OXIDATION STATES</text><text x="1270" y="770" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 3.1.9 . HL</text><rect x="1070.0" y="793.0" width="400.0" height="126.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1090.0" cy="818.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="822.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Explained by close successive ionization energies</text><circle cx="1090.0" cy="842.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="846.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Deduce electron configurations of 1st-row transition ions</text><circle cx="1090.0" cy="866.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="870.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">4s electrons removed before 3d when forming ions</text><circle cx="1090.0" cy="890.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="894.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Debate: is scandium a true transition element?</text><path d="M 1000.0 630.0 C 1050.0 630.0, 1050.0 1010.0, 1100.0 1010.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="986.0" width="340.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1270" y="1006" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">TRANSITION COMPLEXES &amp; COLOUR</text><text x="1270" y="1025" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 3.1.10 . HL</text><rect x="1070.0" y="1048.0" width="400.0" height="150.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1090.0" cy="1073.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="1077.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">d-sublevel splits in a complex; electron promotion absorbs light</text><circle cx="1090.0" cy="1097.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="1101.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Observed colour is complementary to the absorbed colour</text><circle cx="1090.0" cy="1121.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="1125.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Apply colour wheel + c=lambda*f (data booklet)</text><circle cx="1090.0" cy="1145.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="1149.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Splitting patterns vs coordination number not required</text><circle cx="1090.0" cy="1169.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="1173.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Colorimetry/spectrophotometry finds [coloured ion]</text><rect x="30.0" y="1190.0" width="16.0" height="16.0" rx="4" ry="4" fill="#2563eb"/><text x="54" y="1203" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">Core content (SL &amp; HL)</text><r