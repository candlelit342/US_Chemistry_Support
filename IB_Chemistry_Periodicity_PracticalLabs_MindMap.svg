<?xml version="1.0" encoding="UTF-8" standalone="no"?><svg viewBox="0 0 1700 1260" xmlns="http://www.w3.org/2000/svg" role="img"><title>IB Chemistry HL Periodicity Practical Labs Mind Map</title><rect x="0" y="0" width="1700" height="1260" fill="#ffffff"/><text x="850.0" y="42" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a" font-family="Arial, sans-serif">IB Chemistry HL — Periodicity Practical Labs</text><text x="850.0" y="66" text-anchor="middle" font-size="14" fill="#475569" font-family="Arial, sans-serif">Laboratory experiments &amp; IA ideas for Structure 3.1 "The periodic table: Classification of elements"</text><rect x="700.0" y="582.0" width="300.0" height="96.0" rx="16" ry="16" fill="#0f172a"/><text x="850" y="622" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">PERIODICITY LABS</text><text x="850" y="646" text-anchor="middle" font-size="12" fill="#cbd5e1" font-family="Arial, sans-serif">Practical experiments — HL Chemistry</text><path d="M 600.0 245.0 C 650.0 245.0, 650.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="221.0" width="340.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="430" y="241" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">FLAME TESTS &amp; ION IDENTIFICATION</text><text x="430" y="260" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Qualitative</text><rect x="230.0" y="283.0" width="400.0" height="126.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="250.0" cy="308.0" r="2.8" fill="#2563eb"/><text x="260.0" y="312.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Dip nichrome wire in HCl, then metal salt, into flame</text><circle cx="250.0" cy="332.0" r="2.8" fill="#2563eb"/><text x="260.0" y="336.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Li=red, Na=yellow, K=lilac, Ca=orange-red, Cu=blue-green</text><circle cx="250.0" cy="356.0" r="2.8" fill="#2563eb"/><text x="260.0" y="360.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Links flame colour to electron transitions (emission)</text><circle cx="250.0" cy="380.0" r="2.8" fill="#2563eb"/><text x="260.0" y="384.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Used to identify unknown metal ions in a sample</text><path d="M 600.0 500.0 C 650.0 500.0, 650.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="476.0" width="340.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="430" y="496" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">GROUP 1 REACTIVITY INVESTIGATIONS</text><text x="430" y="515" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Qualitative</text><rect x="230.0" y="538.0" width="400.0" height="126.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="250.0" cy="563.0" r="2.8" fill="#2563eb"/><text x="260.0" y="567.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Li, Na, K + water: increasing vigour down the group</text><circle cx="250.0" cy="587.0" r="2.8" fill="#2563eb"/><text x="260.0" y="591.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Measure rate of H2 evolution or time to react</text><circle cx="250.0" cy="611.0" r="2.8" fill="#2563eb"/><text x="260.0" y="615.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Safety: small pieces, safety screen; K reacts violently</text><circle cx="250.0" cy="635.0" r="2.8" fill="#2563eb"/><text x="260.0" y="639.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Universal indicator shows an increasingly alkaline product</text><path d="M 600.0 755.0 C 650.0 755.0, 650.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="731.0" width="340.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="430" y="751" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">GROUP 17 REACTIVITY &amp; DISPLACEMENT</text><text x="430" y="770" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Qualitative</text><rect x="230.0" y="793.0" width="400.0" height="126.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="250.0" cy="818.0" r="2.8" fill="#2563eb"/><text x="260.0" y="822.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Cl2(aq)/Br2(aq)/I2(aq) + halide solutions (KBr, KI)</text><circle cx="250.0" cy="842.0" r="2.8" fill="#2563eb"/><text x="260.0" y="846.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Colour change confirms displacement of the weaker halogen</text><circle cx="250.0" cy="866.0" r="2.8" fill="#2563eb"/><text x="260.0" y="870.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Add hexane to see the halogen colour more clearly</text><circle cx="250.0" cy="890.0" r="2.8" fill="#2563eb"/><text x="260.0" y="894.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Deduce reactivity order: F2 &gt; Cl2 &gt; Br2 &gt; I2</text><path d="M 600.0 1010.0 C 650.0 1010.0, 650.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="986.0" width="340.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="430" y="1006" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">OXIDE ACIDITY/BASICITY TREND</text><text x="430" y="1025" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Period 3 oxides</text><rect x="230.0" y="1048.0" width="400.0" height="126.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="250.0" cy="1073.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1077.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Dissolve/react Period 3 oxides (Na2O to SO3) in water</text><circle cx="250.0" cy="1097.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1101.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Test the resulting solution with universal indicator</text><circle cx="250.0" cy="1121.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1125.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Trend: basic -&gt; amphoteric (Al2O3) -&gt; acidic oxides</text><circle cx="250.0" cy="1145.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1149.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Links oxide bonding type to acid-base behaviour</text><path d="M 1000.0 630.0 C 1050.0 630.0, 1050.0 245.0, 1100.0 245.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="221.0" width="340.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1270" y="241" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">COMPLEX COLOUR &amp; COLORIMETRY</text><text x="1270" y="260" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 3.1.10 . HL</text><rect x="1070.0" y="283.0" width="400.0" height="150.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1090.0" cy="308.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="312.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Measure absorbance of Cu2+, Co2+, Ni2+, Fe3+ solutions</text><circle cx="1090.0" cy="332.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="336.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Colorimeter/spectrophotometer + calibration curve</text><circle cx="1090.0" cy="356.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="360.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Apply colour wheel: absorbed vs observed colour</text><circle cx="1090.0" cy="380.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="384.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Use c=lambda*f to find the frequency of light absorbed</text><circle cx="1090.0" cy="404.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="408.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Determine [coloured ion] from absorbance data</text><path d="M 1000.0 630.0 C 1050.0 630.0, 1050.0 500.0, 1100.0 500.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="476.0" width="340.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1270" y="496" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">VARIABLE OXIDATION STATE DEMOS</text><text x="1270" y="515" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 3.1.9 . HL</text><rect x="1070.0" y="538.0" width="400.0" height="126.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1090.0" cy="563.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="567.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Vanadium oxidation-state ladder: VO2+ to V2+ (Zn reduction)</text><circle cx="1090.0" cy="587.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="591.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Yellow -&gt; blue -&gt; green -&gt; violet colour sequence</text><circle cx="1090.0" cy="611.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="615.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Manganese oxidation states: MnO4- to Mn2+ (colour ladder)</text><circle cx="1090.0" cy="635.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="639.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Shows close successive ionization energies in practice</text><path d="M 1000.0 630.0 C 1050.0 630.0, 1050.0 755.0, 1100.0 755.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="731.0" width="340.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1270" y="751" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">CATALYTIC PROPERTIES</text><text x="1270" y="770" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 3.1.8 . HL</text><rect x="1070.0" y="793.0" width="400.0" height="126.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1090.0" cy="818.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="822.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">MnO2 catalyses H2O2 decomposition (heterogeneous)</text><circle cx="1090.0" cy="842.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="846.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Fe3+/Fe2+ catalyses the iodide-persulfate reaction (homogeneous)</text><circle cx="1090.0" cy="866.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="870.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Compare catalysed vs uncatalysed reaction rate</text><circle cx="1090.0" cy="890.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="894.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Links transition-metal catalysis to variable oxidation states</text><path d="M 1000.0 630.0 C 1050.0 630.0, 1050.0 1010.0, 1100.0 1010.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="986.0" width="340.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1270" y="1006" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">COMPLEX ION FORMATION &amp; TESTS</text><text x="1270" y="1025" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 3.1.8 . HL</text><rect x="1070.0" y="1048.0" width="400.0" height="126.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1090.0" cy="1073.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="1077.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Cu2+(aq) + excess NH3 -&gt; ligand substitution, colour change</text><circle cx="1090.0" cy="1097.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="1101.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Co2+(aq) + conc. HCl -&gt; pink to blue complex (equilibrium demo)</text><circle cx="1090.0" cy="1121.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="1125.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">NaOH/NH3 added dropwise: coloured precipitates identify ions</text><circle cx="1090.0" cy="1145.0" r="2.8" fill="#7c3aed"/><text x="1100.0" y="1149.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Confirms complex ions form with ligands via ligand exchange</text><rect x="30.0" y="1190.0" width="16.0" height="16.0" rx="4" ry="4" fill="#2563eb"/><text x="54" y="1203" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">Qualitative demos (SL &amp; HL)</text><rect x="320.0" y="1190.0" width="16.0" height="16.0" rx="4" ry="4" fill="#7c3aed"/><text x="344" y="1203" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">Transition-metal chemistry &amp; IA ideas (HL)</text><text x="1670" y="1203" text-anchor="end" font-size="11" fill="#94a3b8" font-family="Arial, sans-serif">Standard school-lab practicals compiled from IB Chemistry teaching resources</text></svg>