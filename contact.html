<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: #f5f5f7;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
  }
  .container {
    background: #fff;
    max-width: 520px;
    width: 100%;
    padding: 36px 32px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  h1 {
    margin-top: 0;
    font-size: 24px;
    color: #1a1a1a;
  }
  p.subtitle {
    color: #666;
    margin-bottom: 28px;
    font-size: 14px;
  }
  label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #333;
    margin-bottom: 6px;
    margin-top: 18px;
  }
  input, textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d5d5d7;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: #4a90e2;
    box-shadow: 0 0 0 3px rgba(74,144,226,0.15);
  }
  textarea { min-height: 120px; }
  button {
    margin-top: 24px;
    width: 100%;
    padding: 12px;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #333; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  #result {
    margin-top: 16px;
    font-size: 14px;
    text-align: center;
  }
  .honeypot { display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>Contact Us</h1>
  <p class="subtitle">Fill out the form below and we'll get back to you soon.</p>

  <form id="contactForm">
    <input type="hidden" name="access_key" value="52a57d94-fcff-4d5c-b455-666dbfefefec">
    <input type="hidden" name="subject" value="New Contact Form Submission">
    <input type="checkbox" name="botcheck" class="honeypot" style="display:none;">

    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Your full name" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" required>

    <label for="message">Message</label>
    <textarea id="message" name="message" placeholder="How can we help?" required></textarea>

    <button type="submit" id="submitBtn">Send Message</button>
    <div id="result"></div>
  </form>
</div>

<script>
const form = document.getElementById('contactForm');
const result = document.getElementById('result');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', function (e) {
  e.preventDefault();
  submitBtn.disabled = true;
  result.style.color = '#333';
  result.innerHTML = 'Sending...';

  const formData = new FormData(form);
  const object = Object.fromEntries(formData);
  const json = JSON.stringify(object);

  fetch('https://api.web3forms.com/submit', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Accept': 'application/json'
    },
    body: json
  })
    .then(async (response) => {
      let json = await response.json();
      if (response.status === 200) {
        result.style.color = 'green';
        result.innerHTML = 'Message sent successfully!';
      } else {
        console.log(response);
        result.style.color = 'red';
        result.innerHTML = json.message || 'Something went wrong.';
      }
    })
    .catch((error) => {
      console.log(error);
      result.style.color = 'red';
      result.innerHTML = 'Something went wrong!';
    })
    .then(() => {
      form.reset();
      submitBtn.disabled = false;
      setTimeout(() => { result.innerHTML = ''; }, 5000);
    });
});
</script>
</body>
</html>
