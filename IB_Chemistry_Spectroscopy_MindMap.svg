<?xml version="1.0" encoding="UTF-8" standalone="no"?><svg viewBox="0 0 1760 1100" xmlns="http://www.w3.org/2000/svg" role="img"><title>IB Chemistry HL Spectroscopy Mind Map</title><rect x="0" y="0" width="1760" height="1100" fill="#ffffff"/><text x="880.0" y="42" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a" font-family="Arial, sans-serif">IB Chemistry HL — Spectroscopy</text><text x="880.0" y="66" text-anchor="middle" font-size="14" fill="#475569" font-family="Arial, sans-serif">Structure 3.2.8-3.2.12 "Structural determination" — HL-only content</text><rect x="730.0" y="570.0" width="300.0" height="100.0" rx="16" ry="16" fill="#0f172a"/><text x="880" y="610" text-anchor="middle" font-size="19" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">SPECTROSCOPY</text><text x="880" y="636" text-anchor="middle" font-size="12.5" fill="#cbd5e1" font-family="Arial, sans-serif">Structural determination</text><text x="880" y="654" text-anchor="middle" font-size="11.5" fill="#cbd5e1" font-family="Arial, sans-serif">HL IB Chemistry</text><path d="M 660.0 190.0 C 695.0 190.0, 695.0 620.0, 730.0 620.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="280.0" y="166.0" width="380.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="470" y="186" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">MASS SPECTROMETRY (MS)</text><text x="470" y="205" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 3.2.8 (HL)</text><rect x="240.0" y="228.0" width="460.0" height="116.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="260.0" cy="251.0" r="2.6" fill="#7c3aed"/><text x="270.0" y="255.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">MS can fragment the molecular ion into smaller charged pieces</text><circle cx="260.0" cy="273.0" r="2.6" fill="#7c3aed"/><text x="270.0" y="277.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Molecular ion peak (M+) gives the relative molecular mass Mr</text><circle cx="260.0" cy="295.0" r="2.6" fill="#7c3aed"/><text x="270.0" y="299.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Common fragment losses (e.g. CH3, C2H5, COOH) given in data booklet</text><circle cx="260.0" cy="317.0" r="2.6" fill="#7c3aed"/><text x="270.0" y="321.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Combine the fragmentation pattern with other data to confirm structure</text><path d="M 660.0 398.0 C 695.0 398.0, 695.0 620.0, 730.0 620.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="280.0" y="374.0" width="380.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="470" y="394" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">INFRARED (IR) SPECTROSCOPY</text><text x="470" y="413" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 3.2.9 (HL)</text><rect x="240.0" y="436.0" width="460.0" height="116.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="260.0" cy="459.0" r="2.6" fill="#7c3aed"/><text x="270.0" y="463.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">IR spectra identify the type of bond/functional group present</text><circle cx="260.0" cy="481.0" r="2.6" fill="#7c3aed"/><text x="270.0" y="485.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Interpret the functional-group region using the data-booklet table</text><circle cx="260.0" cy="503.0" r="2.6" fill="#7c3aed"/><text x="270.0" y="507.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Recognize O-H, N-H, C=O, C-H, C-O absorptions and typical ranges</text><circle cx="260.0" cy="525.0" r="2.6" fill="#7c3aed"/><text x="270.0" y="529.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Link IR absorption by greenhouse gases to global warming potential</text><path d="M 660.0 606.0 C 695.0 606.0, 695.0 620.0, 730.0 620.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="280.0" y="582.0" width="380.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="470" y="602" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">1H NMR: CHEMICAL ENVIRONMENTS &amp; SHIFT</text><text x="470" y="621" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 3.2.10 (HL)</text><rect x="240.0" y="644.0" width="460.0" height="116.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="260.0" cy="667.0" r="2.6" fill="#7c3aed"/><text x="270.0" y="671.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Different chemical environments of H atoms give distinct signals</text><circle cx="260.0" cy="689.0" r="2.6" fill="#7c3aed"/><text x="270.0" y="693.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Chemical shift (ppm) indicates the type of environment (data booklet)</text><circle cx="260.0" cy="711.0" r="2.6" fill="#7c3aed"/><text x="270.0" y="715.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Number of signals = number of distinct H environments in a molecule</text><circle cx="260.0" cy="733.0" r="2.6" fill="#7c3aed"/><text x="270.0" y="737.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Integration traces give the relative number of H atoms per signal</text><path d="M 660.0 814.0 C 695.0 814.0, 695.0 620.0, 730.0 620.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="280.0" y="790.0" width="380.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="470" y="810" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">1H NMR: SPLITTING PATTERNS</text><text x="470" y="829" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 3.2.11 (HL)</text><rect x="240.0" y="852.0" width="460.0" height="116.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="260.0" cy="875.0" r="2.6" fill="#7c3aed"/><text x="270.0" y="879.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Signals split into clusters of peaks due to neighbouring H atoms</text><circle cx="260.0" cy="897.0" r="2.6" fill="#7c3aed"/><text x="270.0" y="901.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Apply the n+1 rule: singlet, doublet, triplet, quartet patterns</text><circle cx="260.0" cy="919.0" r="2.6" fill="#7c3aed"/><text x="270.0" y="923.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Use splitting to find how many H atoms are on adjacent carbons</text><circle cx="260.0" cy="941.0" r="2.6" fill="#7c3aed"/><text x="270.0" y="945.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Combine shift, integration and splitting for full structural detail</text><path d="M 1030.0 620.0 C 1065.0 620.0, 1065.0 190.0, 1100.0 190.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="166.0" width="380.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1290" y="186" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">COMBINED STRUCTURAL ANALYSIS</text><text x="1290" y="205" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 3.2.12 (HL)</text><rect x="1060.0" y="228.0" width="460.0" height="116.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1080.0" cy="251.0" r="2.6" fill="#7c3aed"/><text x="1090.0" y="255.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Data from MS, IR and 1H NMR are combined in structural analysis</text><circle cx="1080.0" cy="273.0" r="2.6" fill="#7c3aed"/><text x="1090.0" y="277.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Cross-check candidate structures against all available spectral evidence</text><circle cx="1080.0" cy="295.0" r="2.6" fill="#7c3aed"/><text x="1090.0" y="299.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">A systematic approach reduces ambiguity when several structures fit</text><circle cx="1080.0" cy="317.0" r="2.6" fill="#7c3aed"/><text x="1090.0" y="321.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Practice interpreting unknowns using multiple spectra simultaneously</text><path d="M 1030.0 620.0 C 1065.0 620.0, 1065.0 398.0, 1100.0 398.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="374.0" width="380.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1290" y="394" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">DEGREE OF UNSATURATION (IHD)</text><text x="1290" y="413" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structural reasoning</text><rect x="1060.0" y="436.0" width="460.0" height="116.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1080.0" cy="459.0" r="2.6" fill="#7c3aed"/><text x="1090.0" y="463.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Index of hydrogen deficiency indicates rings and/or multiple bonds</text><circle cx="1080.0" cy="481.0" r="2.6" fill="#7c3aed"/><text x="1090.0" y="485.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Calculate IHD from a molecular formula before detailed analysis</text><circle cx="1080.0" cy="503.0" r="2.6" fill="#7c3aed"/><text x="1090.0" y="507.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Narrows down candidate structures prior to using MS/IR/NMR data</text><circle cx="1080.0" cy="525.0" r="2.6" fill="#7c3aed"/><text x="1090.0" y="529.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Cross-check the IHD value against features seen in the spectra</text><path d="M 1030.0 620.0 C 1065.0 620.0, 1065.0 606.0, 1100.0 606.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="582.0" width="380.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1290" y="602" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">USING THE DATA BOOKLET TABLES</text><text x="1290" y="621" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Exam technique</text><rect x="1060.0" y="644.0" width="460.0" height="116.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1080.0" cy="667.0" r="2.6" fill="#7c3aed"/><text x="1090.0" y="671.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">IR characteristic group wavenumber table (functional-group region)</text><circle cx="1080.0" cy="689.0" r="2.6" fill="#7c3aed"/><text x="1090.0" y="693.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">1H NMR chemical shift table for common H environments</text><circle cx="1080.0" cy="711.0" r="2.6" fill="#7c3aed"/><text x="1090.0" y="715.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">MS common fragment-loss table for interpreting mass spectra</text><circle cx="1080.0" cy="733.0" r="2.6" fill="#7c3aed"/><text x="1090.0" y="737.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Practice quick, accurate table lookups under timed exam conditions</text><path d="M 1030.0 620.0 C 1065.0 620.0, 1065.0 814.0, 1100.0 814.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="790.0" width="380.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1290" y="810" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">STRATEGY FOR SOLVING UNKNOWN STRUCTURES</text><text x="1290" y="829" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Problem-solving</text><rect x="1060.0" y="852.0" width="460.0" height="116.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1080.0" cy="875.0" r="2.6" fill="#7c3aed"/><text x="1090.0" y="879.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Start with the molecular ion (MS) to fix the molecular formula/Mr</text><circle cx="1080.0" cy="897.0" r="2.6" fill="#7c3aed"/><text x="1090.0" y="901.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Use IR to identify the likely functional group(s) present</text><circle cx="1080.0" cy="919.0" r="2.6" fill="#7c3aed"/><text x="1090.0" y="923.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Use 1H NMR shift + integration to place H atoms into environments</text><circle cx="1080.0" cy="941.0" r="2.6" fill="#7c3aed"/><text x="1090.0" y="945.0" font-size="11.8" fill="#4c1d95" font-family="Arial, sans-serif">Confirm connectivity using splitting patterns; assemble the structure</text><rect x="30.0" y="1046.0" width="16.0" height="16.0" rx="4" ry="4" fill="#7c3aed"/><text x="54" y="1059" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">HL-only content (AHL)</text><text x="1730" y="1059" text-anchor="end" font-size="11" fill="#94a3b8" font-family="Arial, sans-serif">IB Chemistry 2025 syllabus — Structure 3.2.8-3.2.12</text></svg>