<?xml version="1.0" encoding="UTF-8" standalone="no"?><svg viewBox="0 0 1760 1310" xmlns="http://www.w3.org/2000/svg" role="img"><title>IB Chemistry HL Stoichiometry Chemical Calculations Mind Map</title><rect x="0" y="0" width="1760" height="1310" fill="#ffffff"/><text x="880.0" y="42" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a" font-family="Arial, sans-serif">IB Chemistry HL — Stoichiometry: Chemical Calculations</text><text x="880.0" y="66" text-anchor="middle" font-size="14" fill="#475569" font-family="Arial, sans-serif">Structure 1.4 The mole &amp; Structure 1.5 Ideal gases; Reactivity 2.1 The amount of chemical change — common to SL and HL</text><rect x="730.0" y="650.0" width="300.0" height="100.0" rx="16" ry="16" fill="#0f172a"/><text x="880" y="690" text-anchor="middle" font-size="17" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">STOICHIOMETRY</text><text x="880" y="712" text-anchor="middle" font-size="14" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">Chemical Calculations</text><text x="880" y="734" text-anchor="middle" font-size="11.5" fill="#cbd5e1" font-family="Arial, sans-serif">HL IB Chemistry</text><path d="M 660.0 190.0 C 695.0 190.0, 695.0 700.0, 730.0 700.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="280.0" y="166.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="470" y="186" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">MOLES, AVOGADRO'S CONSTANT &amp; MOLAR MASS</text><text x="470" y="205" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 1.4.1-1.4.3</text><rect x="240.0" y="228.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="260.0" cy="251.0" r="2.6" fill="#2563eb"/><text x="270.0" y="255.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Mole (mol): SI unit of amount of substance</text><circle cx="260.0" cy="273.0" r="2.6" fill="#2563eb"/><text x="270.0" y="277.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Avogadro constant NA converts amount to number of particles</text><circle cx="260.0" cy="295.0" r="2.6" fill="#2563eb"/><text x="270.0" y="299.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Relative atomic/formula mass (Ar, Mr): no units, scale relative to 12C</text><circle cx="260.0" cy="317.0" r="2.6" fill="#2563eb"/><text x="270.0" y="321.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Molar mass M (g/mol); apply n = m/M to link moles, mass &amp; particles</text><path d="M 660.0 398.0 C 695.0 398.0, 695.0 700.0, 730.0 700.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="280.0" y="374.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="470" y="394" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">EMPIRICAL &amp; MOLECULAR FORMULAS</text><text x="470" y="413" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 1.4.4</text><rect x="240.0" y="436.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="260.0" cy="459.0" r="2.6" fill="#2563eb"/><text x="270.0" y="463.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Empirical formula: simplest whole-number atom ratio</text><circle cx="260.0" cy="481.0" r="2.6" fill="#2563eb"/><text x="270.0" y="485.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Molecular formula: actual number of atoms per molecule</text><circle cx="260.0" cy="503.0" r="2.6" fill="#2563eb"/><text x="270.0" y="507.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Interconvert percentage composition by mass and empirical formula</text><circle cx="260.0" cy="525.0" r="2.6" fill="#2563eb"/><text x="270.0" y="529.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Find molecular formula from empirical formula and molar mass</text><path d="M 660.0 606.0 C 695.0 606.0, 695.0 700.0, 730.0 700.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="280.0" y="582.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="470" y="602" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">MOLAR CONCENTRATION OF SOLUTIONS</text><text x="470" y="621" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 1.4.5</text><rect x="240.0" y="644.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="260.0" cy="667.0" r="2.6" fill="#2563eb"/><text x="270.0" y="671.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Molar concentration determined by moles of solute &amp; volume of solution</text><circle cx="260.0" cy="689.0" r="2.6" fill="#2563eb"/><text x="270.0" y="693.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Square brackets [X] denote molar concentration</text><circle cx="260.0" cy="711.0" r="2.6" fill="#2563eb"/><text x="270.0" y="715.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Convert between g dm-3 and mol dm-3</text><circle cx="260.0" cy="733.0" r="2.6" fill="#2563eb"/><text x="270.0" y="737.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Apply n = CV to solve concentration/amount/volume problems</text><path d="M 660.0 814.0 C 695.0 814.0, 695.0 700.0, 730.0 700.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="280.0" y="790.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="470" y="810" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">AVOGADRO'S LAW &amp; GAS STOICHIOMETRY</text><text x="470" y="829" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 1.4.6</text><rect x="240.0" y="852.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="260.0" cy="875.0" r="2.6" fill="#2563eb"/><text x="270.0" y="879.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Equal volumes of gases (same T, P) contain equal numbers of molecules</text><circle cx="260.0" cy="897.0" r="2.6" fill="#2563eb"/><text x="270.0" y="901.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Use mole ratios to relate volumes of gaseous reactants/products</text><circle cx="260.0" cy="919.0" r="2.6" fill="#2563eb"/><text x="270.0" y="923.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Applies regardless of the identity of the gas</text><circle cx="260.0" cy="941.0" r="2.6" fill="#2563eb"/><text x="270.0" y="945.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Link gas volume ratios directly to a balanced equation</text><path d="M 660.0 1022.0 C 695.0 1022.0, 695.0 700.0, 730.0 700.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="280.0" y="998.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="470" y="1018" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">BALANCING EQUATIONS &amp; REACTING QUANTITIES</text><text x="470" y="1037" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.1.1-2.1.2</text><rect x="240.0" y="1060.0" width="460.0" height="138.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="260.0" cy="1083.0" r="2.6" fill="#2563eb"/><text x="270.0" y="1087.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Chemical equations show the mole ratio of reactants &amp; products</text><circle cx="260.0" cy="1105.0" r="2.6" fill="#2563eb"/><text x="270.0" y="1109.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Deduce balanced equations when reactants/products are specified</text><circle cx="260.0" cy="1127.0" r="2.6" fill="#2563eb"/><text x="270.0" y="1131.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Include state symbols (s), (l), (g), (aq) in equations</text><circle cx="260.0" cy="1149.0" r="2.6" fill="#2563eb"/><text x="270.0" y="1153.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Use mole ratios to calculate reacting masses, volumes &amp; concentrations</text><circle cx="260.0" cy="1171.0" r="2.6" fill="#2563eb"/><text x="270.0" y="1175.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Combine n = m/M, n = CV and n = V/Vm in multi-step calculations</text><path d="M 1030.0 700.0 C 1065.0 700.0, 1065.0 190.0, 1100.0 190.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="166.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="1290" y="186" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">IDEAL GAS MODEL &amp; REAL GAS DEVIATIONS</text><text x="1290" y="205" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 1.5.1-1.5.2</text><rect x="1060.0" y="228.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="1080.0" cy="251.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="255.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Ideal gas: negligible particle volume, no intermolecular forces</text><circle cx="1080.0" cy="273.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="277.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">All collisions between gas particles are perfectly elastic</text><circle cx="1080.0" cy="295.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="299.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Real gases deviate most at low temperature and high pressure</text><circle cx="1080.0" cy="317.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="321.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Explain deviations in terms of particle volume &amp; attractive forces</text><path d="M 1030.0 700.0 C 1065.0 700.0, 1065.0 398.0, 1100.0 398.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="374.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="1290" y="394" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">GAS LAWS &amp; MOLAR VOLUME</text><text x="1290" y="413" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 1.5.3</text><rect x="1060.0" y="436.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="1080.0" cy="459.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="463.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Molar volume of an ideal gas is constant at fixed T and P</text><circle cx="1080.0" cy="481.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="485.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Molar volume at STP given in the data booklet</text><circle cx="1080.0" cy="503.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="507.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Investigate relationships between T, P and V for a fixed gas mass</text><circle cx="1080.0" cy="525.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="529.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Analyse graphs relating temperature, pressure and volume</text><path d="M 1030.0 700.0 C 1065.0 700.0, 1065.0 606.0, 1100.0 606.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="582.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="1290" y="602" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">IDEAL GAS EQUATION &amp; COMBINED GAS LAW</text><text x="1290" y="621" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 1.5.4</text><rect x="1060.0" y="644.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="1080.0" cy="667.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="671.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Ideal gas equation: PV = nRT (R given in data booklet)</text><circle cx="1080.0" cy="689.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="693.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Combined gas law relates P, V, T for a fixed amount of gas</text><circle cx="1080.0" cy="711.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="715.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Use SI units only for pressure and volume in calculations</text><circle cx="1080.0" cy="733.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="737.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Solve multi-variable problems combining PV = nRT with n = m/M</text><path d="M 1030.0 700.0 C 1065.0 700.0, 1065.0 814.0, 1100.0 814.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="790.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="1290" y="810" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">LIMITING REACTANT &amp; YIELD</text><text x="1290" y="829" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.1.3-2.1.4</text><rect x="1060.0" y="852.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="1080.0" cy="875.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="879.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Limiting reactant is used up first and determines theoretical yield</text><circle cx="1080.0" cy="897.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="901.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Identify limiting and excess reactants from given quantities</text><circle cx="1080.0" cy="919.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="923.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Distinguish theoretical yield from experimental (actual) yield</text><circle cx="1080.0" cy="941.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="945.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Percentage yield = experimental yield / theoretical yield x 100</text><path d="M 1030.0 700.0 C 1065.0 700.0, 1065.0 1022.0, 1100.0 1022.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="998.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="1290" y="1018" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">ATOM ECONOMY &amp; GREEN CHEMISTRY</text><text x="1290" y="1037" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.1.5</text><rect x="1060.0" y="1060.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="1080.0" cy="1083.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="1087.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Atom economy measures efficiency of a reaction in green chemistry</text><circle cx="1080.0" cy="1105.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="1109.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Atom economy = (Mr of desired product / sum Mr of all products) x 100</text><circle cx="1080.0" cy="1127.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="1131.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">High atom economy means less wasted mass/by-product</text><circle cx="1080.0" cy="1149.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="1153.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Compare atom economy against percentage yield as efficiency measures</text><rect x="30.0" y="1256.0" width="16.0" height="16.0" rx="4" ry="4" fill="#2563eb"/><text x="54" y="1269" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">Core content (SL &amp; HL)</text><text x="1730" y="1269" text-anchor="end" font-size="11" fill="#94a3b8" font-family="Arial, sans-serif">IB Chemistry 2025 syllabus — Structure 1.4/1.5 &amp; Reactivity 2.1</text></svg>