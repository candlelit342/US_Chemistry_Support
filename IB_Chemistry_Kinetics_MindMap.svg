<?xml version="1.0" encoding="UTF-8" standalone="no"?><svg viewBox="0 0 1700 1260" xmlns="http://www.w3.org/2000/svg" role="img"><title>IB Chemistry HL Kinetics Mind Map</title><rect x="0" y="0" width="1700" height="1260" fill="#ffffff"/><text x="850.0" y="42" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a" font-family="Arial, sans-serif">IB Chemistry HL — Kinetics (Rates of Reaction)</text><text x="850.0" y="66" text-anchor="middle" font-size="14" fill="#475569" font-family="Arial, sans-serif">Reactivity 2.2 "How fast? The rate of chemical change" (first exams 2025)</text><rect x="700.0" y="582.0" width="300.0" height="96.0" rx="16" ry="16" fill="#0f172a"/><text x="850" y="622" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">KINETICS</text><text x="850" y="646" text-anchor="middle" font-size="12.5" fill="#cbd5e1" font-family="Arial, sans-serif">Reactivity 2.2 — How fast? The rate of chemical change</text><path d="M 580.0 245.0 C 640.0 245.0, 640.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="221.0" width="320.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="420" y="241" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">MEASURING REACTION RATE</text><text x="420" y="260" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.2.1</text><rect x="220.0" y="283.0" width="400.0" height="126.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="240.0" cy="308.0" r="2.8" fill="#2563eb"/><text x="250.0" y="312.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Rate = change in [reactant/product] per unit time</text><circle cx="240.0" cy="332.0" r="2.8" fill="#2563eb"/><text x="250.0" y="336.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Determine rate from tangent to conc./mass/volume-time graph</text><circle cx="240.0" cy="356.0" r="2.8" fill="#2563eb"/><text x="250.0" y="360.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Time can be a dependent or independent variable</text><circle cx="240.0" cy="380.0" r="2.8" fill="#2563eb"/><text x="250.0" y="384.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Concentration rarely measured directly - use proxy methods</text><path d="M 580.0 500.0 C 640.0 500.0, 640.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="476.0" width="320.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="420" y="496" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">COLLISION THEORY</text><text x="420" y="515" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.2.2</text><rect x="220.0" y="538.0" width="400.0" height="126.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="240.0" cy="563.0" r="2.8" fill="#2563eb"/><text x="250.0" y="567.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Reactions occur via collisions of sufficient energy + orientation</text><circle cx="240.0" cy="587.0" r="2.8" fill="#2563eb"/><text x="250.0" y="591.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">KE of particles relates to temperature (in kelvin)</text><circle cx="240.0" cy="611.0" r="2.8" fill="#2563eb"/><text x="250.0" y="615.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Proper collision geometry needed for reaction</text><circle cx="240.0" cy="635.0" r="2.8" fill="#2563eb"/><text x="250.0" y="639.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Links kinetic molecular theory to reaction rate</text><path d="M 580.0 755.0 C 640.0 755.0, 640.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="731.0" width="320.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="420" y="751" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">FACTORS AFFECTING RATE</text><text x="420" y="770" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.2.3</text><rect x="220.0" y="793.0" width="400.0" height="126.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="240.0" cy="818.0" r="2.8" fill="#2563eb"/><text x="250.0" y="822.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Pressure, concentration, surface area, temperature, catalyst</text><circle cx="240.0" cy="842.0" r="2.8" fill="#2563eb"/><text x="250.0" y="846.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Predict &amp; explain the effect of each factor on rate</text><circle cx="240.0" cy="866.0" r="2.8" fill="#2563eb"/><text x="250.0" y="870.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Control variables when investigating one factor</text><circle cx="240.0" cy="890.0" r="2.8" fill="#2563eb"/><text x="250.0" y="894.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Graphs can reveal systematic vs random error</text><path d="M 580.0 1010.0 C 640.0 1010.0, 640.0 630.0, 700.0 630.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="986.0" width="320.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="420" y="1006" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">ACTIVATION ENERGY &amp; CATALYSTS</text><text x="420" y="1025" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.2.4-2.2.5</text><rect x="220.0" y="1048.0" width="400.0" height="150.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="240.0" cy="1073.0" r="2.8" fill="#2563eb"/><text x="250.0" y="1077.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Ea = minimum energy needed for a successful collision</text><circle cx="240.0" cy="1097.0" r="2.8" fill="#2563eb"/><text x="250.0" y="1101.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Maxwell-Boltzmann curves show T's effect on collision success</text><circle cx="240.0" cy="1121.0" r="2.8" fill="#2563eb"/><text x="250.0" y="1125.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Catalysts lower Ea via an alternative pathway</text><circle cx="240.0" cy="1145.0" r="2.8" fill="#2563eb"/><text x="250.0" y="1149.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Energy profiles: with/without catalyst (endo/exothermic)</text><circle cx="240.0" cy="1169.0" r="2.8" fill="#2563eb"/><text x="250.0" y="1173.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Biological catalysts = enzymes; mechanisms not assessed</text><path d="M 1000.0 630.0 C 1060.0 630.0, 1060.0 245.0, 1120.0 245.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1120.0" y="221.0" width="320.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1280" y="241" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">REACTION MECHANISMS</text><text x="1280" y="260" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.2.6-2.2.8 . HL</text><rect x="1080.0" y="283.0" width="400.0" height="150.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1100.0" cy="308.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="312.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Reactions occur via a series of elementary steps</text><circle cx="1100.0" cy="332.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="336.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Slowest step (rate-determining step) controls overall rate</text><circle cx="1100.0" cy="356.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="360.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Distinguish intermediates from transition states</text><circle cx="1100.0" cy="380.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="384.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Energy profiles show Ea &amp; transition state of each step</text><circle cx="1100.0" cy="404.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="408.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Rate-determining step need not be the first step</text><path d="M 1000.0 630.0 C 1060.0 630.0, 1060.0 500.0, 1120.0 500.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1120.0" y="476.0" width="320.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1280" y="496" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">RATE EQUATIONS &amp; ORDER</text><text x="1280" y="515" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.2.9-2.2.10 . HL</text><rect x="1080.0" y="538.0" width="400.0" height="150.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1100.0" cy="563.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="567.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Molecularity: unimolecular, bimolecular, termolecular</text><circle cx="1100.0" cy="587.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="591.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Rate equation found only from experimental data</text><circle cx="1100.0" cy="611.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="615.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Order = exponent of [reactant] in the rate equation</text><circle cx="1100.0" cy="635.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="639.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Overall order = sum of individual orders</text><circle cx="1100.0" cy="659.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="663.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Sketch/analyse zero, first &amp; second order graphs</text><path d="M 1000.0 630.0 C 1060.0 630.0, 1060.0 755.0, 1120.0 755.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1120.0" y="731.0" width="320.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1280" y="751" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">THE RATE CONSTANT, k</text><text x="1280" y="770" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.2.11 . HL</text><rect x="1080.0" y="793.0" width="400.0" height="126.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1100.0" cy="818.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="822.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">k is temperature-dependent</text><circle cx="1100.0" cy="842.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="846.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Units of k depend on the overall reaction order</text><circle cx="1100.0" cy="866.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="870.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Solve rate-equation problems, including finding k</text><circle cx="1100.0" cy="890.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="894.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Larger k means a faster reaction at given concentrations</text><path d="M 1000.0 630.0 C 1060.0 630.0, 1060.0 1010.0, 1120.0 1010.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1120.0" y="986.0" width="320.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1280" y="1006" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">ARRHENIUS EQUATION &amp; FACTOR</text><text x="1280" y="1025" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.2.12-2.2.13 . HL</text><rect x="1080.0" y="1048.0" width="400.0" height="126.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1100.0" cy="1073.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="1077.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Arrhenius equation links k to temperature &amp; Ea (data booklet)</text><circle cx="1100.0" cy="1097.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="1101.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Linear form: ln k vs 1/T gives a straight line</text><circle cx="1100.0" cy="1121.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="1125.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Gradient = -Ea/R; determine Ea from data</text><circle cx="1100.0" cy="1145.0" r="2.8" fill="#7c3aed"/><text x="1110.0" y="1149.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Arrhenius factor A: collision frequency &amp; orientation</text><rect x="30.0" y="1190.0" width="16.0" height="16.0" rx="4" ry="4" fill="#2563eb"/><text x="54" y="1203" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">Core content (SL &amp; HL)</text><rect x="250.0" y="1190.0" width="16.0" height="16.0" rx="4" ry="4" fill="#7c3aed"/><text x="274" y="1203" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">HL only</text><text x="16