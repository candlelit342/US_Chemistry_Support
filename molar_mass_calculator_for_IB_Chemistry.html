<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Molar Mass Calculator - IB Periodic Table</title>
<style>
  :root{
    --accent:#1e93c6;
    --line:#000;
    --glow:#ffcc33;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#ffffff;
    color:#111;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:18px;
  }
  #header{
    width:100%;
    max-width:1500px;
    display:flex;
    justify-content:space-between;
    align-items:stretch;
    background:#fff;
    color:#111;
    border:none;
    border-bottom:2px solid var(--line);
    border-radius:0;
    padding:14px 26px 20px;
    margin-bottom:16px;
    gap:20px;
    flex-wrap:wrap;
  }
  #massBlock{
    display:flex;
    flex-direction:column;
    justify-content:center;
  }
  #massLabel, #formulaLabel{
    font-size:13px;
    color:#555;
    text-transform:uppercase;
    letter-spacing:1.5px;
    font-weight:bold;
  }
  #massValue{
    font-size:58px;
    font-weight:700;
    line-height:1.1;
    color:#111;
  }
  #massValue span.unit{
    font-size:22px;
    font-weight:400;
    color:#444;
    margin-left:8px;
  }
  #formulaBlock{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:flex-end;
    text-align:right;
  }
  #formulaValue{
    font-size:44px;
    font-weight:700;
    min-height:52px;
    color:#111;
  }
  #formulaValue sub{
    font-size:0.6em;
  }
  #controls{
    display:flex;
    align-items:center;
    gap:10px;
  }
  button#clearBtn{
    font-size:15px;
    padding:10px 20px;
    border:2px solid var(--line);
    border-radius:4px;
    background:#fff;
    color:#111;
    cursor:pointer;
    font-weight:700;
  }
  button#clearBtn:hover{background:#f0f0f0;}
  #hint{
    font-size:12px;
    color:#666;
    max-width:170px;
  }
  h1{
    width:100%;
    max-width:1500px;
    font-size:22px;
    font-weight:400;
    color:#888;
    margin:0 0 10px 4px;
  }
  h1 .num{ font-size:14px; vertical-align:top; margin-right:6px; }
  #tableWrap{
    width:100%;
    max-width:1500px;
    overflow-x:auto;
    position:relative;
    border-right:3px solid var(--accent);
    padding-right:14px;
  }
  #ptable{
    display:grid;
    grid-template-columns: 34px repeat(18, minmax(52px,1fr));
    grid-auto-rows:minmax(72px,1fr);
    gap:3px;
    min-width:1080px;
  }
  .glabel{
    grid-row:1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:15px;
    color:#111;
  }
  .plabel{
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:15px;
    color:#111;
  }
  .dagger{
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
    color:#111;
  }
  .fgap{ grid-column:1/-1; height:10px; }
  .elem{
    position:relative;
    border:1.4px solid var(--line);
    border-radius:2px;
    padding:2px 3px 4px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    user-select:none;
    color:#111;
    background:#fff;
    transition:transform .08s ease, box-shadow .15s ease, background .15s ease;
    font-size:11px;
    text-align:center;
  }
  .elem:hover{ transform:translateY(-1px); background:#f7f7f7; }
  .elem .num{ font-size:10px; align-self:flex-start; color:#111; }
  .elem .sym{ font-size:18px; font-weight:700; line-height:1.15; margin-top:1px; }
  .elem .mass{ font-size:18px; font-weight:700; color:#111; margin-top:2px; }
  .elem.selected{
    background:#fff8de;
    box-shadow:0 0 0 3px #fff, 0 0 16px 5px var(--glow), 0 0 28px 9px #ff9900;
    z-index:2;
    transform:translateY(-1px) scale(1.05);
  }
  .elem .count{
    position:absolute;
    top:-8px;
    right:-8px;
    background:#111;
    color:#fff;
    border-radius:50%;
    width:19px;
    height:19px;
    font-size:11px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    border:2px solid var(--glow);
  }
  #key{
    grid-column:8/13;
    grid-row:1/3;
    border:1.4px solid var(--line);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-around;
    padding:6px;
    font-size:11px;
    color:#333;
    text-align:center;
  }
  #key .keySym{ font-size:16px; font-weight:700; color:#111; margin:2px 0; }
  #footnote{
    width:100%;
    max-width:1500px;
    font-size:11px;
    color:#777;
    margin-top:8px;
    text-align:right;
  }
</style>
</head>
<body>

<div id="header">
  <div id="massBlock">
    <div id="massLabel">Molar Mass</div>
    <div id="massValue">0<span class="unit">g/mol</span></div>
  </div>
  <div id="controls">
    <div id="hint">Click an element to add it. Right‑click (or shift‑click) to remove one.</div>
    <button id="clearBtn">Clear</button>
  </div>
  <div id="formulaBlock">
    <div id="formulaLabel">Formula</div>
    <div id="formulaValue">—</div>
  </div>
</div>

<h1><span class="num">7.</span>The periodic table</h1>

<div id="tableWrap">
  <div id="ptable"></div>
</div>

<div id="footnote">Relative atomic masses as given in the IB Chemistry data booklet. Values in parentheses denote the mass number of the most stable isotope.</div>

<script>
// [atomicNumber, symbol, name, relativeAtomicMass, group(1-18), period(1-7), isApprox]
const elements = [
 [1,"H","Hydrogen",1.01,1,1,false],
 [2,"He","Helium",4.00,18,1,false],
 [3,"Li","Lithium",6.94,1,2,false],
 [4,"Be","Beryllium",9.01,2,2,false],
 [5,"B","Boron",10.81,13,2,false],
 [6,"C","Carbon",12.01,14,2,false],
 [7,"N","Nitrogen",14.01,15,2,false],
 [8,"O","Oxygen",16.00,16,2,false],
 [9,"F","Fluorine",19.00,17,2,false],
 [10,"Ne","Neon",20.18,18,2,false],
 [11,"Na","Sodium",22.99,1,3,false],
 [12,"Mg","Magnesium",24.31,2,3,false],
 [13,"Al","Aluminium",26.98,13,3,false],
 [14,"Si","Silicon",28.09,14,3,false],
 [15,"P","Phosphorus",30.97,15,3,false],
 [16,"S","Sulfur",32.07,16,3,false],
 [17,"Cl","Chlorine",35.45,17,3,false],
 [18,"Ar","Argon",39.95,18,3,false],
 [19,"K","Potassium",39.10,1,4,false],
 [20,"Ca","Calcium",40.08,2,4,false],
 [21,"Sc","Scandium",44.96,3,4,false],
 [22,"Ti","Titanium",47.87,4,4,false],
 [23,"V","Vanadium",50.94,5,4,false],
 [24,"Cr","Chromium",52.00,6,4,false],
 [25,"Mn","Manganese",54.94,7,4,false],
 [26,"Fe","Iron",55.85,8,4,false],
 [27,"Co","Cobalt",58.93,9,4,false],
 [28,"Ni","Nickel",58.69,10,4,false],
 [29,"Cu","Copper",63.55,11,4,false],
 [30,"Zn","Zinc",65.38,12,4,false],
 [31,"Ga","Gallium",69.72,13,4,false],
 [32,"Ge","Germanium",72.63,14,4,false],
 [33,"As","Arsenic",74.92,15,4,false],
 [34,"Se","Selenium",78.96,16,4,false],
 [35,"Br","Bromine",79.90,17,4,false],
 [36,"Kr","Krypton",83.80,18,4,false],
 [37,"Rb","Rubidium",85.47,1,5,false],
 [38,"Sr","Strontium",87.62,2,5,false],
 [39,"Y","Yttrium",88.91,3,5,false],
 [40,"Zr","Zirconium",91.22,4,5,false],
 [41,"Nb","Niobium",92.91,5,5,false],
 [42,"Mo","Molybdenum",95.96,6,5,false],
 [43,"Tc","Technetium",98,7,5,true],
 [44,"Ru","Ruthenium",101.07,8,5,false],
 [45,"Rh","Rhodium",102.91,9,5,false],
 [46,"Pd","Palladium",106.42,10,5,false],
 [47,"Ag","Silver",107.87,11,5,false],
 [48,"Cd","Cadmium",112.41,12,5,false],
 [49,"In","Indium",114.82,13,5,false],
 [50,"Sn","Tin",118.71,14,5,false],
 [51,"Sb","Antimony",121.76,15,5,false],
 [52,"Te","Tellurium",127.60,16,5,false],
 [53,"I","Iodine",126.90,17,5,false],
 [54,"Xe","Xenon",131.29,18,5,false],
 [55,"Cs","Caesium",132.91,1,6,false],
 [56,"Ba","Barium",137.33,2,6,false],
 [57,"La","Lanthanum",138.91,3,6,false],
 [72,"Hf","Hafnium",178.49,4,6,false],
 [73,"Ta","Tantalum",180.95,5,6,false],
 [74,"W","Tungsten",183.84,6,6,false],
 [75,"Re","Rhenium",186.21,7,6,false],
 [76,"Os","Osmium",190.23,8,6,false],
 [77,"Ir","Iridium",192.22,9,6,false],
 [78,"Pt","Platinum",195.08,10,6,false],
 [79,"Au","Gold",196.97,11,6,false],
 [80,"Hg","Mercury",200.59,12,6,false],
 [81,"Tl","Thallium",204.38,13,6,false],
 [82,"Pb","Lead",207.20,14,6,false],
 [83,"Bi","Bismuth",208.98,15,6,false],
 [84,"Po","Polonium",209,16,6,true],
 [85,"At","Astatine",210,17,6,true],
 [86,"Rn","Radon",222,18,6,true],
 [87,"Fr","Francium",223,1,7,true],
 [88,"Ra","Radium",226,2,7,true],
 [89,"Ac","Actinium",227,3,7,true],
 [104,"Rf","Rutherfordium",267,4,7,true],
 [105,"Db","Dubnium",268,5,7,true],
 [106,"Sg","Seaborgium",269,6,7,true],
 [107,"Bh","Bohrium",270,7,7,true],
 [108,"Hs","Hassium",269,8,7,true],
 [109,"Mt","Meitnerium",278,9,7,true],
 [110,"Ds","Darmstadtium",281,10,7,true],
 [111,"Rg","Roentgenium",281,11,7,true],
 [112,"Cn","Copernicium",285,12,7,true],
 [113,"Nh","Nihonium",286,13,7,true],
 [114,"Fl","Flerovium",289,14,7,true],
 [115,"Mc","Moscovium",288,15,7,true],
 [116,"Lv","Livermorium",293,16,7,true],
 [117,"Ts","Tennessine",294,17,7,true],
 [118,"Og","Oganesson",294,18,7,true],
 // Lanthanides (f-block row, dagger)
 [58,"Ce","Cerium",140.12,4,9,false],
 [59,"Pr","Praseodymium",140.91,5,9,false],
 [60,"Nd","Neodymium",144.24,6,9,false],
 [61,"Pm","Promethium",145,7,9,true],
 [62,"Sm","Samarium",150.36,8,9,false],
 [63,"Eu","Europium",151.96,9,9,false],
 [64,"Gd","Gadolinium",157.25,10,9,false],
 [65,"Tb","Terbium",158.93,11,9,false],
 [66,"Dy","Dysprosium",162.50,12,9,false],
 [67,"Ho","Holmium",164.93,13,9,false],
 [68,"Er","Erbium",167.26,14,9,false],
 [69,"Tm","Thulium",168.93,15,9,false],
 [70,"Yb","Ytterbium",173.05,16,9,false],
 [71,"Lu","Lutetium",174.97,17,9,false],
 // Actinides (f-block row, double-dagger)
 [90,"Th","Thorium",232.04,4,10,false],
 [91,"Pa","Protactinium",231.04,5,10,false],
 [92,"U","Uranium",238.03,6,10,false],
 [93,"Np","Neptunium",237,7,10,true],
 [94,"Pu","Plutonium",244,8,10,true],
 [95,"Am","Americium",243,9,10,true],
 [96,"Cm","Curium",247,10,10,true],
 [97,"Bk","Berkelium",247,11,10,true],
 [98,"Cf","Californium",251,12,10,true],
 [99,"Es","Einsteinium",252,13,10,true],
 [100,"Fm","Fermium",257,14,10,true],
 [101,"Md","Mendelevium",258,15,10,true],
 [102,"No","Nobelium",259,16,10,true],
 [103,"Lr","Lawrencium",262,17,10,true],
];

const ptable = document.getElementById('ptable');
const massValue = document.getElementById('massValue');
const formulaValue = document.getElementById('formulaValue');

// Group number header row (row 1)
for (let g = 1; g <= 18; g++) {
  const lab = document.createElement('div');
  lab.className = 'glabel';
  lab.style.gridColumn = g + 1;
  lab.textContent = g;
  ptable.appendChild(lab);
}
// Period number labels (rows 2-8 => periods 1-7)
for (let p = 1; p <= 7; p++) {
  const lab = document.createElement('div');
  lab.className = 'plabel';
  lab.style.gridColumn = 1;
  lab.style.gridRow = p + 1;
  lab.textContent = p;
  ptable.appendChild(lab);
}
// Gap row spacer (row 9)
const gap = document.createElement('div');
gap.className = 'fgap';
gap.style.gridRow = 9;
ptable.appendChild(gap);

// Dagger / double-dagger markers aligned with La / Ac column (group 3 -> col 4)
const dagger = document.createElement('div');
dagger.className = 'dagger';
dagger.style.gridColumn = 4;
dagger.style.gridRow = 10;
dagger.textContent = '†';
ptable.appendChild(dagger);

const ddagger = document.createElement('div');
ddagger.className = 'dagger';
ddagger.style.gridColumn = 4;
ddagger.style.gridRow = 11;
ddagger.textContent = '‡';
ptable.appendChild(ddagger);

let counts = {};   // symbol -> count
let order = [];    // insertion order of symbols
let massBySymbol = {};

elements.forEach(([num, sym, name, mass, group, period, approx]) => {
  massBySymbol[sym] = mass;
  const el = document.createElement('div');
  el.className = 'elem';
  // main table rows are periods 1-7 => grid rows 2-8; f-block rows 9/10 => grid rows 10/11
  const gridRow = period <= 7 ? period + 1 : (period === 9 ? 10 : 11);
  el.style.gridColumn = group + 1;
  el.style.gridRow = gridRow;
  el.dataset.sym = sym;
  const massLabel = approx ? `(${mass})` : mass.toFixed(2);
  const daggerMark = (sym === 'La') ? '†' : (sym === 'Ac') ? '‡' : '';
  el.innerHTML = `<span class="num">${num}</span>
                  <span class="sym">${sym}${daggerMark}</span>
                  <span class="mass">${massLabel}</span>`;
  el.addEventListener('click', (e) => {
    if (e.shiftKey) { removeOne(sym); } else { addOne(sym); }
    render();
  });
  el.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    removeOne(sym);
    render();
  });
  ptable.appendChild(el);
});

// Key box (Atomic number / Element / Relative atomic mass), placed in empty space of periods 1-2
const key = document.createElement('div');
key.id = 'key';
key.innerHTML = `<div>Atomic number</div><div class="keySym">Element</div><div>Relative atomic mass</div>`;
ptable.appendChild(key);

function addOne(sym){
  if (!counts[sym]) { counts[sym] = 0; order.push(sym); }
  counts[sym]++;
}
function removeOne(sym){
  if (!counts[sym]) return;
  counts[sym]--;
  if (counts[sym] <= 0) {
    delete counts[sym];
    order = order.filter(s => s !== sym);
  }
}
function clearAll(){
  counts = {};
  order = [];
  render();
}
document.getElementById('clearBtn').addEventListener('click', clearAll);

function render(){
  document.querySelectorAll('.elem').forEach(el => {
    const sym = el.dataset.sym;
    const existingBadge = el.querySelector('.count');
    if (existingBadge) existingBadge.remove();
    if (counts[sym]) {
      el.classList.add('selected');
      if (counts[sym] > 1) {
        const badge = document.createElement('div');
        badge.className = 'count';
        badge.textContent = counts[sym];
        el.appendChild(badge);
      }
    } else {
      el.classList.remove('selected');
    }
  });

  let total = 0;
  order.forEach(sym => { total += massBySymbol[sym] * counts[sym]; });
  massValue.innerHTML = (order.length === 0 ? '0' : total.toFixed(2)) + '<span class="unit">g/mol</span>';

  if (order.length === 0) {
    formulaValue.innerHTML = '—';
  } else {
    formulaValue.innerHTML = order.map(sym => {
      const c = counts[sym];
      return c > 1 ? `${sym}<sub>${c}</sub>` : sym;
    }).join('');
  }
}

render();
</script>
</body>
</html>
