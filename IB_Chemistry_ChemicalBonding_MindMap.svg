<?xml version="1.0" encoding="UTF-8" standalone="no"?><svg viewBox="0 0 1700 1560" xmlns="http://www.w3.org/2000/svg" role="img"><title>IB Chemistry HL Chemical Bonding Mind Map</title><rect x="0" y="0" width="1700" height="1560" fill="#ffffff"/><text x="850.0" y="42" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a" font-family="Arial, sans-serif">IB Chemistry HL — Chemical Bonding</text><text x="850.0" y="66" text-anchor="middle" font-size="14" fill="#475569" font-family="Arial, sans-serif">Structure 2.1-2.4 "Models of bonding and structure" (first exams 2025)</text><rect x="700.0" y="677.0" width="300.0" height="96.0" rx="16" ry="16" fill="#0f172a"/><text x="850" y="717" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">BONDING</text><text x="850" y="741" text-anchor="middle" font-size="12" fill="#cbd5e1" font-family="Arial, sans-serif">Structure 2.1 — 2.4</text><path d="M 610.0 215.0 C 655.0 215.0, 655.0 725.0, 700.0 725.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="270.0" y="191.0" width="340.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="440" y="211" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">IONIC BONDING &amp; STRUCTURES</text><text x="440" y="230" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 2.1.1-2.1.3</text><rect x="230.0" y="253.0" width="420.0" height="198.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="250.0" cy="278.0" r="2.8" fill="#2563eb"/><text x="260.0" y="282.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Metal atoms lose e- -&gt; cations; non-metals gain e- -&gt; anions</text><circle cx="250.0" cy="302.0" r="2.8" fill="#2563eb"/><text x="260.0" y="306.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Predict ion charge from electron configuration</text><circle cx="250.0" cy="326.0" r="2.8" fill="#2563eb"/><text x="260.0" y="330.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Transition elements form ions of variable charge</text><circle cx="250.0" cy="350.0" r="2.8" fill="#2563eb"/><text x="260.0" y="354.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Ionic bond = electrostatic attraction of opposite ions</text><circle cx="250.0" cy="374.0" r="2.8" fill="#2563eb"/><text x="260.0" y="378.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Name/formula: cation first, anion suffix -ide; know NH4+, OH-, NO3-, CO3(2-), SO4(2-), PO4(3-)</text><circle cx="250.0" cy="398.0" r="2.8" fill="#2563eb"/><text x="260.0" y="402.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">3D lattice structure; properties: volatility, conductivity, solubility</text><circle cx="250.0" cy="422.0" r="2.8" fill="#2563eb"/><text x="260.0" y="426.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Lattice enthalpy reflects ionic bond strength (radius &amp; charge)</text><path d="M 610.0 470.0 C 655.0 470.0, 655.0 725.0, 700.0 725.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="270.0" y="446.0" width="340.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="440" y="466" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">METALLIC BONDING</text><text x="440" y="485" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 2.3.1-2.3.2</text><rect x="230.0" y="508.0" width="420.0" height="126.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="250.0" cy="533.0" r="2.8" fill="#2563eb"/><text x="260.0" y="537.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Metallic bond = cation lattice + delocalized electrons</text><circle cx="250.0" cy="557.0" r="2.8" fill="#2563eb"/><text x="260.0" y="561.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Explains electrical/thermal conductivity &amp; malleability</text><circle cx="250.0" cy="581.0" r="2.8" fill="#2563eb"/><text x="260.0" y="585.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Bond strength depends on cation charge &amp; ionic radius</text><circle cx="250.0" cy="605.0" r="2.8" fill="#2563eb"/><text x="260.0" y="609.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Explains melting-point trends for s- and p-block metals</text><path d="M 610.0 725.0 C 655.0 725.0, 655.0 725.0, 700.0 725.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="270.0" y="701.0" width="340.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="440" y="721" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">COVALENT BONDING BASICS</text><text x="440" y="740" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 2.2.1-2.2.3</text><rect x="230.0" y="763.0" width="420.0" height="126.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="250.0" cy="788.0" r="2.8" fill="#2563eb"/><text x="260.0" y="792.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Covalent bond = shared e- pair + attraction to both nuclei</text><circle cx="250.0" cy="812.0" r="2.8" fill="#2563eb"/><text x="260.0" y="816.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Octet rule; Lewis formulas up to 4 electron pairs/atom</text><circle cx="250.0" cy="836.0" r="2.8" fill="#2563eb"/><text x="260.0" y="840.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Single, double, triple bonds: bond length &amp; strength link</text><circle cx="250.0" cy="860.0" r="2.8" fill="#2563eb"/><text x="260.0" y="864.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Coordination bond: both shared electrons from one atom</text><path d="M 610.0 980.0 C 655.0 980.0, 655.0 725.0, 700.0 725.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="270.0" y="956.0" width="340.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="440" y="976" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">VSEPR, POLARITY, NETWORKS &amp; IMFs</text><text x="440" y="995" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 2.2.4-2.2.10</text><rect x="230.0" y="1018.0" width="420.0" height="174.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="250.0" cy="1043.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1047.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">VSEPR: electron-domain repulsion predicts shape (up to 4 domains)</text><circle cx="250.0" cy="1067.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1071.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Bond polarity from electronegativity difference</text><circle cx="250.0" cy="1091.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1095.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Molecular polarity: bond polarity + geometry combine</text><circle cx="250.0" cy="1115.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1119.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Covalent network structures: Si, SiO2, C allotropes</text><circle cx="250.0" cy="1139.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1143.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Intermolecular forces: London, dipole-dipole, H-bonding</text><circle cx="250.0" cy="1163.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1167.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Chromatography: separation via IMFs; calculate Rf</text><path d="M 610.0 1235.0 C 655.0 1235.0, 655.0 725.0, 700.0 725.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="270.0" y="1211.0" width="340.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="440" y="1231" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">BONDING CONTINUUM, ALLOYS &amp; POLYMERS</text><text x="440" y="1250" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 2.4.1-2.4.6</text><rect x="230.0" y="1273.0" width="420.0" height="174.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="250.0" cy="1298.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1302.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Bonding triangle: continuum of ionic/covalent/metallic character</text><circle cx="250.0" cy="1322.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1326.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Position determined by electronegativity data (data booklet)</text><circle cx="250.0" cy="1346.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1350.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Alloys: metal + metal/non-metal mixture, non-directional bonding</text><circle cx="250.0" cy="1370.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1374.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Polymers: macromolecules from repeating monomers</text><circle cx="250.0" cy="1394.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1398.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Addition polymers form by breaking a double bond</text><circle cx="250.0" cy="1418.0" r="2.8" fill="#2563eb"/><text x="260.0" y="1422.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Condensation polymers (HL): release a small molecule (polyamides, polyesters)</text><path d="M 1000.0 725.0 C 1045.0 725.0, 1045.0 385.0, 1090.0 385.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1090.0" y="361.0" width="340.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1260" y="381" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">RESONANCE &amp; EXPANDED OCTETS</text><text x="1260" y="400" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 2.2.11-2.2.13 . HL</text><rect x="1050.0" y="423.0" width="420.0" height="126.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1070.0" cy="448.0" r="2.8" fill="#7c3aed"/><text x="1080.0" y="452.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Resonance: more than one position for a double bond; "delocalization"</text><circle cx="1070.0" cy="472.0" r="2.8" fill="#7c3aed"/><text x="1080.0" y="476.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Benzene, C6H6: physical &amp; chemical evidence for its structure</text><circle cx="1070.0" cy="496.0" r="2.8" fill="#7c3aed"/><text x="1080.0" y="500.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Expanded octet: 5 &amp; 6 electron domains around a central atom</text><circle cx="1070.0" cy="520.0" r="2.8" fill="#7c3aed"/><text x="1080.0" y="524.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Deduce electron-domain &amp; molecular geometry (VSEPR) for these species</text><path d="M 1000.0 725.0 C 1045.0 725.0, 1045.0 725.0, 1090.0 725.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1090.0" y="701.0" width="340.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1260" y="721" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">SIGMA/PI BONDS &amp; HYBRIDIZATION</text><text x="1260" y="740" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 2.2.14-2.2.16 . HL</text><rect x="1050.0" y="763.0" width="420.0" height="150.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1070.0" cy="788.0" r="2.8" fill="#7c3aed"/><text x="1080.0" y="792.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Formal charge selects the preferred Lewis formula among options</text><circle cx="1070.0" cy="812.0" r="2.8" fill="#7c3aed"/><text x="1080.0" y="816.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Sigma (s) bonds: head-on orbital overlap along the bond axis</text><circle cx="1070.0" cy="836.0" r="2.8" fill="#7c3aed"/><text x="1080.0" y="840.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Pi (p) bonds: lateral p-orbital overlap, density above/below axis</text><circle cx="1070.0" cy="860.0" r="2.8" fill="#7c3aed"/><text x="1080.0" y="864.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Hybridization mixes atomic orbitals (sp, sp2, sp3 only)</text><circle cx="1070.0" cy="884.0" r="2.8" fill="#7c3aed"/><text x="1080.0" y="888.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Link Lewis formula -&gt; electron domains -&gt; geometry -&gt; hybridization</text><path d="M 1000.0 725.0 C 1045.0 725.0, 1045.0 1065.0, 1090.0 1065.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1090.0" y="1041.0" width="340.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1260" y="1061" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">TRANSITION METAL METALLIC BONDING</text><text x="1260" y="1080" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Structure 2.3.3 . HL</text><rect x="1050.0" y="1103.0" width="420.0" height="102.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1070.0" cy="1128.0" r="2.8" fill="#7c3aed"/><text x="1080.0" y="1132.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Transition elements have delocalized d-electrons</text><circle cx="1070.0" cy="1152.0" r="2.8" fill="#7c3aed"/><text x="1080.0" y="1156.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Explains their characteristically high melting points</text><circle cx="1070.0" cy="1176.0" r="2.8" fill="#7c3aed"/><text x="1080.0" y="1180.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Explains their electrical conductivity</text><rect x="30.0" y="1496.0" width="16.0" height="16.0" rx="4" ry="4" fill="#2563eb"/><text x="54" y="1509" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">Core content (SL &amp; HL)</text><rect x="250.0" y="1496.0" width="16.0" height="16.0" rx="4" ry="4" fill="#7c3aed"/><text x="274" y="1509" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">HL only</text><text x="1670" y="1509" text-anchor="end" font-size="11" fill="#94a3b8" font-family="Arial, sans-serif">Source: IB Chemistry syllabus (Structure 2.1.1-2.1.3, 2.2.1-2.2.16, 2.3.1-2.3.3, 2.4.1-2.4.6)</text></svg>