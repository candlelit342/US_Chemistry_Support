ircle cx="1120.0" cy="596.0" r="2.8" fill="#7c3aed"/><text x="1130.0" y="600.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">E°cell = E°(cathode) - E°(anode)</text><circle cx="1120.0" cy="620.0" r="2.8" fill="#7c3aed"/><text x="1130.0" y="624.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Positive E°cell -&gt; spontaneous reaction</text><circle cx="1120.0" cy="644.0" r="2.8" fill="#7c3aed"/><text x="1130.0" y="648.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Predict forward/reverse spontaneity from E° data</text><path d="M 1000.0 610.0 C 1070.0 610.0, 1070.0 735.0, 1140.0 735.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1140.0" y="711.0" width="300.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1290" y="731" text-anchor="middle" font-size="15.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">GIBBS ENERGY &amp; CELL POTENTIAL</text><text x="1290" y="750" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 3.2.14 • HL</text><rect x="1100.0" y="773.0" width="380.0" height="126.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1120.0" cy="798.0" r="2.8" fill="#7c3aed"/><text x="1130.0" y="802.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">ΔG° = -nFE°cell (data booklet)</text><circle cx="1120.0" cy="822.0" r="2.8" fill="#7c3aed"/><text x="1130.0" y="826.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">n = mol of electrons transferred; F = Faraday constant</text><circle cx="1120.0" cy="846.0" r="2.8" fill="#7c3aed"/><text x="1130.0" y="850.0" font-size="12.3" fill="#4c1d95" font-family="Arial, sans-serif">Links thermodynamics (Reactivity 1.4) to electrochemistry</text><circle cx="1120.0" cy="870.0" r="2.8" fill="#7c3aed"/><text x="1130.0" y="874.0" font-size="12.3" fill="#4c1d95" font-fa