</text><rect x="250.0" y="1150.0" width="16.0" height="16.0" rx="4" ry="4" fill="#7c3aed"/><text x="274" y="1163" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">HL only</text><text x="1670" y="1163" text-anchor="end" font-size="11" fill="#94a3b8" font-family="Arial, sans-serif">Source: IB Chemistry syllabus (ibchem.com/IB25 — Reactivity 3.2.1-3.2.16)</text></svg>
