<?xml version="1.0" encoding="UTF-8" standalone="no"?><svg viewBox="0 0 1700 1220" xmlns="http://www.w3.org/2000/svg" role="img"><title>IB Chemistry HL Redox Mind Map</title><rect x="0" y="0" width="1700" height="1220" fill="#ffffff"/><text x="850.0" y="42" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a" font-family="Arial, sans-serif">IB Chemistry HL — Reduction &amp; Oxidation (Redox)</text><text x="850.0" y="66" text-anchor="middle" font-size="14" fill="#475569" font-family="Arial, sans-serif">Reactivity 3.2 "Electron transfer reactions" (first exams 2025)</text><rect x="700.0" y="562.0" width="300.0" height="96.0" rx="16" ry="16" fill="#0f172a"/><text x="850" y="602" text-anchor="middle" font-size="21" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">REDOX</text><text x="850" y="626" text-anchor="middle" font-size="12.5" fill="#cbd5e1" font-family="Arial, sans-serif">Reactivity 3.2 — Electron transfer reactions</text><path d="M 560.0 235.0 C 630.0 235.0, 630.0 610.0, 700.0 610.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="211.0" width="300.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="410" y="231" text-anchor="middle" font-size="15.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">OXIDATION STATES &amp; REDOX BASICS</text><text x="410" y="250" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 3.2.1</text><rect x="220.0" y="273.0" width="380.0" height="126.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="240.0" cy="298.0" r="2.8" fill="#2563eb"/><text x="250.0" y="302.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Deduce oxidation states in compounds/ions</text><circle cx="240.0" cy="322.0" r="2.8" fill="#2563eb"/><text x="250.0" y="326.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Oxidized/reduced species vs oxidizing/reducing agent</text><circle cx="240.0" cy="346.0" r="2.8" fill="#2563eb"/><text x="250.0" y="350.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Variable states: transition metals &amp; p-block nonmetals</text><circle cx="240.0" cy="370.0" r="2.8" fill="#2563eb"/><text x="250.0" y="374.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Oxidation numbers used in IUPAC naming</text><path d="M 560.0 485.0 C 630.0 485.0, 630.0 610.0, 700.0 610.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="461.0" width="300.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="410" y="481" text-anchor="middle" font-size="15.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">HALF-EQUATIONS</text><text x="410" y="500" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 3.2.2</text><rect x="220.0" y="523.0" width="380.0" height="102.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="240.0" cy="548.0" r="2.8" fill="#2563eb"/><text x="250.0" y="552.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Deduce half-equations (acidic or neutral solution)</text><circle cx="240.0" cy="572.0" r="2.8" fill="#2563eb"/><text x="250.0" y="576.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Balance electrons, then combine into full equation</text><circle cx="240.0" cy="596.0" r="2.8" fill="#2563eb"/><text x="250.0" y="600.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Some redox titrations are “self-indicating” (e.g. MnO4-)</text><path d="M 560.0 735.0 C 630.0 735.0, 630.0 610.0, 700.0 610.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="711.0" width="300.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="410" y="731" text-anchor="middle" font-size="15.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">REDOX TRENDS &amp; REACTIVITY</text><text x="410" y="750" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 3.2.3-3.2.4</text><rect x="220.0" y="773.0" width="380.0" height="150.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="240.0" cy="798.0" r="2.8" fill="#2563eb"/><text x="250.0" y="802.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Position in periodic table predicts oxidation/reduction ease</text><circle cx="240.0" cy="822.0" r="2.8" fill="#2563eb"/><text x="250.0" y="826.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Metal + aqueous metal-ion displacement reactions</text><circle cx="240.0" cy="846.0" r="2.8" fill="#2563eb"/><text x="250.0" y="850.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Halogen + halide displacement (ease of reduction)</text><circle cx="240.0" cy="870.0" r="2.8" fill="#2563eb"/><text x="250.0" y="874.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Reactive metals + dilute HCl/H2SO4 -&gt; H2 gas</text><circle cx="240.0" cy="894.0" r="2.8" fill="#2563eb"/><text x="250.0" y="898.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Reactivity data given in exam, not memorized</text><path d="M 560.0 985.0 C 630.0 985.0, 630.0 610.0, 700.0 610.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="260.0" y="961.0" width="300.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="410" y="981" text-anchor="middle" font-size="15.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">ELECTROCHEMICAL CELLS - OVERVIEW</text><text x="410" y="1000" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 3.2.5-3.2.8</text><rect x="220.0" y="1023.0" width="380.0" height="150.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="240.0" cy="1048.0" r="2.8" fill="#2563eb"/><text x="250.0" y="1052.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Oxidation at anode, reduction at cathode (always)</text><circle cx="240.0" cy="1072.0" r="2.8" fill="#2563eb"/><text x="250.0" y="1076.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Primary (voltaic) cells: spontaneous reaction -&gt; electricity</text><circle cx="240.0" cy="1096.0" r="2.8" fill="#2563eb"/><text x="250.0" y="1100.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Half-cells + salt bridge; e- flow anode -&gt; cathode</text><circle cx="240.0" cy="1120.0" r="2.8" fill="#2563eb"/><text x="250.0" y="1124.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Secondary (rechargeable) cells: reversible charge/discharge</text><circle cx="240.0" cy="1144.0" r="2.8" fill="#2563eb"/><text x="250.0" y="1148.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif">Electrolytic cells: electricity drives non-spontaneous reaction</text><path d="M 1000.0 610.0 C 1070.0 610.0, 1070.0 235.0, 1140.0 235.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1140.0" y="211.0" width="300.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="1290" y="231" text-anchor="middle" font-size="15.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">ORGANIC REDOX REACTIONS</text><text x="1290" y="250" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 3.2.9-3.2.11</text><rect x="1100.0" y="273.0" width="380.0" height="150.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="1120.0" cy="298.0" r="2.8" fill="#2563eb"/><text x="1130.0" y="302.0" font-size="12.3" fill="#1e3a8a" font-family="Arial, sans-serif