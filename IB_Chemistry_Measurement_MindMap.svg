<?xml version="1.0" encoding="UTF-8" standalone="no"?><svg viewBox="0 0 1760 1310" xmlns="http://www.w3.org/2000/svg" role="img"><title>IB Chemistry HL Measurement Mind Map</title><rect x="0" y="0" width="1760" height="1310" fill="#ffffff"/><text x="880.0" y="42" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a" font-family="Arial, sans-serif">IB Chemistry HL — Measurement</text><text x="880.0" y="66" text-anchor="middle" font-size="14" fill="#475569" font-family="Arial, sans-serif">Tools for Chemistry: experimental techniques, technology &amp; mathematics — applied throughout SL and HL</text><rect x="730.0" y="650.0" width="300.0" height="100.0" rx="16" ry="16" fill="#0f172a"/><text x="880" y="690" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">MEASUREMENT</text><text x="880" y="714" text-anchor="middle" font-size="13" font-weight="500" fill="#cbd5e1" font-family="Arial, sans-serif">Data &amp; Uncertainty</text><text x="880" y="734" text-anchor="middle" font-size="11.5" fill="#cbd5e1" font-family="Arial, sans-serif">HL IB Chemistry</text><path d="M 660.0 190.0 C 695.0 190.0, 695.0 700.0, 730.0 700.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="280.0" y="166.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="470" y="186" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">QUALITATIVE VS QUANTITATIVE DATA</text><text x="470" y="205" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Tool 1</text><rect x="240.0" y="228.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="260.0" cy="251.0" r="2.6" fill="#2563eb"/><text x="270.0" y="255.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Qualitative data: non-numerical observations (colour, smell, precipitate)</text><circle cx="260.0" cy="273.0" r="2.6" fill="#2563eb"/><text x="270.0" y="277.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Quantitative data: numerical measurements from apparatus</text><circle cx="260.0" cy="295.0" r="2.6" fill="#2563eb"/><text x="270.0" y="299.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">All measurements carry a degree of uncertainty</text><circle cx="260.0" cy="317.0" r="2.6" fill="#2563eb"/><text x="270.0" y="321.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Choose the data type appropriate to the investigation's aim</text><path d="M 660.0 398.0 C 695.0 398.0, 695.0 700.0, 730.0 700.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="280.0" y="374.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="470" y="394" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">RECORDING UNCERTAINTIES</text><text x="470" y="413" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Tool 1 &amp; 3</text><rect x="240.0" y="436.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="260.0" cy="459.0" r="2.6" fill="#2563eb"/><text x="270.0" y="463.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Instrumental uncertainty = +/- half the smallest scale division</text><circle cx="260.0" cy="481.0" r="2.6" fill="#2563eb"/><text x="270.0" y="485.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Record every measurement as a value +/- its uncertainty</text><circle cx="260.0" cy="503.0" r="2.6" fill="#2563eb"/><text x="270.0" y="507.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">State uncertainties to an appropriate level of precision</text><circle cx="260.0" cy="525.0" r="2.6" fill="#2563eb"/><text x="270.0" y="529.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Match significant figures in a result to the least precise measurement</text><path d="M 660.0 606.0 C 695.0 606.0, 695.0 700.0, 730.0 700.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="280.0" y="582.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="470" y="602" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">RANDOM VS SYSTEMATIC ERRORS</text><text x="470" y="621" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Tool 1 &amp; 3</text><rect x="240.0" y="644.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="260.0" cy="667.0" r="2.6" fill="#2563eb"/><text x="270.0" y="671.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Random errors cause scatter; reduced by repeating trials and averaging</text><circle cx="260.0" cy="689.0" r="2.6" fill="#2563eb"/><text x="270.0" y="693.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Systematic errors cause a consistent deviation in one direction</text><circle cx="260.0" cy="711.0" r="2.6" fill="#2563eb"/><text x="270.0" y="715.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Systematic errors are NOT reduced by repeating a measurement</text><circle cx="260.0" cy="733.0" r="2.6" fill="#2563eb"/><text x="270.0" y="737.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Distinguish precision (repeatability) from accuracy (closeness to true value)</text><path d="M 660.0 814.0 C 695.0 814.0, 695.0 700.0, 730.0 700.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="280.0" y="790.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="470" y="810" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">PROPAGATION OF UNCERTAINTIES</text><text x="470" y="829" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Tool 3</text><rect x="240.0" y="852.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="260.0" cy="875.0" r="2.6" fill="#2563eb"/><text x="270.0" y="879.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Addition/subtraction: sum the absolute uncertainties</text><circle cx="260.0" cy="897.0" r="2.6" fill="#2563eb"/><text x="270.0" y="901.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Multiplication/division: sum the percentage uncertainties</text><circle cx="260.0" cy="919.0" r="2.6" fill="#2563eb"/><text x="270.0" y="923.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Powers/roots: multiply the percentage uncertainty by the power</text><circle cx="260.0" cy="941.0" r="2.6" fill="#2563eb"/><text x="270.0" y="945.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Carry propagated uncertainty through a full multi-step calculation</text><path d="M 660.0 1022.0 C 695.0 1022.0, 695.0 700.0, 730.0 700.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="280.0" y="998.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="470" y="1018" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">PERCENTAGE ERROR &amp; UNCERTAINTY</text><text x="470" y="1037" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Tool 3</text><rect x="240.0" y="1060.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="260.0" cy="1083.0" r="2.6" fill="#2563eb"/><text x="270.0" y="1087.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Percentage uncertainty = (absolute uncertainty / measured value) x 100</text><circle cx="260.0" cy="1105.0" r="2.6" fill="#2563eb"/><text x="270.0" y="1109.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Percentage error compares an experimental result to an accepted value</text><circle cx="260.0" cy="1127.0" r="2.6" fill="#2563eb"/><text x="270.0" y="1131.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Percentage error = |experimental - accepted| / accepted x 100</text><circle cx="260.0" cy="1149.0" r="2.6" fill="#2563eb"/><text x="270.0" y="1153.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Interpret whether a percentage error is explained by uncertainty or error</text><path d="M 1030.0 700.0 C 1065.0 700.0, 1065.0 190.0, 1100.0 190.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="166.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="1290" y="186" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">GRAPHING &amp; DATA PROCESSING</text><text x="1290" y="205" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Tool 3</text><rect x="1060.0" y="228.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="1080.0" cy="251.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="255.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Plot a line/curve of best fit through experimental data points</text><circle cx="1080.0" cy="273.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="277.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Determine gradient and intercept, with correct units</text><circle cx="1080.0" cy="295.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="299.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Use error bars and max/min lines to estimate uncertainty in gradient</text><circle cx="1080.0" cy="317.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="321.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Linearize non-linear relationships (e.g. Arrhenius, rate-law plots)</text><path d="M 1030.0 700.0 C 1065.0 700.0, 1065.0 398.0, 1100.0 398.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="374.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="1290" y="394" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">APPARATUS SELECTION &amp; PRECISION</text><text x="1290" y="413" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Tool 1</text><rect x="1060.0" y="436.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="1080.0" cy="459.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="463.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Select apparatus with precision matching the required measurement</text><circle cx="1080.0" cy="481.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="485.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Compare precision: burette vs measuring cylinder vs volumetric flask</text><circle cx="1080.0" cy="503.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="507.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Balance readability (e.g. 2 d.p. vs 4 d.p.) affects mass uncertainty</text><circle cx="1080.0" cy="525.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="529.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Justify apparatus choice in terms of minimizing percentage uncertainty</text><path d="M 1030.0 700.0 C 1065.0 700.0, 1065.0 606.0, 1100.0 606.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="582.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="1290" y="602" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">TECHNOLOGY IN DATA COLLECTION</text><text x="1290" y="621" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Tool 2</text><rect x="1060.0" y="644.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="1080.0" cy="667.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="671.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Data loggers/sensors: temperature, pH, pressure, colorimetry probes</text><circle cx="1080.0" cy="689.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="693.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Continuous real-time data collection reduces human reaction-time error</text><circle cx="1080.0" cy="711.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="715.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Spreadsheets and software for processing, tabulating and graphing data</text><circle cx="1080.0" cy="733.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="737.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Databases, simulations and modelling software to support investigations</text><path d="M 1030.0 700.0 C 1065.0 700.0, 1065.0 814.0, 1100.0 814.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="790.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="1290" y="810" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">SIGNIFICANT FIGURES &amp; DATA BOOKLET VALUES</text><text x="1290" y="829" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Tool 3</text><rect x="1060.0" y="852.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="1080.0" cy="875.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="879.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Apply significant figure rules consistently through a calculation</text><circle cx="1080.0" cy="897.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="901.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Round only the final answer, not intermediate values</text><circle cx="1080.0" cy="919.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="923.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Use data-booklet constants (Ar, R, NA) to the precision given</text><circle cx="1080.0" cy="941.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="945.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Avoid over- or under-stating precision relative to raw data</text><path d="M 1030.0 700.0 C 1065.0 700.0, 1065.0 1022.0, 1100.0 1022.0" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="998.0" width="380.0" height="48.0" rx="10" ry="10" fill="#2563eb"/><text x="1290" y="1018" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">EXPERIMENTAL DESIGN &amp; IA SKILLS</text><text x="1290" y="1037" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Tool 1</text><rect x="1060.0" y="1060.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="1080.0" cy="1083.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="1087.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Identify and control independent, dependent and controlled variables</text><circle cx="1080.0" cy="1105.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="1109.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Address safety, ethical and environmental considerations</text><circle cx="1080.0" cy="1127.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="1131.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Evaluate limitations of a method and suggest realistic improvements</text><circle cx="1080.0" cy="1149.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="1153.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Justify the choice of method and its impact on data reliability</text><rect x="30.0" y="1256.0" width="16.0" height="16.0" rx="4" ry="4" fill="#2563eb"/><text x="54" y="1269" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">Core skills content (SL &amp; HL)</text><text x="1730" y="1269" text-anchor="end" font-size="11" fill="#94a3b8" font-family="Arial, sans-serif">IB Chemistry 2025 syllabus — Tools 1-3 (Experimental techniques, Technology, Mathematics)</text></svg>