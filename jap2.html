<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timeline of the Edo Period (1600–1868)</title>
<style>
  body { margin: 0; padding: 40px 0; background: #ffffff; display: flex; justify-content: center; }
</style>
</head>
<body>
<svg viewBox="0 0 900 1500" xmlns="http://www.w3.org/2000/svg" role="img" width="900" height="1500">
<title>Timeline of the Edo Period, 1600-1868</title>
<desc>A vertical timeline showing major events of Japan's Edo period from the Battle of Sekigahara in 1600 to the Meiji Restoration in 1868.</desc>
<style>
  .bg { fill: #ffffff; }
  .line { stroke: #d8d3cb; stroke-width: 3; }
  .dot { fill: #b5432a; }
  .year { font-family: Georgia, serif; font-size: 22px; font-weight: 700; fill: #b5432a; }
  .title { font-family: -apple-system, sans-serif; font-size: 17px; font-weight: 600; fill: #2b2620; }
  .desc { font-family: -apple-system, sans-serif; font-size: 13.5px; fill: #6b6459; }
  .header { font-family: Georgia, serif; font-size: 30px; font-weight: 700; fill: #2b2620; }
  .sub { font-family: -apple-system, sans-serif; font-size: 14px; fill: #6b6459; }
</style>
<rect class="bg" x="0" y="0" width="900" height="1500"/>
<text x="450" y="48" text-anchor="middle" class="header">The Edo Period</text>
<text x="450" y="72" text-anchor="middle" class="sub">Japan under Tokugawa rule, 1600 – 1868</text>

<line class="line" x1="450" y1="110" x2="450" y2="1450"/>

<!-- 1600 -->
<circle class="dot" cx="450" cy="130" r="7"/>
<text x="430" y="126" text-anchor="end" class="year">1600</text>
<text x="430" y="150" text-anchor="end" class="title">Battle of Sekigahara</text>
<text x="430" y="170" text-anchor="end" class="desc">Tokugawa Ieyasu defeats rivals,</text>
<text x="430" y="188" text-anchor="end" class="desc">securing control of Japan</text>

<!-- 1603 -->
<circle class="dot" cx="450" cy="220" r="7"/>
<text x="470" y="216" text-anchor="start" class="year">1603</text>
<text x="470" y="240" text-anchor="start" class="title">Tokugawa shogunate founded</text>
<text x="470" y="260" text-anchor="start" class="desc">Ieyasu named shogun; Edo</text>
<text x="470" y="278" text-anchor="start" class="desc">(Tokyo) becomes the seat of power</text>

<!-- 1615 -->
<circle class="dot" cx="450" cy="310" r="7"/>
<text x="430" y="306" text-anchor="end" class="year">1615</text>
<text x="430" y="330" text-anchor="end" class="title">Siege of Osaka</text>
<text x="430" y="350" text-anchor="end" class="desc">Toyotomi clan destroyed;</text>
<text x="430" y="368" text-anchor="end" class="desc">last major armed threat ends</text>

<!-- 1635 -->
<circle class="dot" cx="450" cy="400" r="7"/>
<text x="470" y="396" text-anchor="start" class="year">1635</text>
<text x="470" y="420" text-anchor="start" class="title">Sankin-kotai system</text>
<text x="470" y="440" text-anchor="start" class="desc">Daimyo required to alternate</text>
<text x="470" y="458" text-anchor="start" class="desc">residence in Edo, curbing revolt</text>

<!-- 1637 -->
<circle class="dot" cx="450" cy="490" r="7"/>
<text x="430" y="486" text-anchor="end" class="year">1637</text>
<text x="430" y="510" text-anchor="end" class="title">Shimabara Rebellion</text>
<text x="430" y="530" text-anchor="end" class="desc">Christian peasant uprising</text>
<text x="430" y="548" text-anchor="end" class="desc">crushed; Christianity banned</text>

<!-- 1639 -->
<circle class="dot" cx="450" cy="580" r="7"/>
<text x="470" y="576" text-anchor="start" class="year">1639</text>
<text x="470" y="600" text-anchor="start" class="title">Sakoku (national seclusion)</text>
<text x="470" y="620" text-anchor="start" class="desc">Japan closes to most foreign</text>
<text x="470" y="638" text-anchor="start" class="desc">trade and contact for 2 centuries</text>

<!-- 1657 -->
<circle class="dot" cx="450" cy="670" r="7"/>
<text x="430" y="666" text-anchor="end" class="year">1657</text>
<text x="430" y="690" text-anchor="end" class="title">Great Fire of Meireki</text>
<text x="430" y="710" text-anchor="end" class="desc">Edo largely destroyed;</text>
<text x="430" y="728" text-anchor="end" class="desc">later rebuilt and expanded</text>

<!-- 1688-1704 -->
<circle class="dot" cx="450" cy="760" r="7"/>
<text x="470" y="756" text-anchor="start" class="year">1688–1704</text>
<text x="470" y="780" text-anchor="start" class="title">Genroku era</text>
<text x="470" y="800" text-anchor="start" class="desc">Flourishing of kabuki, ukiyo-e,</text>
<text x="470" y="818" text-anchor="start" class="desc">and merchant culture</text>

<!-- 1720 -->
<circle class="dot" cx="450" cy="850" r="7"/>
<text x="430" y="846" text-anchor="end" class="year">1720</text>
<text x="430" y="870" text-anchor="end" class="title">Kyoho Reforms</text>
<text x="430" y="890" text-anchor="end" class="desc">Shogun Yoshimune eases book ban,</text>
<text x="430" y="908" text-anchor="end" class="desc">reforms finances and law</text>

<!-- 1782-1788 -->
<circle class="dot" cx="450" cy="940" r="7"/>
<text x="470" y="936" text-anchor="start" class="year">1782–1788</text>
<text x="470" y="960" text-anchor="start" class="title">Tenmei famine</text>
<text x="470" y="980" text-anchor="start" class="desc">Mass starvation and unrest</text>
<text x="470" y="998" text-anchor="start" class="desc">destabilize the shogunate</text>

<!-- 1841-1843 -->
<circle class="dot" cx="450" cy="1030" r="7"/>
<text x="430" y="1026" text-anchor="end" class="year">1841–1843</text>
<text x="430" y="1050" text-anchor="end" class="title">Tenpo Reforms</text>
<text x="430" y="1070" text-anchor="end" class="desc">Austerity measures fail to</text>
<text x="430" y="1088" text-anchor="end" class="desc">fix mounting economic strain</text>

<!-- 1853 -->
<circle class="dot" cx="450" cy="1120" r="7"/>
<text x="470" y="1116" text-anchor="start" class="year">1853</text>
<text x="470" y="1140" text-anchor="start" class="title">Perry's "Black Ships"</text>
<text x="470" y="1160" text-anchor="start" class="desc">US fleet forces Japan to</text>
<text x="470" y="1178" text-anchor="start" class="desc">open to foreign trade</text>

<!-- 1858 -->
<circle class="dot" cx="450" cy="1210" r="7"/>
<text x="430" y="1206" text-anchor="end" class="year">1858</text>
<text x="430" y="1230" text-anchor="end" class="title">Unequal treaties signed</text>
<text x="430" y="1250" text-anchor="end" class="desc">Harris Treaty and others open</text>
<text x="430" y="1268" text-anchor="end" class="desc">ports; fuel anti-shogunate anger</text>

<!-- 1867 -->
<circle class="dot" cx="450" cy="1300" r="7"/>
<text x="470" y="1296" text-anchor="start" class="year">1867</text>
<text x="470" y="1320" text-anchor="start" class="title">Taisei Hokan</text>
<text x="470" y="1340" text-anchor="start" class="desc">Shogun Yoshinobu returns</text>
<text x="470" y="1358" text-anchor="start" class="desc">political power to the emperor</text>

<!-- 1868 -->
<circle class="dot" cx="450" cy="1390" r="9" stroke="#b5432a" stroke-width="2" fill="#ffffff"/>
<circle class="dot" cx="450" cy="1390" r="4"/>
<text x="430" y="1386" text-anchor="end" class="year">1868</text>
<text x="430" y="1410" text-anchor="end" class="title">Meiji Restoration</text>
<text x="430" y="1430" text-anchor="end" class="desc">Edo period ends; imperial rule</text>
<text x="430" y="1448" text-anchor="end" class="desc">restored, modernization begins</text>

</svg>
</body>
</html>
