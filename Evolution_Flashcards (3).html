<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Evolution Key Terms — Flip Cards</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#080f0e;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{background:#040a09;border-bottom:2px solid #1a3a2e;padding:14px 22px;display:flex;flex-direction:column;gap:10px}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header-title{font-size:1rem;font-weight:800;color:#a7f3d0}
.header-sub{font-size:.7rem;color:#2d5a4a;margin-top:2px}
.stats{display:flex;gap:10px;align-items:center}
.stat{font-size:.72rem;color:#1a3a2e}
.stat span{color:#10b981;font-weight:700}

/* CONTROLS */
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.filter-btn{padding:5px 13px;border-radius:99px;border:1.5px solid #1a3a2e;background:#060f0c;color:#2d5a4a;font-family:inherit;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:#10b981;color:#a7f3d0}
.filter-btn.active{border-color:currentColor;color:#e2e8f0}
.filter-btn[data-cat="all"].active{background:#07130f;border-color:#10b981;color:#6ee7b7}
.filter-btn[data-cat="fossil"].active{background:#1a0e00;border-color:#f59e0b;color:#fbbf24}
.filter-btn[data-cat="anatomy"].active{background:#001a18;border-color:#0d9488;color:#99f6e4}
.filter-btn[data-cat="embryo"].active{background:#1a0d2e;border-color:#8b5cf6;color:#c4b5fd}
.filter-btn[data-cat="mechanism"].active{background:#071507;border-color:#10b981;color:#86efac}
.filter-btn[data-cat="skills"].active{background:#000d1a;border-color:#38bdf8;color:#7dd3fc}

.ctrl-sep{width:1px;height:20px;background:#1a3a2e}
.ctrl-btn{padding:5px 13px;border-radius:8px;border:1px solid #1a3a2e;background:#060f0c;color:#4b7a6a;font-family:inherit;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .15s}
.ctrl-btn:hover{background:#0d2e20;color:#a7f3d0}

/* PROGRESS BAR */
.prog-wrap{display:flex;align-items:center;gap:8px}
.prog-bar-outer{flex:1;height:5px;background:#1a3a2e;border-radius:99px;overflow:hidden}
.prog-bar-inner{height:100%;background:#10b981;border-radius:99px;transition:width .4s}
.prog-label{font-size:.65rem;color:#1a3a2e;white-space:nowrap}

/* CARD GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;padding:20px 22px;flex:1}

/* FLIP CARD */
.card-wrap{perspective:1000px;height:160px;cursor:pointer}
.card-wrap.hidden{display:none}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.card-wrap.flipped .card{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:14px;text-align:center;border:1.5px solid #1a3a2e;transition:border-color .2s}
.card-front{background:#060f0c}
.card-back{background:#03080a;transform:rotateY(180deg)}

/* CAT COLOUR THEMING */
.card-wrap[data-cat="fossil"] .card-front{border-color:#854d0e}
.card-wrap[data-cat="fossil"] .card-front:hover{border-color:#f59e0b}
.card-wrap[data-cat="fossil"] .cat-badge{background:#1a0e00;color:#fbbf24;border-color:#854d0e}
.card-wrap[data-cat="fossil"] .card-back{border-color:#854d0e}
.card-wrap[data-cat="fossil"] .flip-hint{color:#854d0e}

.card-wrap[data-cat="anatomy"] .card-front{border-color:#0d6e68}
.card-wrap[data-cat="anatomy"] .card-front:hover{border-color:#0d9488}
.card-wrap[data-cat="anatomy"] .cat-badge{background:#001a18;color:#99f6e4;border-color:#0d6e68}
.card-wrap[data-cat="anatomy"] .card-back{border-color:#0d6e68}
.card-wrap[data-cat="anatomy"] .flip-hint{color:#0d6e68}

.card-wrap[data-cat="embryo"] .card-front{border-color:#4c1d95}
.card-wrap[data-cat="embryo"] .card-front:hover{border-color:#8b5cf6}
.card-wrap[data-cat="embryo"] .cat-badge{background:#1a0d2e;color:#c4b5fd;border-color:#4c1d95}
.card-wrap[data-cat="embryo"] .card-back{border-color:#4c1d95}
.card-wrap[data-cat="embryo"] .flip-hint{color:#4c1d95}

.card-wrap[data-cat="mechanism"] .card-front{border-color:#166534}
.card-wrap[data-cat="mechanism"] .card-front:hover{border-color:#10b981}
.card-wrap[data-cat="mechanism"] .cat-badge{background:#071507;color:#86efac;border-color:#166534}
.card-wrap[data-cat="mechanism"] .card-back{border-color:#166534}
.card-wrap[data-cat="mechanism"] .flip-hint{color:#166534}

.card-wrap[data-cat="skills"] .card-front{border-color:#0c4a6e}
.card-wrap[data-cat="skills"] .card-front:hover{border-color:#38bdf8}
.card-wrap[data-cat="skills"] .cat-badge{background:#000d1a;color:#7dd3fc;border-color:#0c4a6e}
.card-wrap[data-cat="skills"] .card-back{border-color:#0c4a6e}
.card-wrap[data-cat="skills"] .flip-hint{color:#0c4a6e}

/* CARD CONTENTS */
.cat-badge{font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 8px;border-radius:99px;border:1px solid;margin-bottom:8px}
.card-term{font-size:.95rem;font-weight:800;color:#f0fdf4;line-height:1.25;margin-bottom:6px}
.flip-hint{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:6px;opacity:.7}
.card-def{font-size:.72rem;color:#94a3b8;line-height:1.65;text-align:left;width:100%}
.card-def strong{color:#e2e8f0;font-weight:700}
.card-ex{font-size:.67rem;color:#1a3a2e;margin-top:7px;padding-top:7px;border-top:1px solid #1a3a2e;text-align:left;width:100%;line-height:1.55;font-style:italic}
.card-ex em{color:#2d5a4a}

/* REVIEWED DOT */
.card-wrap.reviewed .card-front::after{content:'✓';position:absolute;top:8px;right:10px;font-size:.7rem;color:#10b981;font-weight:800}

/* EMPTY STATE */
.empty{display:none;grid-column:1/-1;text-align:center;padding:40px;color:#1a3a2e;font-size:.85rem}

/* FOOTER */
.footer{background:#040a09;border-top:1px solid #1a3a2e;padding:10px 22px;font-size:.66rem;color:#1a3a2e;text-align:center}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">🃏 Evolution — Key Terms Revision</div>
      <div class="header-sub">Click any card to flip it &nbsp;·&nbsp; Evidence for Evolution &amp; NGSS Practice Activities</div>
    </div>
    <div class="stats">
      <div class="stat">Showing <span id="stat-showing">0</span> cards</div>
      <div class="stat">Reviewed <span id="stat-reviewed">0</span> / <span id="stat-total">0</span></div>
    </div>
  </div>
  <div class="controls">
    <button class="filter-btn active" data-cat="all" onclick="setFilter('all')">All categories</button>
    <button class="filter-btn" data-cat="fossil" onclick="setFilter('fossil')">🦷 Fossil Evidence</button>
    <button class="filter-btn" data-cat="anatomy" onclick="setFilter('anatomy')">🦴 Comparative Anatomy</button>
    <button class="filter-btn" data-cat="embryo" onclick="setFilter('embryo')">🥚 Embryology</button>
    <button class="filter-btn" data-cat="mechanism" onclick="setFilter('mechanism')">⚙️ Evolution Mechanisms</button>
    <button class="filter-btn" data-cat="skills" onclick="setFilter('skills')">🔬 Science Skills</button>
    <div class="ctrl-sep"></div>
    <button class="ctrl-btn" onclick="shuffleCards()">🔀 Shuffle</button>
    <button class="ctrl-btn" onclick="resetAll()">↺ Reset</button>
  </div>
  <div class="prog-wrap">
    <div class="prog-bar-outer"><div class="prog-bar-inner" id="prog-bar" style="width:0%"></div></div>
    <div class="prog-label" id="prog-label">0% reviewed</div>
  </div>
</div>

<div class="grid" id="grid">
  <div class="empty" id="empty-msg">No cards match this filter.</div>
</div>

<div class="footer">FIS Science 8 &nbsp;·&nbsp; Evidence for Evolution activities &nbsp;·&nbsp; Click to flip · Reviewed cards show a ✓</div>

<script>
const CARDS = [
  // ── FOSSIL EVIDENCE ────────────────────────────────────────────────────────
  {
    cat:'fossil', term:'Fossil',
    def:'Preserved physical evidence of a past organism — including bones, shells, imprints, and traces.',
    ex:'Example: A horse tooth preserved in limestone 50 million years ago.'
  },
  {
    cat:'fossil', term:'Rock strata',
    def:'Layers of sedimentary rock that build up over time. <strong>Deeper layers are older</strong>, surface layers are newer.',
    ex:'Also called the "Law of Superposition" — used to date fossils by which layer they\'re found in.'
  },
  {
    cat:'fossil', term:'Transitional organism',
    def:'A fossil species showing characteristics of <strong>both an ancestor and a descendant</strong> group — an "in-between" form.',
    ex:'In the horse forelimb sequence: species X and Y are transitional, bridging 3-toed W and 1-toed Z.'
  },
  {
    cat:'fossil', term:'Fossil record',
    def:'The complete collection of all fossils ever discovered and their positions in rock layers, providing a timeline of life on Earth.',
    ex:'The fossil record shows that species alive today are different from those that lived millions of years ago.'
  },
  {
    cat:'fossil', term:'Sedimentary rock',
    def:'Rock formed from layers of sediment (sand, silt, mud) compacted over millions of years. The main rock type in which fossils form.',
    ex:'Organisms buried in river sediment can be preserved as sedimentary layers harden around them.'
  },
  {
    cat:'fossil', term:'Vestigial structure',
    def:'A body structure that has become reduced or non-functional in a modern species, but was functional in an ancestor.',
    ex:'The tiny side-toe remnants in the modern horse (species Z) are vestigial — inherited from 3-toed ancestors.'
  },

  // ── COMPARATIVE ANATOMY ────────────────────────────────────────────────────
  {
    cat:'anatomy', term:'Comparative anatomy',
    def:'The study of similarities and differences in the body structures of different species to reveal evolutionary relationships.',
    ex:'Comparing the skeletons of chimpanzees, gorillas, and orangutans reveals their shared ancestry.'
  },
  {
    cat:'anatomy', term:'Homologous structures',
    def:'Structures in different species that are <strong>similar because they were inherited from a shared ancestor</strong>, even if they look different or serve different functions today.',
    ex:'A human arm, a bat\'s wing, and a whale\'s flipper — all share the same underlying bone structure.'
  },
  {
    cat:'anatomy', term:'Analogous structures',
    def:'Structures that look similar or do the same job in different species, but <strong>did NOT come from a shared ancestor</strong> — they evolved independently.',
    ex:'A bat\'s wing and an insect\'s wing both allow flight but evolved completely separately. Looking similar does NOT mean related.'
  },
  {
    cat:'anatomy', term:'Divergent evolution',
    def:'When one ancestral population splits into groups in different habitats, and <strong>each group evolves differently</strong> as natural selection favours different traits in each environment.',
    ex:'Chimpanzees and orangutans both descended from a common ape ancestor, but diverged as they adapted to different habitats.'
  },
  {
    cat:'anatomy', term:'Cladogram',
    def:'A branching diagram that shows the <strong>evolutionary relationships</strong> between species, based on shared characteristics. Branches closer together = more recently shared ancestor.',
    ex:'A cladogram can show that bats and humans share a more recent common ancestor than bats and owls.'
  },
  {
    cat:'anatomy', term:'Common ancestor',
    def:'A species from which two or more different species both descended. The more recent the common ancestor, the more closely related the species.',
    ex:'Humans and bats share a common ancestor more recently than bats and owls — so bats are more closely related to humans.'
  },
  {
    cat:'anatomy', term:'Biogeography',
    def:'The study of where species live and how their geographical distribution provides evidence for evolution and common ancestry.',
    ex:'Similar species found on geographically separated continents suggest they descended from a common ancestor before the continents drifted apart.'
  },

  // ── EMBRYOLOGY ─────────────────────────────────────────────────────────────
  {
    cat:'embryo', term:'Embryo',
    def:'An organism in its earliest stages of development, before it is born or hatches.',
    ex:'Tortoise and chicken embryos look nearly identical in the early and middle stages of development.'
  },
  {
    cat:'embryo', term:'Comparative embryology',
    def:'Comparing the embryos of different species to find similarities in their developmental patterns, which reveal shared ancestry.',
    ex:'Tortoise and chicken embryos follow a similar pattern of body development — even though the adults look very different.'
  },
  {
    cat:'embryo', term:'Developmental pattern',
    def:'The <strong>sequence and way in which body structures appear and grow</strong> during embryonic development. Controlled by genes inherited from ancestors.',
    ex:'Both tortoises and chickens develop a C-shaped body, then paddle-shaped limb buds, then pharyngeal arches — in the same order.'
  },
  {
    cat:'embryo', term:'Pharyngeal arches',
    def:'Gill-like structures that appear in the embryos of all vertebrates (fish, reptiles, birds, mammals). In fish they become gills; in others they develop into facial and throat structures.',
    ex:'Humans, bats, and birds all have pharyngeal arches as embryos — evidence they all share a common vertebrate ancestor.'
  },
  {
    cat:'embryo', term:'Conserved genes',
    def:'Genes that have changed very little over millions of years of evolution because they control essential developmental processes. Shared conserved genes indicate common ancestry.',
    ex:'The Hox genes that control body layout are found in nearly identical form in flies, fish, mice, and humans.'
  },

  // ── EVOLUTION MECHANISMS ───────────────────────────────────────────────────
  {
    cat:'mechanism', term:'Natural selection',
    def:'The process by which individuals with traits that help them survive and reproduce <strong>pass those traits on more often</strong>, causing beneficial traits to become more common over generations.',
    ex:'As horse habitats changed from forest to grassland, horses with fewer larger toes ran faster and survived more — passing on that trait.'
  },
  {
    cat:'mechanism', term:'Evolution',
    def:'Change in the heritable characteristics of a population over successive generations, driven by mechanisms such as natural selection.',
    ex:'The horse forelimb changed from 3 equal toes to 1 large toe over millions of years through evolution.'
  },
  {
    cat:'mechanism', term:'Speciation',
    def:'The process by which one ancestral species gradually splits into two or more distinct species, usually because populations become isolated and accumulate different adaptations.',
    ex:'Chimpanzees, gorillas, and orangutans all descended from a shared ancestor, but speciated as populations became separated in different African and Asian habitats.'
  },
  {
    cat:'mechanism', term:'Adaptation',
    def:'A heritable trait that increases an organism\'s ability to survive and reproduce in its environment. Adaptations build up over many generations through natural selection.',
    ex:'The single large toe of modern horses is an adaptation for running efficiently on hard, open grassland.'
  },
  {
    cat:'mechanism', term:'Convergent evolution',
    def:'When unrelated species independently evolve <strong>similar traits</strong> because they face similar environmental challenges — producing analogous structures.',
    ex:'Bats and insects both evolved wings for flight, but from completely different ancestral structures — this is convergent evolution.'
  },
  {
    cat:'mechanism', term:'Variation',
    def:'Differences in traits between individuals of the same species. Variation provides the raw material for natural selection — some variants are more likely to survive than others.',
    ex:'In the transitional horse populations, some individuals had a slightly more dominant middle toe than others — those individuals had an advantage.'
  },
  {
    cat:'mechanism', term:'Inheritance',
    def:'The passing of heritable traits from parents to offspring through genes. For natural selection to produce evolution, traits must be inheritable.',
    ex:'Horses with advantageous toe structures passed those structural genes to their offspring, gradually shifting the population over time.'
  },

  // ── SCIENCE SKILLS ─────────────────────────────────────────────────────────
  {
    cat:'skills', term:'CER Framework',
    def:'<strong>Claim – Evidence – Reasoning.</strong> A structure for scientific explanations: state your claim, provide specific evidence, then explain WHY the evidence supports the claim.',
    ex:'Claim: bats are more closely related to humans. Evidence: homologous forelimb bones. Reasoning: homologous structures = shared ancestor.'
  },
  {
    cat:'skills', term:'Claim',
    def:'A statement that answers the question or solves the problem. It should be specific and directly testable.',
    ex:'"Bats have a more recent common ancestor with humans than with owls" is a claim — it can be tested with anatomical, embryological, and DNA evidence.'
  },
  {
    cat:'skills', term:'Evidence',
    def:'Specific, observable data that supports or refutes a claim. Good evidence is precise — it names the structures, measurements, or observations involved.',
    ex:'"Bats and humans both have a humerus, radius, ulna, and five-fingered digit arrangement" is specific evidence from comparative anatomy.'
  },
  {
    cat:'skills', term:'Reasoning',
    def:'The explanation of <strong>why</strong> the evidence supports the claim, using scientific principles. This is what connects your evidence to your conclusion.',
    ex:'"Because homologous bone structures are inherited from a shared ancestor, similar forelimb bones indicate recent common ancestry."'
  },
  {
    cat:'skills', term:'NGSS MS-LS4-1',
    def:'<strong>Fossil record standard.</strong> Analyse and interpret data for patterns in the fossil record that document the existence, diversity, extinction, and change of life forms.',
    ex:'Using rock layer position to determine relative age of horse fossils, then describing the structural changes observed from W to Z.'
  },
  {
    cat:'skills', term:'NGSS MS-LS4-2',
    def:'<strong>Comparative anatomy standard.</strong> Apply scientific ideas about anatomical similarities and differences to infer evolutionary relationships.',
    ex:'Identifying homologous skeletal structures in chimpanzees, gorillas, and orangutans as evidence they share a common ancestor.'
  },
  {
    cat:'skills', term:'NGSS MS-LS4-3',
    def:'<strong>Embryology standard.</strong> Analyse displays of embryological development patterns across multiple species to identify evolutionary relationships.',
    ex:'Using the similar early developmental pattern in tortoise and chicken embryos as evidence of shared ancestry.'
  }
];

// ── STATE ───────────────────────────────────────────────────────────────────
let currentFilter = 'all';
let order = CARDS.map((_,i) => i);
const reviewed = new Set();

// ── BUILD ───────────────────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="empty" id="empty-msg">No cards match this filter.</div>';

  CARDS.forEach((c, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    wrap.dataset.cat = c.cat;
    wrap.dataset.idx = i;
    wrap.setAttribute('role', 'button');
    wrap.setAttribute('tabindex', '0');
    wrap.innerHTML = `
      <div class="card">
        <div class="card-face card-front">
          <div class="cat-badge">${catLabel(c.cat)}</div>
          <div class="card-term">${c.term}</div>
          <div class="flip-hint">Tap to reveal ▸</div>
        </div>
        <div class="card-face card-back">
          <div class="card-def">${c.def}</div>
          <div class="card-ex"><em>📌 ${c.ex}</em></div>
        </div>
      </div>`;
    wrap.addEventListener('click', () => flipCard(wrap, i));
    wrap.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') flipCard(wrap, i); });
    grid.appendChild(wrap);
  });

  applyOrder();
  applyFilter();
  updateStats();
}

function catLabel(cat) {
  return {fossil:'🦷 Fossil Evidence', anatomy:'🦴 Comparative Anatomy', embryo:'🥚 Embryology', mechanism:'⚙️ Evolution Mechanisms', skills:'🔬 Science Skills'}[cat] || cat;
}

function flipCard(wrap, idx) {
  wrap.classList.toggle('flipped');
  if (!reviewed.has(idx)) {
    reviewed.add(idx);
    wrap.classList.add('reviewed');
  }
  updateStats();
}

// ── FILTER ──────────────────────────────────────────────────────────────────
function setFilter(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  applyFilter();
  updateStats();
}

function applyFilter() {
  let visible = 0;
  document.querySelectorAll('.card-wrap[data-idx]').forEach(w => {
    const show = currentFilter === 'all' || w.dataset.cat === currentFilter;
    w.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('empty-msg').style.display = visible === 0 ? 'block' : 'none';
  document.getElementById('stat-showing').textContent = visible;
}

// ── ORDER ───────────────────────────────────────────────────────────────────
function applyOrder() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty-msg');
  order.forEach(i => {
    const w = document.querySelector(`.card-wrap[data-idx="${i}"]`);
    if (w) grid.insertBefore(w, empty);
  });
}

function shuffleCards() {
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  applyOrder();
  // Unflip all
  document.querySelectorAll('.card-wrap.flipped').forEach(w => w.classList.remove('flipped'));
}

function resetAll() {
  order = CARDS.map((_,i) => i);
  reviewed.clear();
  applyOrder();
  document.querySelectorAll('.card-wrap').forEach(w => {
    w.classList.remove('flipped', 'reviewed');
  });
  updateStats();
}

// ── STATS ───────────────────────────────────────────────────────────────────
function updateStats() {
  const visibleCards = [...document.querySelectorAll('.card-wrap[data-idx]:not(.hidden)')];
  const visCount = visibleCards.length;
  const revCount = visibleCards.filter(w => reviewed.has(+w.dataset.idx)).length;
  const total = CARDS.length;
  const totalRev = reviewed.size;

  document.getElementById('stat-showing').textContent = visCount;
  document.getElementById('stat-reviewed').textContent = totalRev;
  document.getElementById('stat-total').textContent = total;

  const pct = total === 0 ? 0 : Math.round(totalRev / total * 100);
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-label').textContent = pct + '% reviewed';
}

// ── INIT ─────────────────────────────────────────────────────────────────────
buildGrid();
</script>
</body>
</html>
