<?xml version="1.0" encoding="UTF-8" standalone="no"?><svg viewBox="0 0 3600 2570" xmlns="http://www.w3.org/2000/svg" role="img"><title>Van t Hoff Entropy Nernst Overlap Mind Map</title><rect x="0" y="0" width="3600" height="2570" fill="#ffffff"/><text x="40" y="150" text-anchor="start" font-size="144" font-weight="800" fill="#0f172a" font-family="'Century Gothic','Trebuchet MS','Futura',sans-serif">Nernst, Van't Hoff &amp; Entropy —</text><text x="3560" y="315" text-anchor="end" font-size="144" font-weight="800" fill="#0f172a" font-family="'Century Gothic','Trebuchet MS','Futura',sans-serif">Where the Ideas Overlap</text><text x="1800.0" y="365" text-anchor="middle" font-size="36" fill="#475569" font-family="Arial, sans-serif">Temperature &amp; concentration effects on reduction potential — linking Energetics, Equilibrium, Redox and Kinetics (HL)</text><g transform="scale(2) translate(20,200)"><rect x="650.0" y="372.0" width="460.0" height="110.0" rx="10" ry="10" fill="#1d4ed8"/><text x="880" y="442.4" text-anchor="middle" font-size="48" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">∆G</text><rect x="650.0" y="496.0" width="460.0" height="116.0" rx="10" ry="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><circle cx="670.0" cy="519.0" r="2.6" fill="#1d4ed8"/><text x="680.0" y="523.0" font-size="11.6" fill="#1e3a8a" font-family="Arial, sans-serif">∆G = -RT ln K (thermodynamics: Gibbs energy vs equilibrium constant)</text><circle cx="670.0" cy="541.0" r="2.6" fill="#1d4ed8"/><text x="680.0" y="545.0" font-size="11.6" fill="#1e3a8a" font-family="Arial, sans-serif">∆G = -nFE (electrochemistry: Gibbs energy vs cell potential)</text><circle cx="670.0" cy="563.0" r="2.6" fill="#1d4ed8"/><text x="680.0" y="567.0" font-size="11.6" fill="#1e3a8a" font-family="Arial, sans-serif">Setting these equal: ln K = nFE / RT links redox and equilibrium</text><circle cx="670.0" cy="585.0" r="2.6" fill="#1d4ed8"/><text x="680.0" y="589.0" font-size="11.6" fill="#1e3a8a" font-family="Arial, sans-serif">Both equations are given in the IB data booklet (R1.4.2 &amp; R3.2.14)</text><path d="M 580.0 190.0 C 592.6 190.0, 592.6 492.0, 650.0 492.0" fill="none" stroke="#059669" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="180.0" y="166.0" width="400.0" height="48.0" rx="10" ry="10" fill="#059669"/><text x="380" y="194.6" text-anchor="middle" font-size="14.5" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">CONTEXT: IA APPLICATION</text><rect x="140.0" y="228.0" width="480.0" height="116.0" rx="10" ry="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/><circle cx="160.0" cy="251.0" r="2.6" fill="#059669"/><text x="170.0" y="255.0" font-size="11.6" fill="#065f46" font-family="Arial, sans-serif">Measure a half-cell's standard electrode potential across a T range</text><circle cx="160.0" cy="273.0" r="2.6" fill="#059669"/><text x="170.0" y="277.0" font-size="11.6" fill="#065f46" font-family="Arial, sans-serif">Also vary electrolyte concentration; apply the Nernst equation to correct E</text><circle cx="160.0" cy="295.0" r="2.6" fill="#059669"/><text x="170.0" y="299.0" font-size="11.6" fill="#065f46" font-family="Arial, sans-serif">Plot E vs T to extract both ∆H and ∆S for the half-reaction</text><circle cx="160.0" cy="317.0" r="2.6" fill="#059669"/><text x="170.0" y="321.0" font-size="11.6" fill="#065f46" font-family="Arial, sans-serif">A genuine extension combining Reactivity 1.4, 2.3 and 3.2 content</text><path d="M 580.0 398.0 C 592.6 398.0, 592.6 492.0, 650.0 492.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="180.0" y="374.0" width="400.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="380" y="400.0" text-anchor="middle" font-size="14.5" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">ESTIMATING ∆S FROM ELECTROCHEMICAL DATA</text><text x="380" y="413" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Method</text><rect x="140.0" y="436.0" width="480.0" height="116.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="160.0" cy="459.0" r="2.6" fill="#7c3aed"/><text x="170.0" y="463.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">Method A: measure E at several temperatures, plot E vs T, ∆S = nF x slope</text><circle cx="160.0" cy="481.0" r="2.6" fill="#7c3aed"/><text x="170.0" y="485.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">Method B: thermodynamic shortcut ∆S = nF (∆E/∆T)</text><circle cx="160.0" cy="503.0" r="2.6" fill="#7c3aed"/><text x="170.0" y="507.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">∆E/∆T is called the 'temperature coefficient' of the cell</text><circle cx="160.0" cy="525.0" r="2.6" fill="#7c3aed"/><text x="170.0" y="529.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">Units check: V/K x C/mol = J K-1 mol-1, the correct units for entropy</text><path d="M 580.0 606.0 C 592.6 606.0, 592.6 492.0, 650.0 492.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="180.0" y="582.0" width="400.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="380" y="608.0" text-anchor="middle" font-size="14.5" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">VAN'T HOFF EQUATION</text><text x="380" y="621" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Advanced / extension</text><rect x="140.0" y="644.0" width="480.0" height="116.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="160.0" cy="667.0" r="2.6" fill="#7c3aed"/><text x="170.0" y="671.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">d(ln K)/d∆T = ∆H / (RT^2); integrates to ln K = -∆H/RT + ∆S/R</text><circle cx="160.0" cy="689.0" r="2.6" fill="#7c3aed"/><text x="170.0" y="693.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">Straight-line form: plot ln K vs 1/T -&gt; slope = -∆H/R, intercept = ∆S/R</text><circle cx="160.0" cy="711.0" r="2.6" fill="#7c3aed"/><text x="170.0" y="715.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">Assumes ∆H and ∆S stay constant over the temperature range studied</text><circle cx="160.0" cy="733.0" r="2.6" fill="#7c3aed"/><text x="170.0" y="737.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">Not explicitly named in the IB syllabus, but built entirely from HL content</text><path d="M 580.0 814.0 C 592.6 814.0, 592.6 492.0, 650.0 492.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="180.0" y="780.0" width="400.0" height="68.0" rx="10" ry="10" fill="#7c3aed"/><text x="380" y="799" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">DERIVE THE RELATIONSHIP BETWEEN</text><text x="380" y="815" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">E° AND ABSOLUTE TEMPERATURE, T</text><text x="380" y="836" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif" font-style="italic">Advanced</text><rect x="140.0" y="862.0" width="480.0" height="116.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="160.0" cy="885.0" r="2.6" fill="#7c3aed"/><text x="170.0" y="889.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">Combine ln K = nFE/RT with the integrated van't Hoff equation</text><circle cx="160.0" cy="907.0" r="2.6" fill="#7c3aed"/><text x="170.0" y="911.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">Result: E = -∆H/(nF) + (∆S/nF) x T -- a straight line in E vs T</text><circle cx="160.0" cy="929.0" r="2.6" fill="#7c3aed"/><text x="170.0" y="933.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">Slope of an E vs T plot = ∆S/(nF); relates to entropy of the half-cell</text><circle cx="160.0" cy="951.0" r="2.6" fill="#7c3aed"/><text x="170.0" y="955.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">Extends Reactivity 3.2.12-3.2.14 (HL), which covers E only at standard T</text><path d="M 1110.0 492.0 C 1122.6 492.0, 1122.6 190.0, 1180.0 190.0" fill="none" stroke="#b45309" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1180.0" y="166.0" width="400.0" height="48.0" rx="10" ry="10" fill="#b45309"/><text x="1380" y="192.0" text-anchor="middle" font-size="14.5" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">IB SYLLABUS SECTIONS</text><text x="1380" y="205" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Where this sits in the guide</text><rect x="1140.0" y="228.0" width="480.0" height="116.0" rx="10" ry="10" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/><circle cx="1160.0" cy="251.0" r="2.6" fill="#b45309"/><text x="1170.0" y="255.0" font-size="11.6" fill="#78350f" font-family="Arial, sans-serif">Reactivity 1.4 Entropy and spontaneity (HL): ∆S, ∆G = ∆H - T∆S</text><circle cx="1160.0" cy="273.0" r="2.6" fill="#b45309"/><text x="1170.0" y="277.0" font-size="11.6" fill="#78350f" font-family="Arial, sans-serif">Reactivity 2.2.12 Arrhenius equation (HL): analogous ln vs 1/T plot</text><circle cx="1160.0" cy="295.0" r="2.6" fill="#b45309"/><text x="1170.0" y="299.0" font-size="11.6" fill="#78350f" font-family="Arial, sans-serif">Reactivity 2.3.7 Equilibrium constant and ∆G (HL): direct K/∆G link</text><circle cx="1160.0" cy="317.0" r="2.6" fill="#b45309"/><text x="1170.0" y="321.0" font-size="11.6" fill="#78350f" font-family="Arial, sans-serif">Reactivity 3.2.12-3.2.14 Electrode potential &amp; ∆G = -nFEcell (HL)</text><path d="M 1110.0 492.0 C 1122.6 492.0, 1122.6 398.0, 1180.0 398.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1180.0" y="364.0" width="400.0" height="68.0" rx="10" ry="10" fill="#7c3aed"/><text x="1380" y="383" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">REDOX &lt;-&gt; EQUILIBRIUM: ONE</text><text x="1380" y="399" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">REACTION, TWO VIEWS</text><text x="1380" y="420" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.3 &amp; 3.2 (HL)</text><rect x="1140.0" y="446.0" width="480.0" height="116.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1160.0" cy="469.0" r="2.6" fill="#7c3aed"/><text x="1170.0" y="473.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">K describes the equilibrium position; Ecell describes the driving force</text><circle cx="1160.0" cy="491.0" r="2.6" fill="#7c3aed"/><text x="1170.0" y="495.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">Both derive from the same ∆G, so they are mathematically linked</text><circle cx="1160.0" cy="513.0" r="2.6" fill="#7c3aed"/><text x="1170.0" y="517.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">A more positive Ecell corresponds to a larger K (more product-favoured)</text><circle cx="1160.0" cy="535.0" r="2.6" fill="#7c3aed"/><text x="1170.0" y="539.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">R2.3.7 (HL): K and ∆G can both measure the position of an equilibrium</text><path d="M 1110.0 492.0 C 1122.6 492.0, 1122.6 606.0, 1180.0 606.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1180.0" y="582.0" width="400.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1380" y="608.0" text-anchor="middle" font-size="14.5" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">PARALLEL WITH KINETICS: ARRHENIUS</text><text x="1380" y="621" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 2.2.12 (HL)</text><rect x="1140.0" y="644.0" width="480.0" height="116.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1160.0" cy="667.0" r="2.6" fill="#7c3aed"/><text x="1170.0" y="671.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">Arrhenius: k = A e^(-Ea/RT); same exponential T-dependence as van't Hoff</text><circle cx="1160.0" cy="689.0" r="2.6" fill="#7c3aed"/><text x="1170.0" y="693.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">Plotting ln k vs 1/T (Arrhenius) mirrors plotting ln K vs 1/T (van't Hoff)</text><circle cx="1160.0" cy="711.0" r="2.6" fill="#7c3aed"/><text x="1170.0" y="715.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">Key difference: Arrhenius describes rate -- a kinetic, non-equilibrium idea</text><circle cx="1160.0" cy="733.0" r="2.6" fill="#7c3aed"/><text x="1170.0" y="737.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">Van't Hoff describes K -- a thermodynamic, at-equilibrium idea</text><path d="M 1110.0 492.0 C 1122.6 492.0, 1122.6 814.0, 1180.0 814.0" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1180.0" y="790.0" width="400.0" height="48.0" rx="10" ry="10" fill="#7c3aed"/><text x="1380" y="816.0" text-anchor="middle" font-size="14.5" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">ENTROPY &amp; SPONTANEITY</text><text x="1380" y="829" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Reactivity 1.4 (HL)</text><rect x="1140.0" y="852.0" width="480.0" height="116.0" rx="10" ry="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/><circle cx="1160.0" cy="875.0" r="2.6" fill="#7c3aed"/><text x="1170.0" y="879.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">∆S(total) = ∆S(system) + ∆S(surroundings); spontaneous if ∆S(total) &gt; 0</text><circle cx="1160.0" cy="897.0" r="2.6" fill="#7c3aed"/><text x="1170.0" y="901.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">∆S(surroundings) = -∆H / T (heat released to surroundings at constant P)</text><circle cx="1160.0" cy="919.0" r="2.6" fill="#7c3aed"/><text x="1170.0" y="923.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">∆G = ∆H - T∆S; reaction spontaneous (constant P) when ∆G &lt; 0</text><circle cx="1160.0" cy="941.0" r="2.6" fill="#7c3aed"/><text x="1170.0" y="945.0" font-size="11.6" fill="#4c1d95" font-family="Arial, sans-serif">As a reaction approaches equilibrium, ∆G becomes less negative, reaching 0</text><a href="zn_cu_galvanic_cell_experiment.html" target="_blank" rel="noopener"><rect x="680.0" y="988.0" width="400.0" height="48.0" rx="10" ry="10" fill="#1d4ed8"/><text x="880" y="1018.0" text-anchor="middle" font-size="16" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">Try out the experiment!</text></a></g></svg>