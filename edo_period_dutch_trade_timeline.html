<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edo Japan &amp; the Dutch Trade — Parallel Timeline (1600–1868)</title>
<style>
  body { margin: 0; padding: 40px 0; background: #ffffff; display: flex; justify-content: center; }
</style>
</head>
<body>
<svg viewBox="0 0 1150 2820" xmlns="http://www.w3.org/2000/svg" role="img" width="1150" height="2820">
<title>Parallel timeline of the Edo period and Dutch history, highlighting Dutch-Japan trade</title>
<desc>A vertical timeline from 1600 to 1868 with Japan's Edo-period events on the left and Dutch history on the right. Rows involving Dutch-Japan trade (Hirado, Dejima, VOC, Rangaku, the Dutch trade monopoly) are highlighted in gold and connected across the two columns.</desc>
<style>
  .bg { fill: #ffffff; }
  .line { stroke: #d8d3cb; stroke-width: 3; }
  .goldline { stroke: #c9932e; stroke-width: 3; }
  .dot-jp { fill: #b5432a; }
  .dot-nl { fill: #2b5c8a; }
  .dot-gold { fill: #c9932e; }
  .year { font-family: Georgia, serif; font-size: 20px; font-weight: 700; fill: #2b2620; }
  .title { font-family: -apple-system, sans-serif; font-size: 16.5px; font-weight: 600; fill: #2b2620; }
  .desc { font-family: -apple-system, sans-serif; font-size: 13px; fill: #6b6459; }
  .header { font-family: Georgia, serif; font-size: 30px; font-weight: 700; fill: #2b2620; }
  .sub { font-family: -apple-system, sans-serif; font-size: 14px; fill: #6b6459; }
  .colhead { font-family: -apple-system, sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
  .legend { font-family: -apple-system, sans-serif; font-size: 12.5px; fill: #6b6459; }
  .badge { font-family: -apple-system, sans-serif; font-size: 10.5px; font-weight: 700; fill: #8a651b; }
</style>
<rect class="bg" x="0" y="0" width="1150" height="2820"/>

<text x="575" y="46" text-anchor="middle" class="header">Edo Japan &amp; the Dutch Trade</text>
<text x="575" y="70" text-anchor="middle" class="sub">Parallel timeline, 1600–1868 — gold links mark Dutch-Japan trade</text>

<text x="250" y="102" text-anchor="middle" class="colhead" fill="#b5432a">JAPAN — EDO PERIOD</text>
<text x="850" y="102" text-anchor="middle" class="colhead" fill="#2b5c8a">DUTCH REPUBLIC / VOC</text>

<circle cx="220" cy="118" r="5" class="dot-gold"/>
<text x="232" y="122" class="legend">= Dutch–Japan trade link</text>

<!-- Trade highlight bands (drawn first, behind lines) -->
<rect x="190" y="105" width="770" height="98" fill="#c9932e" opacity="0.08"/>
<rect x="190" y="335" width="770" height="98" fill="#c9932e" opacity="0.08"/>
<rect x="190" y="795" width="770" height="98" fill="#c9932e" opacity="0.08"/>
<rect x="190" y="910" width="770" height="98" fill="#c9932e" opacity="0.08"/>
<rect x="190" y="1370" width="770" height="98" fill="#c9932e" opacity="0.08"/>
<rect x="190" y="1600" width="770" height="98" fill="#c9932e" opacity="0.08"/>
<rect x="190" y="1945" width="770" height="98" fill="#c9932e" opacity="0.08"/>
<rect x="190" y="2175" width="770" height="98" fill="#c9932e" opacity="0.08"/>
<rect x="190" y="2290" width="770" height="98" fill="#c9932e" opacity="0.08"/>

<!-- Main vertical lines -->
<line class="line" x1="250" y1="130" x2="250" y2="2750"/>
<line class="line" x1="850" y1="130" x2="850" y2="2750"/>

<!-- Row 1600: TRADE -->
<line class="goldline" x1="250" y1="150" x2="850" y2="150"/>
<circle class="dot-gold" cx="250" cy="150" r="7"/>
<circle class="dot-gold" cx="850" cy="150" r="7"/>
<text x="550" y="146" text-anchor="middle" class="year">1600</text>
<text x="270" y="180" class="title">Battle of Sekigahara</text>
<text x="270" y="200" class="desc">Ieyasu defeats rivals, secures</text>
<text x="270" y="216" class="desc">control of Japan</text>
<text x="830" y="180" text-anchor="end" class="title">Liefde shipwrecks in Japan</text>
<text x="830" y="200" text-anchor="end" class="desc">William Adams (Miura Anjin) becomes</text>
<text x="830" y="216" text-anchor="end" class="desc">first Dutch/English contact with Japan</text>

<!-- Row 1602: TRADE -->
<line class="goldline" x1="250" y1="265" x2="850" y2="265"/>
<circle class="dot-gold" cx="250" cy="265" r="6"/>
<circle class="dot-gold" cx="850" cy="265" r="7"/>
<text x="550" y="261" text-anchor="middle" class="year">1602</text>
<text x="270" y="288" class="desc">Tokugawa rule consolidates</text>
<text x="830" y="285" text-anchor="end" class="title">Dutch East India Company (VOC)</text>
<text x="830" y="303" text-anchor="end" class="desc">founded — will run all Dutch-Asia trade</text>

<!-- Row 1603 -->
<circle class="dot-jp" cx="250" cy="335" r="7"/>
<text x="550" y="331" text-anchor="middle" class="year">1603</text>
<text x="270" y="358" class="title">Tokugawa shogunate founded</text>
<text x="270" y="378" class="desc">Ieyasu named shogun; Edo</text>
<text x="270" y="394" class="desc">becomes the seat of power</text>

<!-- Row 1609: TRADE -->
<line class="goldline" x1="250" y1="415" x2="850" y2="415"/>
<circle class="dot-gold" cx="250" cy="415" r="6"/>
<circle class="dot-gold" cx="850" cy="415" r="7"/>
<text x="550" y="411" text-anchor="middle" class="year">1609</text>
<text x="830" y="405" text-anchor="end" class="title">Dutch trading post at Hirado</text>
<text x="830" y="423" text-anchor="end" class="desc">VOC granted trading rights by shogunate</text>
<text x="787" y="440" text-anchor="end" class="badge">TRADE BEGINS</text>

<!-- Row 1615 -->
<circle class="dot-jp" cx="250" cy="480" r="7"/>
<text x="550" y="476" text-anchor="middle" class="year">1615</text>
<text x="270" y="503" class="title">Siege of Osaka</text>
<text x="270" y="523" class="desc">Toyotomi clan destroyed;</text>
<text x="270" y="539" class="desc">last armed threat ends</text>

<!-- Row 1635 -->
<circle class="dot-jp" cx="250" cy="600" r="7"/>
<text x="550" y="596" text-anchor="middle" class="year">1635</text>
<text x="270" y="623" class="title">Sankin-kotai system</text>
<text x="270" y="643" class="desc">Daimyo alternate residence</text>
<text x="270" y="659" class="desc">in Edo, curbing revolt</text>

<!-- Row 1637 -->
<circle class="dot-jp" cx="250" cy="720" r="7"/>
<text x="550" y="716" text-anchor="middle" class="year">1637</text>
<text x="270" y="743" class="title">Shimabara Rebellion</text>
<text x="270" y="763" class="desc">Christian peasant revolt</text>
<text x="270" y="779" class="desc">crushed; Christianity banned</text>

<!-- Row 1639: TRADE -->
<line class="goldline" x1="250" y1="845" x2="850" y2="845"/>
<circle class="dot-gold" cx="250" cy="845" r="7"/>
<circle class="dot-gold" cx="850" cy="845" r="7"/>
<text x="550" y="841" text-anchor="middle" class="year">1639</text>
<text x="270" y="868" class="title">Sakoku (national seclusion)</text>
<text x="270" y="888" class="desc">Japan closes to almost all</text>
<text x="270" y="904" class="desc">foreign trade and contact</text>
<text x="830" y="868" text-anchor="end" class="title">Portuguese expelled</text>
<text x="830" y="888" text-anchor="end" class="desc">Dutch become the sole Western</text>
<text x="830" y="904" text-anchor="end" class="desc">power permitted to trade with Japan</text>

<!-- Row 1641: TRADE -->
<line class="goldline" x1="250" y1="960" x2="850" y2="960"/>
<circle class="dot-gold" cx="250" cy="960" r="6"/>
<circle class="dot-gold" cx="850" cy="960" r="7"/>
<text x="550" y="956" text-anchor="middle" class="year">1641</text>
<text x="830" y="953" text-anchor="end" class="title">Dutch post moved to Dejima</text>
<text x="830" y="971" text-anchor="end" class="desc">Artificial island in Nagasaki harbor —</text>
<text x="830" y="987" text-anchor="end" class="desc">Japan's only window to the West for 218 yrs</text>

<!-- Row 1657 -->
<circle class="dot-jp" cx="250" cy="1080" r="7"/>
<text x="550" y="1076" text-anchor="middle" class="year">1657</text>
<text x="270" y="1103" class="title">Great Fire of Meireki</text>
<text x="270" y="1123" class="desc">Edo largely destroyed;</text>
<text x="270" y="1139" class="desc">later rebuilt and expanded</text>

<!-- Row 1688-1704 -->
<circle class="dot-jp" cx="250" cy="1200" r="7"/>
<text x="550" y="1196" text-anchor="middle" class="year">1688–1704</text>
<text x="270" y="1223" class="title">Genroku era</text>
<text x="270" y="1243" class="desc">Kabuki, ukiyo-e and</text>
<text x="270" y="1259" class="desc">merchant culture flourish</text>

<!-- Row 1720: TRADE -->
<line class="goldline" x1="250" y1="1420" x2="850" y2="1420"/>
<circle class="dot-gold" cx="250" cy="1420" r="7"/>
<circle class="dot-gold" cx="850" cy="1420" r="7"/>
<text x="550" y="1416" text-anchor="middle" class="year">1720</text>
<text x="270" y="1443" class="title">Kyoho Reforms</text>
<text x="270" y="1463" class="desc">Yoshimune eases ban on</text>
<text x="270" y="1479" class="desc">importing Dutch books</text>
<text x="830" y="1443" text-anchor="end" class="title">Rangaku ("Dutch Learning")</text>
<text x="830" y="1463" text-anchor="end" class="desc">Japanese scholars begin studying Western</text>
<text x="830" y="1479" text-anchor="end" class="desc">science and medicine via Dejima</text>

<!-- Row 1774: TRADE -->
<line class="goldline" x1="250" y1="1650" x2="850" y2="1650"/>
<circle class="dot-gold" cx="250" cy="1650" r="6"/>
<circle class="dot-gold" cx="850" cy="1650" r="7"/>
<text x="550" y="1646" text-anchor="middle" class="year">1774</text>
<text x="830" y="1643" text-anchor="end" class="title">Kaitai Shinsho published</text>
<text x="830" y="1661" text-anchor="end" class="desc">First Japanese translation of a Dutch</text>
<text x="830" y="1677" text-anchor="end" class="desc">anatomy text; landmark of Rangaku</text>

<!-- Row 1782-1788 -->
<circle class="dot-jp" cx="250" cy="1780" r="7"/>
<text x="550" y="1776" text-anchor="middle" class="year">1782–1788</text>
<text x="270" y="1803" class="title">Tenmei famine</text>
<text x="270" y="1823" class="desc">Mass starvation and unrest</text>
<text x="270" y="1839" class="desc">destabilize the shogunate</text>

<!-- Row 1823-1829: TRADE -->
<line class="goldline" x1="250" y1="1995" x2="850" y2="1995"/>
<circle class="dot-gold" cx="250" cy="1995" r="6"/>
<circle class="dot-gold" cx="850" cy="1995" r="7"/>
<text x="550" y="1991" text-anchor="middle" class="year">1823–1829</text>
<text x="830" y="1988" text-anchor="end" class="title">Siebold at Dejima</text>
<text x="830" y="2006" text-anchor="end" class="desc">German physician for the Dutch teaches</text>
<text x="830" y="2022" text-anchor="end" class="desc">Western medicine to Japanese students</text>

<!-- Row 1841-1843 -->
<circle class="dot-jp" cx="250" cy="2110" r="7"/>
<text x="550" y="2106" text-anchor="middle" class="year">1841–1843</text>
<text x="270" y="2133" class="title">Tenpo Reforms</text>
<text x="270" y="2153" class="desc">Austerity measures fail to</text>
<text x="270" y="2169" class="desc">fix mounting economic strain</text>

<!-- Row 1853 -->
<circle class="dot-jp" cx="250" cy="2225" r="7"/>
<text x="550" y="2221" text-anchor="middle" class="year">1853</text>
<text x="270" y="2248" class="title">Perry's "Black Ships"</text>
<text x="270" y="2268" class="desc">US fleet forces Japan</text>
<text x="270" y="2284" class="desc">to open to foreign trade</text>

<!-- Row 1854: TRADE -->
<line class="goldline" x1="250" y1="2340" x2="850" y2="2340"/>
<circle class="dot-gold" cx="250" cy="2340" r="7"/>
<circle class="dot-gold" cx="850" cy="2340" r="7"/>
<text x="550" y="2336" text-anchor="middle" class="year">1854</text>
<text x="270" y="2363" class="title">Convention of Kanagawa</text>
<text x="270" y="2383" class="desc">Japan opens to the US,</text>
<text x="270" y="2399" class="desc">ending 215 years of sakoku</text>
<text x="830" y="2363" text-anchor="end" class="title">Dutch monopoly ends</text>
<text x="830" y="2383" text-anchor="end" class="desc">Other Western powers gain access;</text>
<text x="830" y="2399" text-anchor="end" class="desc">Dutch exclusivity at Dejima is over</text>

<!-- Row 1858: TRADE -->
<line class="goldline" x1="250" y1="2455" x2="850" y2="2455"/>
<circle class="dot-gold" cx="250" cy="2455" r="7"/>
<circle class="dot-gold" cx="850" cy="2455" r="7"/>
<text x="550" y="2451" text-anchor="middle" class="year">1858</text>
<text x="270" y="2478" class="title">Unequal treaties signed</text>
<text x="270" y="2498" class="desc">Ports opened to Western</text>
<text x="270" y="2514" class="desc">powers on unequal terms</text>
<text x="830" y="2478" text-anchor="end" class="title">Dutch-Japan Treaty</text>
<text x="830" y="2498" text-anchor="end" class="desc">Netherlands signs its own formal</text>
<text x="830" y="2514" text-anchor="end" class="desc">Treaty of Amity and Commerce</text>

<!-- Row 1867 -->
<circle class="dot-jp" cx="250" cy="2600" r="7"/>
<text x="550" y="2596" text-anchor="middle" class="year">1867</text>
<text x="270" y="2623" class="title">Taisei Hokan</text>
<text x="270" y="2643" class="desc">Shogun Yoshinobu returns</text>
<text x="270" y="2659" class="desc">power to the emperor</text>

<!-- Row 1868 -->
<circle cx="250" cy="2700" r="9" stroke="#b5432a" stroke-width="2" fill="#ffffff"/>
<circle class="dot-jp" cx="250" cy="2700" r="4"/>
<text x="550" y="2696" text-anchor="middle" class="year">1868</text>
<text x="270" y="2723" class="title">Meiji Restoration</text>
<text x="270" y="2743" class="desc">Edo period ends; imperial rule</text>
<text x="270" y="2759" class="desc">restored, modernization begins</text>

</svg>
