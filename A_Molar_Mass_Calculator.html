  :root { --ink:#1e1e1e; }
  * { box-sizing:border-box; }
  body { margin:0; background:#fff; font-family:'NW','Comic Sans MS',cursive;
         color:var(--ink); }
  /* ---------- controls ---------- */
  #bar { display:flex; flex-wrap:wrap; gap:8px; align-items:center;
         padding:10px 16px 2px; user-select:none; }
  .btn { font-family:'NWB','Comic Sans MS',cursive; font-size:15px;
         color:var(--ink); background:#fff; cursor:pointer; padding:4px 14px;
         border:2.2px solid var(--ink);
         border-radius:255px 15px 225px 15px/15px 225px 15px 255px; }
  .btn.on { background:var(--ink); color:#fff; }
  .btn:active { transform:scale(.96) rotate(-1deg); }
  .swatch { width:26px; height:26px; padding:0; border:2.2px solid var(--ink);
            border-radius:255px 15px 225px 15px/15px 225px 15px 255px;
            cursor:pointer; }
  .swatch.on { outline:3px solid var(--ink); outline-offset:2px; }
  .sep { width:2px; height:26px; background:var(--ink); opacity:.25;
         margin:0 6px; }
  #hint { font-size:14px; opacity:.6; margin-left:auto; padding-right:6px; }
  .tog { font-family:'NW'; font-size:15px; display:flex; gap:4px;
         align-items:center; cursor:pointer; }
  .tog input { accent-color:var(--ink); width:16px; height:16px;
               cursor:pointer; }
  /* ---------- table ---------- */
  #wrap { padding:0 8px 8px; }
  svg { width:100%; height:auto; display:block; }
  text { fill:var(--ink); }
  .sym  { font-family:'NWB'; }
  .ttl  { font-family:'NWB'; }
  path.rough { fill:none; stroke:var(--ink); stroke-width:.32;
               stroke-linecap:round; }
  .cell { cursor:pointer; }
  .cell .bg { fill:transparent; }
  .cell:hover .bg { fill:rgba(30,30,30,.07); }
  .cell .bg.marked { opacity:.55; }
  svg.hide-sym .sym.el, svg.hide-name .name, svg.hide-mass .mass,
  svg.hide-num .num { visibility:hidden; }
  /* ---------- popup ---------- */
  #overlay { position:fixed; inset:0; background:rgba(30,30,30,.35);
             display:none; align-items:center; justify-content:center;
             z-index:10; }
  #overlay.show { display:flex; }
  #card { background:#fff; border:3px solid var(--ink); text-align:center;
          border-radius:255px 15px 225px 15px/15px 225px 15px 255px;
          padding:30px 60px 26px; min-width:300px; }
  #cardNum  { font-size:30px; }
  #cardSym  { font-family:'NWB'; font-size:110px; line-height:1; }
  #cardName { font-size:34px; }
  #cardMass { font-size:30px; margin-top:6px; }
  #card small { font-size:15px; opacity:.55; display:block; }
  /* ---------- molar-mass calculator ---------- */
  #calcPanel { display:none; align-items:center; flex-wrap:wrap; gap:14px;
               padding:2px 16px 10px; user-select:none; }
  #calcPanel.show { display:flex; }
  #calcFormula { font-family:'NWB'; font-size:40px; min-height:48px;
                 flex:1; text-align:center; }
  #calcTotalBox { display:flex; align-items:baseline; gap:10px;
                  border:2.6px solid var(--ink);
                  border-radius:255px 15px 225px 15px/15px 225px 15px 255px;
                  padding:6px 22px; }
  #calcTotalBox .lbl { font-size:13px; opacity:.65; }
  #calcTotalBox .unit { font-size:16px; opacity:.7; }
  #calcTotalV { font-family:'NWB'; font-size:84px; line-height:1; }
  .cell .bg.hit { transition:fill .15s; }
  .cell .bg.calcHit { opacity:.7; }
  #calcOverlay { position:fixed; inset:0; background:rgba(30,30,30,.35);
             display:none; align-items:center; justify-content:center; z-index:11; }
  #calcOverlay.show { display:flex; }
  #calcCard { background:#fff; border:3px solid var(--ink); text-align:center;
          border-radius:255px 15px 225px 15px/15px 225px 15px 255px;
          padding:30px 50px 26px; min-width:300px; }
  #calcCard .lbl { font-size:15px; opacity:.6; }
  #calcCardFormula { font-family:'NWB'; font-size:44px; margin:6px 0; }
  #calcCardTotal { font-size:32px; margin-top:4px; }
  #calcCard button { margin-top:18px; }
  @media print { #bar,#overlay,#calcPanel,#calcOverlay { display:none !important; } }
</style>
</head>
<body>
<div id="bar">
  <button class="btn on" id="mInspect" title="Click an element to enlarge it">Inspect</button>
  <button class="btn" id="mMark" title="Click elements to colour them in">Highlight</button>
  <button class="btn" id="mCalc" title="Click component atoms to add up a molar mass">Molar Mass</button>
  <span id="colors" style="display:flex;gap:6px;">
    <button class="swatch on" style="background:#ffd43b" data-c="#ffd43b"></button>
    <button class="swatch" style="background:#74c0fc" data-c="#74c0fc"></button>
    <button class="swatch" style="background:#8ce99a" data-c="#8ce99a"></button>
    <button class="swatch" style="background:#ffa8c5" data-c="#ffa8c5"></button>
  </span>
  <span class="sep"></span>
  <label class="tog"><input type="checkbox" checked data-h="hide-sym">symbols</label>
  <label class="tog"><input type="checkbox" checked data-h="hide-name">names</label>
  <label class="tog"><input type="checkbox" checked data-h="hide-mass">masses</label>
  <label class="tog"><input type="checkbox" checked data-h="hide-num">numbers</label>
  <span class="sep"></span>
  <button class="btn" id="clear">Clear</button>
  <span id="hint">click any element</span>
</div>
<div id="calcPanel">
  <div id="calcTotalBox">
    <span class="lbl">Total molar mass</span>
    <span id="calcTotalV">0</span>
    <span class="unit">g/mol</span>
  </div>
  <button class="btn" id="calcReset">Reset</button>
  <button class="btn" id="calcFinish">Finished</button>
  <span id="calcFormula"></span>
</div>
<div id="wrap"><svg id="pt" viewBox="0 0 297 190" xmlns="http://www.w3.org/2000/svg"></svg></div>
<div id="attribution" style="text-align:center;font-size:12px;opacity:.55;padding:2px 16px 10px;">
  Periodic table adapted from UCLES (Cambridge International Examinations), including its element names, symbols, atomic numbers and relative atomic masses.
</div>

<div id="overlay">
  <div id="card">
    <div id="cardNum"></div>
    <div id="cardSym"></div>
    <div id="cardName"></div>
    <div id="cardMass"><span id="cardMassV"></span>
      <small>relative atomic mass</small></div>
  </div>
</div>

<div id="calcOverlay">
  <div id="calcCard">
    <div class="lbl">molar mass of</div>
    <div id="calcCardFormula"></div>
    <div id="calcCardTotal"><span id="calcCardTotalV"></span> g/mol</div>
    <button class="btn" id="calcNew">New calculation</button>
  </div>
</div>

<script>
"use strict";
/* ------------------------------------------------ seeded rng + rough lines */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;
  let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;
  return((t^t>>>14)>>>0)/4294967296;}}
const rnd = mulberry32(20260703);
const g = s => (rnd()*2-1)*s;                       // +-s uniform-ish

function roughLine(x1,y1,x2,y2,r=0.55){
  const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy)||1;
  const px=-dy/len, py=dx/len,
        rr=r*Math.min(1, len/25+0.45);
  let d="";
  for(let i=0;i<2;i++){
    const ax=x1+g(rr*.5), ay=y1+g(rr*.5), bx=x2+g(rr*.5), by=y2+g(rr*.5);
    const t1=.25+rnd()*.15, t2=.6+rnd()*.15;
    const c1x=ax+(bx-ax)*t1+px*g(rr), c1y=ay+(by-ay)*t1+py*g(rr);
    const c2x=ax+(bx-ax)*t2+px*g(rr), c2y=ay+(by-ay)*t2+py*g(rr);
    d+=`M${ax.toFixed(2)} ${ay.toFixed(2)}C${c1x.toFixed(2)} ${c1y.toFixed(2)} `+
       `${c2x.toFixed(2)} ${c2y.toFixed(2)} ${bx.toFixed(2)} ${by.toFixed(2)}`;
  }
  return d;
}
const roughRect=(x,y,w,h,r)=> roughLine(x,y,x+w,y,r)+roughLine(x+w,y,x+w,y+h,r)+
                              roughLine(x+w,y+h,x,y+h,r)+roughLine(x,y+h,x,y,r);

/* --------------------------------------------------------------- svg utils */
const NS="http://www.w3.org/2000/svg", svg=document.getElementById("pt");
function el(tag,attrs,parent){const e=document.createElementNS(NS,tag);
  for(const k in attrs)e.setAttribute(k,attrs[k]);
  (parent||svg).appendChild(e);return e;}
const CAP=0.8675;                                   // Noteworthy cap/em
function txt(x,y,s,fs,cls,anchor,parent){
  const e=el("text",{x:x,y:y,"font-size":(fs/CAP).toFixed(3),
    "text-anchor":anchor||"middle",class:cls||""},parent);
  e.textContent=s;return e;}

/* -------------------------------------------------------------------- data */
const D="–";
const P2=[[3,"Li","lithium","7"],[4,"Be","beryllium","9"],[5,"B","boron","11"],
 [6,"C","carbon","12"],[7,"N","nitrogen","14"],[8,"O","oxygen","16"],
 [9,"F","fluorine","19"],[10,"Ne","neon","20"]];
const P3=[[11,"Na","sodium","23"],[12,"Mg","magnesium","24"],
 [13,"Al","aluminium","27"],[14,"Si","silicon","28"],[15,"P","phosphorus","31"],
 [16,"S","sulfur","32"],[17,"Cl","chlorine","35.5"],[18,"Ar","argon","40"]];
const P4=[[19,"K","potassium","39"],[20,"Ca","calcium","40"],
 [21,"Sc","scandium","45"],[22,"Ti","titanium","48"],[23,"V","vanadium","51"],
 [24,"Cr","chromium","52"],[25,"Mn","manganese","55"],[26,"Fe","iron","56"],
 [27,"Co","cobalt","59"],[28,"Ni","nickel","59"],[29,"Cu","copper","64"],
 [30,"Zn","zinc","65"],[31,"Ga","gallium","70"],[32,"Ge","germanium","73"],
 [33,"As","arsenic","75"],[34,"Se","selenium","79"],[35,"Br","bromine","80"],
 [36,"Kr","krypton","84"]];
const P5=[[37,"Rb","rubidium","85"],[38,"Sr","strontium","88"],
 [39,"Y","yttrium","89"],[40,"Zr","zirconium","91"],[41,"Nb","niobium","93"],
 [42,"Mo","molybdenum","96"],[43,"Tc","technetium",D],
 [44,"Ru","ruthenium","101"],[45,"Rh","rhodium","103"],
 [46,"Pd","palladium","106"],[47,"Ag","silver","108"],[48,"Cd","cadmium","112"],
 [49,"In","indium","115"],[50,"Sn","tin","119"],[51,"Sb","antimony","122"],
 [52,"Te","tellurium","128"],[53,"I","iodine","127"],[54,"Xe","xenon","131"]];
const P6=[[55,"Cs","caesium","133"],[56,"Ba","barium","137"],null,
 [72,"Hf","hafnium","178"],[73,"Ta","tantalum","181"],[74,"W","tungsten","184"],
 [75,"Re","rhenium","186"],[76,"Os","osmium","190"],[77,"Ir","iridium","192"],
 [78,"Pt","platinum","195"],[79,"Au","gold","197"],[80,"Hg","mercury","201"],
 [81,"Tl","thallium","204"],[82,"Pb","lead","207"],[83,"Bi","bismuth","209"],
 [84,"Po","polonium",D],[85,"At","astatine",D],[86,"Rn","radon",D]];
const P7=[[87,"Fr","francium",D],[88,"Ra","radium",D],null,
 [104,"Rf","rutherfordium",D],[105,"Db","dubnium",D],[106,"Sg","seaborgium",D],
 [107,"Bh","bohrium",D],[108,"Hs","hassium",D],[109,"Mt","meitnerium",D],
 [110,"Ds","darmstadtium",D],[111,"Rg","roentgenium",D],
 [112,"Cn","copernicium",D],[113,"Nh","nihonium",D],[114,"Fl","flerovium",D],
 [115,"Mc","moscovium",D],[116,"Lv","livermorium",D],[117,"Ts","tennessine",D],
 [118,"Og","oganesson",D]];
const LAN=[[57,"La","lanthanum","139"],[58,"Ce","cerium","140"],
 [59,"Pr","praseodymium","141"],[60,"Nd","neodymium","144"],
 [61,"Pm","promethium",D],[62,"Sm","samarium","150"],[63,"Eu","europium","152"],
 [64,"Gd","gadolinium","157"],[65,"Tb","terbium","159"],
 [66,"Dy","dysprosium","163"],[67,"Ho","holmium","165"],[68,"Er","erbium","167"],
 [69,"Tm","thulium","169"],[70,"Yb","ytterbium","173"],[71,"Lu","lutetium","175"]];
const ACT=[[89,"Ac","actinium",D],[90,"Th","thorium","232"],
 [91,"Pa","protactinium","231"],[92,"U","uranium","238"],[93,"Np","neptunium",D],
 [94,"Pu","plutonium",D],[95,"Am","americium",D],[96,"Cm","curium",D],
 [97,"Bk","berkelium",D],[98,"Cf","californium",D],[99,"Es","einsteinium",D],
 [100,"Fm","fermium",D],[101,"Md","mendelevium",D],[102,"No","nobelium",D],
 [103,"Lr","lawrencium",D]];

/* ------------------------------------------------------------------ layout */
const CW=15, X0=13.5, Y_GROUP=18, Y_LABEL=24, Y_P1=30,
      ROW=p=>Y_P1+(p-1)*CW, Y_BOT=ROW(8), Y_LANT=143, Y_FOOT=183;

function cell(x,y,e){
  const grp=el("g",{class:"cell","data-z":e[0]});
  el("rect",{x:x+.5,y:y+.5,width:CW-1,height:CW-1,rx:1.2,class:"bg"},grp);
  el("path",{d:roughRect(x,y,CW,CW),class:"rough"},grp);
  txt(x+CW/2,y+3.3,e[0],2.0,"num","middle",grp);
  txt(x+CW/2,y+8.4,e[1],3.9,"sym el","middle",grp);
  txt(x+CW/2,y+11.0,e[2],1.7,"name","middle",grp);
  txt(x+CW/2,y+13.6,e[3],2.0,"mass","middle",grp);
  grp.__el=e;
}

/* title, frame, group band */
txt(297/2,14,"The Periodic Table of Elements with a Molar Mass Calculator",3.4,"ttl");
el("path",{d:roughRect(X0,Y_GROUP,18*CW,Y_BOT-Y_GROUP,0.7),class:"rough"});
el("path",{d:roughLine(X0,Y_LABEL,X0+18*CW,Y_LABEL),class:"rough"});
txt(297/2,Y_GROUP+4.3,"Group",2.6);
const ROMAN={1:"I",2:"II",13:"III",14:"IV",15:"V",16:"VI",17:"VII",18:"VIII"};
for(const c in ROMAN){
  const x=X0+(c-1)*CW;
  el("path",{d:roughRect(x,Y_LABEL,CW,Y_P1-Y_LABEL),class:"rough"});
  txt(x+CW/2,Y_LABEL+4.3,ROMAN[c],2.6);
}
/* period 1 */
cell(X0+6.9*CW,ROW(1),[1,"H","hydrogen","1"]);
cell(X0+17*CW,ROW(1),[2,"He","helium","4"]);
/* key */
const kx=X0+3.6*CW, ky=ROW(2)+4.5, kw=5.4*CW, kh=20;
txt(kx+kw/2,ky-1.8,"Key",3.0,"ttl");
el("path",{d:roughRect(kx,ky,kw,kh),class:"rough"});
txt(kx+kw/2,ky+4.0,"atomic number",1.9);
txt(kx+kw/2,ky+9.3,"atomic symbol",3.0);
txt(kx+kw/2,ky+13.2,"name",1.9);
txt(kx+kw/2,ky+17.4,"relative atomic mass",1.9);
/* periods 2-3 */
[[2,P2],[3,P3]].forEach(([p,row])=>row.forEach((e,i)=>{
  const col=i<2?i+1:i+11; cell(X0+(col-1)*CW,ROW(p),e);}));
/* periods 4-7 */
[[4,P4],[5,P5],[6,P6],[7,P7]].forEach(([p,row])=>row.forEach((e,i)=>{
  const x=X0+i*CW;
  if(e===null){
    el("path",{d:roughRect(x,ROW(p),CW,CW),class:"rough"});
    const lab=p===6?["57–71","lanthanoids"]:["89–103","actinoids"];
    txt(x+CW/2,ROW(p)+6.4,lab[0],2.0);
    txt(x+CW/2,ROW(p)+9.6,lab[1],1.55,"name");
  } else cell(x,ROW(p),e);}));
/* lanthanoids / actinoids */
[[LAN,"lanthanoids"],[ACT,"actinoids"]].forEach(([row,lab],r)=>{
  const y=Y_LANT+r*CW;
  txt(X0+3*CW-3,y+CW/2+1,lab,2.2,"","end");
  row.forEach((e,i)=>cell(X0+(3+i)*CW,y,e));});
/* footnote (real superscript glyph) */
txt(X0,Y_FOOT,"The volume of one mole of any gas is 24 dm³ at room temperature and pressure (r.t.p.).",2.6,"","start");

/* squeeze long names once fonts are ready */
function fitNames(){
  svg.querySelectorAll("text.name").forEach(t=>{
    t.removeAttribute("textLength");
    if(t.getComputedTextLength()>CW-1.6){
      t.setAttribute("textLength",CW-1.6);
      t.setAttribute("lengthAdjust","spacingAndGlyphs");}});}
document.fonts.ready.then(fitNames); fitNames();

/* ------------------------------------------------------------ interactions */
const state={mode:"inspect",color:"#ffd43b"};
const mI=document.getElementById("mInspect"),
      mM=document.getElementById("mMark"),
      mC=document.getElementById("mCalc"),
      overlay=document.getElementById("overlay"),
      calcPanel=document.getElementById("calcPanel"),
      calcFormulaEl=document.getElementById("calcFormula"),
      calcTotalV=document.getElementById("calcTotalV"),
      calcOverlay=document.getElementById("calcOverlay");
function setMode(m){state.mode=m;
  mI.classList.toggle("on",m==="inspect");
  mM.classList.toggle("on",m==="mark");
  mC.classList.toggle("on",m==="calc");
  calcPanel.classList.toggle("show",m==="calc");
  document.getElementById("hint").textContent =
    m==="inspect"?"click any element":
    m==="mark"?"click elements to colour them":
    "click component atoms to add up a molar mass";}
mI.onclick=()=>setMode("inspect");
mM.onclick=()=>setMode("mark");
mC.onclick=()=>setMode("calc");
document.querySelectorAll(".swatch").forEach(s=>s.onclick=()=>{
  document.querySelectorAll(".swatch").forEach(x=>x.classList.remove("on"));
  s.classList.add("on"); state.color=s.dataset.c; setMode("mark");});
document.querySelectorAll(".tog input").forEach(c=>c.onchange=()=>
  svg.classList.toggle(c.dataset.h,!c.checked));
document.getElementById("clear").onclick=()=>{
  svg.querySelectorAll(".bg.marked").forEach(b=>{
    b.classList.remove("marked");b.style.fill="";});};

/* ---------------------------------------------------------- molar mass calc */
const SUB="₀₁₂₃₄₅₆₇₈₉";
const toSub = n => String(n).split("").map(d=>SUB[d]).join("");
const calc={total:0,order:[],counts:{}};
function fmtMass(n){
  const r=Math.round(n*100)/100;
  return r.toFixed(2).replace(/0+$/,"").replace(/\.$/,"");}
function calcFormulaHTML(){
  return calc.order.map(sym=>{
    const n=calc.counts[sym];
    return sym+(n>1?`<sub>${toSub(n)}</sub>`:"");}).join("");}
function calcRender(){
  calcFormulaEl.innerHTML=calcFormulaHTML();
  calcTotalV.textContent=fmtMass(calc.total);}
function calcReset(){
  calc.total=0; calc.order=[]; calc.counts={}; calcRender();
  svg.querySelectorAll(".bg.calcHit").forEach(b=>{
    b.classList.remove("calcHit");
    if(!b.classList.contains("marked"))b.style.fill="";});}
function calcAdd(e){
  const m=parseFloat(e[3]);
  if(isNaN(m)){alert(e[2]+" has no stable relative atomic mass to add.");return;}
  const sym=e[1];
  if(!(sym in calc.counts)){calc.counts[sym]=0; calc.order.push(sym);}
  calc.counts[sym]++; calc.total+=m; calcRender();}
document.getElementById("calcReset").onclick=calcReset;
document.getElementById("calcFinish").onclick=()=>{
  if(!calc.order.length)return;
  document.getElementById("calcCardFormula").innerHTML=calcFormulaHTML();
  document.getElementById("calcCardTotalV").textContent=fmtMass(calc.total);
  calcOverlay.classList.add("show");};
document.getElementById("calcNew").onclick=()=>{
  calcOverlay.classList.remove("show"); calcReset();};
calcOverlay.onclick=ev=>{if(ev.target===calcOverlay)calcOverlay.classList.remove("show");};

svg.addEventListener("click",ev=>{
  const c=ev.target.closest(".cell"); if(!c)return;
  const e=c.__el;
  if(state.mode==="mark"){
    const bg=c.querySelector(".bg");
    if(bg.classList.contains("marked")&&bg.style.fill===hex2rgb(state.color)){
      bg.classList.remove("marked");bg.style.fill="";}
    else{bg.classList.add("marked");bg.style.fill=state.color;}
    return;}
  if(state.mode==="calc"){
    const before=calc.total;
    calcAdd(e);
    if(calc.total!==before){
      const bg=c.querySelector(".bg");
      bg.classList.add("calcHit"); bg.style.fill="#ffd43b";}
    return;}
  document.getElementById("cardNum").textContent=e[0];
  document.getElementById("cardSym").textContent=e[1];
  document.getElementById("cardName").textContent=e[2];
  document.getElementById("cardMassV").textContent=e[3];
  overlay.classList.add("show");});
function hex2rgb(h){const n=parseInt(h.slice(1),16);
  return`rgb(${n>>16&255}, ${n>>8&255}, ${n&255})`;}
overlay.onclick=()=>overlay.classList.remove("show");
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){overlay.classList.remove("show");
    calcOverlay.classList.remove("show");}});
</script>
</body>
</html>
