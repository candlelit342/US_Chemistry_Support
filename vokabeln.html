<!DOCTYPE html>
<html lang="de" style="color-scheme: light; background:#FAFAF8">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#FAFAF8">
<title>Wortschatz — 1000 Wörter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme: light;
  --paper:#FAFAF8; --ink:#2A2A30; --ink-soft:#63636C; --line:#E2E2E7;
  --der:#3B5BA5; --die:#A84A55; --das:#4A7C59; --other:#2A2A30;
  --der-soft:#EDF1F9; --die-soft:#F8EEEF; --das-soft:#EDF4EF; --other-soft:#EFEFF2;
  --ok:#4A7C59; --card:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
html{background:#FAFAF8 !important}
body{background:#FAFAF8 !important;color:#2A2A30;font-family:'Archivo',system-ui,sans-serif;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible,[tabindex]:focus-visible{outline:3px solid var(--der);outline-offset:2px}
.mono{font-family:'IBM Plex Mono',monospace}
.wrap{max-width:680px;margin:0 auto;padding:14px 16px 30px}

/* header */
header{padding:26px 0 18px;border-bottom:2px solid var(--line)}
.topline{display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{font-weight:900;font-stretch:110%;font-size:clamp(26px,7vw,40px);letter-spacing:-.02em;line-height:1;text-transform:uppercase}
.langbar{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex:none}
.langbtn{padding:8px 13px;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;background:var(--card)}
.langbtn.active{background:var(--der);color:#fff}
.sub{margin-top:8px;font-size:14px;color:#63636C;font-family:'IBM Plex Mono',monospace}
.totalbar{margin-top:14px;height:10px;background:var(--other-soft);border-radius:5px;overflow:hidden;position:relative}
.totalbar>div{position:absolute;inset:0 auto 0 0;background:var(--der);transition:width .5s ease}
.totalnum{margin-top:6px;font-size:13px;color:var(--ink-soft);display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace}

/* legend */
.legend{display:flex;gap:14px;margin:16px 0 6px;font-size:13px;font-family:'IBM Plex Mono',monospace;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:6px}
.chip{width:12px;height:12px;display:inline-block}
.chip.der{background:var(--der)}.chip.die{background:var(--die)}.chip.das{background:var(--das)}.chip.oth{background:var(--ink)}

/* level grid */
h2.sec{font-size:13px;text-transform:uppercase;letter-spacing:.14em;margin:26px 0 12px;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(min-width:520px){.grid{grid-template-columns:repeat(4,1fr)}}
.tile{aspect-ratio:1.15;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(42,42,48,.06);position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:8px;transition:transform .12s ease}
.tile:active{transform:scale(.96)}
.tile .lv{font-weight:900;font-size:clamp(14px,4vw,17px);letter-spacing:-.01em}
.tile .pct{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--ink-soft);align-self:flex-end}
.tile .fill{position:absolute;left:0;bottom:0;right:0;background:var(--das-soft);z-index:0;transition:height .4s ease}
.tile.done .fill{background:var(--das)}
.tile>*{position:relative;z-index:1}
.tile.done{border-color:var(--das);border-width:2px}

/* level view */
.back{font-family:'IBM Plex Mono',monospace;font-size:13px;padding:4px 0;color:var(--ink-soft);display:inline-flex;align-items:center;gap:6px;margin-top:10px}
.lvhead{display:flex;align-items:baseline;justify-content:space-between;margin:8px 0 4px}
.lvhead h1{font-weight:900;font-size:32px;text-transform:uppercase;letter-spacing:-.01em}
.lvhead .range{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink-soft)}
.modes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.mode{border:1px solid var(--line);border-radius:10px;background:var(--card);padding:16px 14px;text-align:left;box-shadow:0 1px 3px rgba(42,42,48,.06)}
.mode b{display:block;font-size:18px;font-weight:900;text-transform:uppercase}
.mode small{color:var(--ink-soft);font-size:13px;font-family:'IBM Plex Mono',monospace}
.mode:hover{background:var(--other-soft)}
.dirbar{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;width:fit-content;margin:0 0 14px}
.dirbtn{padding:8px 14px;font-family:'IBM Plex Mono',monospace;font-size:13px;background:var(--card)}
.dirbtn.active{background:var(--der);color:#fff}
.sent{font-size:13px;line-height:1.4;max-width:40ch}
.sent .s-de{font-weight:700}
.sent .s-en{color:var(--ink-soft);font-size:13px;font-family:'IBM Plex Mono',monospace;display:block;margin-top:2px}
.q-sent{border:1px solid var(--line);border-radius:10px;background:var(--card);padding:10px 12px;margin-top:10px;text-align:left}
.listtoggle{font-family:'IBM Plex Mono',monospace;font-size:13px;text-decoration:underline;padding:6px 0;color:var(--ink-soft)}
.wlist{margin-top:10px;border-top:1px solid var(--line)}
.witem{border-bottom:1px solid var(--line)}
.wrow{display:flex;justify-content:space-between;gap:10px;padding:10px 2px;font-size:16px;align-items:center;width:100%;text-align:left}
.wexp{padding:0 2px 12px}
.wexp .s-de{font-weight:600;font-size:14px}
.wexp .s-en{display:block;color:var(--ink-soft);font-size:13px;font-family:'IBM Plex Mono',monospace;margin-top:2px}
.wrow .de{font-weight:700}
.wrow .en{color:var(--ink-soft);text-align:right}
.dots{display:flex;gap:3px}
.dot{width:7px;height:7px;border:1px solid #9A9AA2;border-radius:50%}
.dot.on{background:var(--das);border-color:var(--das)}

/* gender coloring */
.g-der{color:var(--der)}.g-die{color:var(--die)}.g-das{color:var(--das)}

/* session (flashcards & quiz) */
.session{margin-top:6px}
.progress{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);margin-bottom:6px}
.cardbox{perspective:1200px}
.fcard{width:100%;min-height:205px;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.2,.7,.3,1)}
.fcard.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 4px rgba(42,42,48,.07);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:14px 16px 26px;text-align:center}
.face.back{transform:rotateY(180deg)}
.face .art{font-family:'IBM Plex Mono',monospace;font-size:13px;text-transform:uppercase;letter-spacing:.2em}
.face .word{font-weight:900;font-size:clamp(22px,6vw,32px);line-height:1.05;letter-spacing:-.01em}
.face .hint{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);position:absolute;bottom:8px}
.face.f-der{border:2px solid var(--der);background:var(--der-soft)}
.face.f-die{border:2px solid var(--die);background:var(--die-soft)}
.face.f-das{border:2px solid var(--das);background:var(--das-soft)}
.answerbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.abtn{border:2px solid var(--line);border-radius:10px;padding:11px;font-weight:900;text-transform:uppercase;font-size:15px;background:var(--card)}
.abtn.no{border-color:var(--die);color:var(--die)}
.abtn.yes{border-color:var(--ok);color:var(--ok)}
.abtn:disabled{opacity:.4;cursor:default}

/* quiz */
.q-word{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 4px rgba(42,42,48,.07);padding:16px;text-align:center;margin-bottom:10px}
.q-word .word{font-weight:900;font-size:clamp(20px,5.5vw,28px)}
.q-word .art{font-family:'IBM Plex Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:.2em;margin-bottom:4px}
.opts{display:grid;gap:6px}
.opt{border:1px solid var(--line);border-radius:10px;background:var(--card);padding:11px 12px;font-size:15px;text-align:left;font-weight:500}
.opt.correct{background:var(--das-soft);border:2px solid var(--das);color:var(--ink);font-weight:700}
.opt.wrong{background:var(--die-soft);border:2px solid var(--die);color:var(--ink)}
.opt:disabled{cursor:default}
.nextbtn{margin-top:10px;width:100%;border:none;border-radius:10px;background:var(--der);color:#fff;padding:14px;font-weight:900;text-transform:uppercase;font-size:15px}

/* results */
.result{border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 4px rgba(42,42,48,.07);background:var(--card);padding:28px 20px;text-align:center;margin-top:12px}
.result .big{font-weight:900;font-size:44px}
.result p{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink-soft);margin-top:6px}
.result .again{margin-top:16px}

.hidden{display:none}
body.insession header{display:none}
footer{margin-top:40px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);border-top:1px solid var(--line);padding-top:10px}
@media (prefers-reduced-motion: reduce){
  .fcard,.tile,.totalbar>div,.tile .fill{transition:none}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topline">
      <div class="brand" id="brand-title">Wortschatz</div>
      <div class="langbar" role="group" aria-label="Sprache / Langue">
        <button class="langbtn active" id="lang-de">DE</button>
        <button class="langbtn" id="lang-fr">FR</button>
      </div>
    </div>
    <div class="sub" id="appsub"></div>
    <div class="totalbar" aria-hidden="true"><div id="totalfill" style="width:0%"></div></div>
    <div class="totalnum"><span id="totalpct">0% gemeistert</span><span id="totalwords">0 / 1000</span></div>
  </header>

  <div id="view-home">
    <div class="legend" id="legend"></div>
    <h2 class="sec" id="sec-levels">Stufen</h2>
    <div class="grid" id="levelgrid"></div>
    <footer id="appfooter"></footer>
  </div>

  <div id="view-level" class="hidden">
    <button class="back" id="backhome">← Alle Stufen</button>
    <div class="lvhead"><h1 id="lvtitle">Stufe 1</h1><span class="range" id="lvrange"></span></div>
    <div class="totalbar" aria-hidden="true"><div id="lvfill" style="width:0%;background:var(--das)"></div></div>
    <div class="modes">
      <button class="mode" id="btn-learn"><b>Lernen</b><small>Karteikarten</small></button>
      <button class="mode" id="btn-quiz"><b>Quiz</b><small>Multiple Choice</small></button>
    </div>
    <div class="dirbar" role="group" aria-label="Richtung">
      <button class="dirbtn active" id="dir-de">DE → EN</button>
      <button class="dirbtn" id="dir-en">EN → DE</button>
    </div>
    <button class="listtoggle" id="toggle-list">Wortliste anzeigen</button>
    <div class="wlist hidden" id="wlist"></div>
  </div>

  <div id="view-learn" class="hidden">
    <button class="back" id="back-learn">← Zurück</button>
    <div class="session">
      <div class="progress"><span id="learn-count"></span><span id="learn-level"></span></div>
      <div class="cardbox">
        <div class="fcard" id="fcard" tabindex="0" role="button" aria-label="Karte umdrehen">
          <div class="face front" id="face-front">
            <div class="art" id="fc-art"></div>
            <div class="word" id="fc-word"></div>
            <div class="sent" id="fc-front-sent"></div>
            <div class="hint">Tippen zum Umdrehen</div>
          </div>
          <div class="face back" id="face-back">
            <div class="art" id="fc-back-art">Englisch</div>
            <div class="word" id="fc-answer" style="font-size:clamp(22px,6vw,32px)"></div>
            <div class="sent" id="fc-sent"></div>
          </div>
        </div>
      </div>
      <div class="answerbtns">
        <button class="abtn no" id="btn-no">Noch üben</button>
        <button class="abtn yes" id="btn-yes">Gewusst</button>
      </div>
    </div>
  </div>

  <div id="view-quiz" class="hidden">
    <button class="back" id="back-quiz">← Zurück</button>
    <div class="session">
      <div class="progress"><span id="quiz-count"></span><span id="quiz-score"></span></div>
      <div class="q-word"><div class="art" id="q-art"></div><div class="word" id="q-word"></div></div>
      <div class="opts" id="opts"></div>
      <div class="q-sent sent hidden" id="q-sent"></div>
      <button class="nextbtn hidden" id="btn-next">Weiter</button>
    </div>
  </div>

  <div id="view-result" class="hidden">
    <button class="back" id="back-result">← Zur Stufe</button>
    <div class="result">
      <div class="big" id="res-big"></div>
      <p id="res-text"></p>
      <button class="nextbtn again" id="btn-again">Nochmal</button>
    </div>
  </div>
</div>

const LEVEL_SIZE = 50, LEVELS = 20, MASTER = 3;

// ---------- state ----------
let lang = 'de';
let WORDS = LANGS.de.words, SENTENCES = LANGS.de.sentences;
let scores = {};           // index -> 0..3
let dir = 'de-en';         // 'de-en' = target→English, 'en-de' = English→target
let memoryOnly = false;
let cur = { level: 0, queue: [], pos: 0, mode: 'learn', correct: 0, lastMode: 'learn' };
let saveTimer = null;

function gender(w){ return LANGS[lang].genderOf(w); }
function bare(w){ return LANGS[lang].bare(w); }

// ---------- storage ----------
async function loadProgress(){
  scores = {};
  const L = LANGS[lang];
  try{
    const r = await window.storage.get(L.store);
    if (r && r.value) scores = JSON.parse(r.value);
  }catch(e){
    if (L.legacyStore){
      try{
        const old = await window.storage.get(L.legacyStore);
        if (old && old.value){ scores = JSON.parse(old.value); saveNow(); }
      }catch(e2){ /* first run */ }
    }
  }
  applyLangUI();
  renderHome();
}
async function setLang(l){
  if (l === lang) return;
  await saveNow();
  lang = l;
  WORDS = LANGS[l].words; SENTENCES = LANGS[l].sentences;
  try{ await window.storage.set('wortschatz-lang', l); }catch(e){}
  (async ()=>{
  try{
    const r = await window.storage.get('wortschatz-lang');
    if (r && r.value && LANGS[r.value]){ lang = r.value; WORDS = LANGS[lang].words; SENTENCES = LANGS[lang].sentences; }
  }catch(e){}
  loadProgress();
})();
  show('view-home');
}
function applyLangUI(){
  const L = LANGS[lang], U = L.ui;
  document.getElementById('brand-title').textContent = L.title;
  document.getElementById('appsub').textContent = L.sub;
  document.getElementById('lang-de').classList.toggle('active', lang==='de');
  document.getElementById('lang-fr').classList.toggle('active', lang==='fr');
  document.getElementById('legend').innerHTML = L.legend.map(x=>`<span><i class="chip ${x[0]}"></i>${x[1]}</span>`).join('');
  document.getElementById('sec-levels').textContent = U.levels;
  document.getElementById('appfooter').textContent = U.footer;
  document.getElementById('backhome').textContent = '← '+U.all;
  document.getElementById('btn-learn').innerHTML = `<b>${U.learn}</b><small>${U.cards}</small>`;
  document.getElementById('btn-quiz').innerHTML = `<b>${U.quiz}</b><small>${U.mc}</small>`;
  document.getElementById('dir-de').textContent = L.code+' → EN';
  document.getElementById('dir-en').textContent = 'EN → '+L.code;
  document.getElementById('back-learn').textContent = '← '+U.back;
  document.getElementById('back-quiz').textContent = '← '+U.back;
  document.getElementById('back-result').textContent = '← '+U.backLevel;
  document.getElementById('btn-no').textContent = U.again;
  document.getElementById('btn-yes').textContent = U.knew;
  document.getElementById('btn-next').textContent = U.next;
  document.getElementById('btn-again').textContent = U.retry;
  document.querySelector('#face-front .hint').textContent = U.tap;
}
function queueSave(){
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveNow, 1200);
}
async function saveNow(){
  saveTimer = null;
  if (memoryOnly) return;
  try{ await window.storage.set(LANGS[lang].store, JSON.stringify(scores)); }
  catch(e){ memoryOnly = true; }
}

// ---------- helpers ----------
function levelIndices(l){ const a=[]; for(let i=l*LEVEL_SIZE;i<Math.min((l+1)*LEVEL_SIZE,WORDS.length);i++) a.push(i); return a; }
function levelMastery(l){
  const idx = levelIndices(l);
  const sum = idx.reduce((s,i)=>s+Math.min(scores[i]||0,MASTER),0);
  return sum/(idx.length*MASTER);
}
function totalMastered(){ let n=0; for(let i=0;i<WORDS.length;i++) if((scores[i]||0)>=MASTER) n++; return n; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function show(id){
  for (const v of ['view-home','view-level','view-learn','view-quiz','view-result'])
    document.getElementById(v).classList.toggle('hidden', v!==id);
  document.body.classList.toggle('insession', id==='view-learn' || id==='view-quiz');
  window.scrollTo(0,0);
}

// ---------- home ----------
function renderHome(){
  const grid = document.getElementById('levelgrid');
  grid.innerHTML = '';
  for(let l=0;l<LEVELS;l++){
    const m = levelMastery(l);
    const t = document.createElement('button');
    t.className = 'tile' + (m>=1?' done':'');
    const lo = l*LEVEL_SIZE+1, hi = Math.min((l+1)*LEVEL_SIZE, WORDS.length);
    t.setAttribute('aria-label', `Wörter ${lo} bis ${hi}, ${Math.round(m*100)} Prozent gemeistert`);
    t.innerHTML = `<div class="fill" style="height:${Math.round(m*100)}%"></div><span class="lv">${lo}–${hi}</span><span class="pct">${Math.round(m*100)}%</span>`;
    t.addEventListener('click', ()=>openLevel(l));
    grid.appendChild(t);
  }
  const tm = totalMastered();
  document.getElementById('totalfill').style.width = (tm/WORDS.length*100)+'%';
  document.getElementById('totalpct').textContent = Math.round(tm/WORDS.length*100)+'% '+LANGS[lang].ui.mastered;
  document.getElementById('totalwords').textContent = tm+' / '+WORDS.length;
}

// ---------- level ----------
function openLevel(l){
  cur.level = l;
  const lo = l*LEVEL_SIZE+1, hi = Math.min((l+1)*LEVEL_SIZE, WORDS.length);
  const U = LANGS[lang].ui;
  document.getElementById('lvtitle').textContent = U.words+' '+lo+'–'+hi;
  document.getElementById('lvrange').textContent = U.level+' '+(l+1)+' '+U.of+' '+LEVELS;
  document.getElementById('lvfill').style.width = Math.round(levelMastery(l)*100)+'%';
  const wl = document.getElementById('wlist');
  wl.classList.add('hidden');
  document.getElementById('toggle-list').textContent = LANGS[lang].ui.showList;
  wl.innerHTML = levelIndices(l).map(i=>{
    const g = gender(WORDS[i][0]);
    const s = Math.min(scores[i]||0,MASTER);
    const dots = Array.from({length:MASTER},(_,k)=>`<span class="dot${k<s?' on':''}"></span>`).join('');
    const sent = SENTENCES[WORDS[i][0]];
    const exp = sent ? `<div class="wexp hidden"><span class="s-de">${sent[0]}</span><span class="s-en">${sent[1]}</span></div>` : '';
    return `<div class="witem"><button class="wrow" aria-expanded="false"><span class="de ${g?'g-'+g:''}">${WORDS[i][0]}</span><span style="display:flex;align-items:center;gap:10px"><span class="en">${WORDS[i][1]}</span><span class="dots">${dots}</span></span></button>${exp}</div>`;
  }).join('');
  show('view-level');
}

// ---------- learn (flashcards) ----------
function startLearn(){
  const idx = levelIndices(cur.level);
  const weak = idx.filter(i=>(scores[i]||0)<MASTER);
  cur.queue = shuffle(weak.length?weak.slice():idx.slice());
  cur.pos = 0; cur.mode='learn'; cur.lastMode='learn'; cur.correct=0;
  show('view-learn');
  renderCard();
}
function genderLabel(g){ return LANGS[lang].genderLabel(g); }
function sentenceHTML(de){
  const s = SENTENCES[de];
  if (!s) return '';
  return `<span class="s-de">${s[0]}</span><span class="s-en">${s[1]}</span>`;
}
function renderCard(){
  if (cur.pos >= cur.queue.length) return endSession();
  const i = cur.queue[cur.pos], [de,en] = WORDS[i], g = gender(de);
  const deEn = (dir==='de-en');
  const card = document.getElementById('fcard');
  card.classList.remove('flipped');
  // German side gets the gender color; the prompt side in EN→DE stays neutral
  document.getElementById('face-front').className = 'face front' + (deEn && g ? ' f-'+g : '');
  document.getElementById('face-back').className  = 'face back'  + (!deEn && g ? ' f-'+g : '');
  const fArt = document.getElementById('fc-art');
  const fWord = document.getElementById('fc-word');
  const bArt = document.getElementById('fc-back-art');
  const fAns = document.getElementById('fc-answer');
  if (deEn){
    fArt.textContent = g ? genderLabel(g) : '';
    fArt.className = 'art' + (g?' g-'+g:'');
    fWord.textContent = g ? bare(de) : de;
    fWord.className = 'word' + (g?' g-'+g:'');
    bArt.textContent = LANGS[lang].ui.en;
    bArt.className = 'art';
    fAns.textContent = en;
    fAns.className = 'word';
  } else {
    fArt.textContent = LANGS[lang].ui.en;
    fArt.className = 'art';
    fWord.textContent = en;
    fWord.className = 'word';
    bArt.textContent = g ? genderLabel(g) : LANGS[lang].ui.target;
    bArt.className = 'art' + (g?' g-'+g:'');
    fAns.textContent = de;
    fAns.className = 'word' + (g?' g-'+g:'');
  }
  const s = SENTENCES[de];
  if (s){
    if (deEn){
      document.getElementById('fc-front-sent').innerHTML = '<span class="s-de">'+s[0]+'</span>';
      document.getElementById('fc-sent').innerHTML = '<span class="s-en">'+s[1]+'</span>';
    } else {
      document.getElementById('fc-front-sent').innerHTML = '<span class="s-en">'+s[1]+'</span>';
      document.getElementById('fc-sent').innerHTML = '<span class="s-de">'+s[0]+'</span>';
    }
  } else {
    document.getElementById('fc-front-sent').innerHTML = '';
    document.getElementById('fc-sent').innerHTML = '';
  }
  document.getElementById('learn-count').textContent = (cur.pos+1)+' / '+cur.queue.length;
  document.getElementById('learn-level').textContent = LANGS[lang].ui.level+' '+(cur.level+1);
}
function flip(){
  document.getElementById('fcard').classList.toggle('flipped');
}
function answerCard(knew){
  const i = cur.queue[cur.pos];
  const s = scores[i]||0;
  scores[i] = knew ? Math.min(s+1,MASTER) : Math.max(s-1,0);
  if (knew) cur.correct++;
  queueSave();
  cur.pos++;
  renderCard();
}

// ---------- quiz ----------
function startQuiz(){
  const idx = levelIndices(cur.level);
  cur.queue = shuffle(idx.slice()).slice(0,15);
  cur.pos = 0; cur.mode='quiz'; cur.lastMode='quiz'; cur.correct = 0;
  show('view-quiz');
  renderQuestion();
}
function renderQuestion(){
  if (cur.pos >= cur.queue.length) return endSession();
  const i = cur.queue[cur.pos], [de,en] = WORDS[i], g = gender(de);
  const deEn = (dir==='de-en');
  const qa = document.getElementById('q-art'), qw = document.getElementById('q-word');
  if (deEn){
    qa.textContent = g || '';
    qa.className = 'art' + (g?' g-'+g:'');
    qw.textContent = g ? bare(de) : de;
    qw.className = 'word' + (g?' g-'+g:'');
  } else {
    qa.textContent = LANGS[lang].ui.en;
    qa.className = 'art';
    qw.textContent = en;
    qw.className = 'word';
  }
  document.getElementById('quiz-count').textContent = (cur.pos+1)+' / '+cur.queue.length;
  document.getElementById('quiz-score').textContent = cur.correct+' '+LANGS[lang].ui.right;
  // distractors from whole list
  const pool = new Set([i]);
  while (pool.size < 4) pool.add(Math.floor(Math.random()*WORDS.length));
  const options = shuffle([...pool]);
  const box = document.getElementById('opts');
  box.innerHTML = '';
  options.forEach(oi=>{
    const b = document.createElement('button');
    const og = gender(WORDS[oi][0]);
    b.className = 'opt' + (!deEn && og ? ' g-'+og : '');
    b.textContent = deEn ? WORDS[oi][1] : WORDS[oi][0];
    b.dataset.oi = oi;
    b.addEventListener('click', ()=>answerQuiz(b, oi===i, i));
    box.appendChild(b);
  });
  document.getElementById('q-sent').classList.add('hidden');
  document.getElementById('btn-next').classList.add('hidden');
}
function answerQuiz(btn, right, i){
  const buttons = [...document.querySelectorAll('.opt')];
  buttons.forEach(b=>b.disabled = true);
  if (right){
    btn.classList.add('correct');
    cur.correct++;
    scores[i] = Math.min((scores[i]||0)+1, MASTER);
  } else {
    btn.classList.add('wrong');
    const correctBtn = buttons.find(b=>Number(b.dataset.oi)===i);
    if (correctBtn) correctBtn.classList.add('correct');
    scores[i] = Math.max((scores[i]||0)-1, 0);
  }
  queueSave();
  const qs = document.getElementById('q-sent');
  const sh = sentenceHTML(WORDS[i][0]);
  if (sh){ qs.innerHTML = sh; qs.classList.remove('hidden'); }
  document.getElementById('quiz-score').textContent = cur.correct+' '+LANGS[lang].ui.right;
  document.getElementById('btn-next').classList.remove('hidden');
}

// ---------- results ----------
function endSession(){
  saveNow();
  const total = cur.queue.length;
  document.getElementById('res-big').textContent = cur.correct+' / '+total;
  const U = LANGS[lang].ui;
  document.getElementById('res-text').textContent =
    cur.mode==='quiz'
      ? (cur.correct===total ? U.perfectQuiz : U.doneQuiz)
      : (cur.correct===total ? U.perfectLearn : U.doneLearn);
  show('view-result');
}

// ---------- events ----------
document.getElementById('backhome').addEventListener('click', ()=>{ renderHome(); show('view-home'); });
function setDir(d){
  dir = d;
  document.getElementById('dir-de').classList.toggle('active', d==='de-en');
  document.getElementById('dir-en').classList.toggle('active', d==='en-de');
}
document.getElementById('lang-de').addEventListener('click', ()=>setLang('de'));
document.getElementById('lang-fr').addEventListener('click', ()=>setLang('fr'));
document.getElementById('dir-de').addEventListener('click', ()=>setDir('de-en'));
document.getElementById('dir-en').addEventListener('click', ()=>setDir('en-de'));
document.getElementById('btn-learn').addEventListener('click', startLearn);
document.getElementById('btn-quiz').addEventListener('click', startQuiz);
document.getElementById('wlist').addEventListener('click', e=>{
  const row = e.target.closest('.wrow');
  if (!row) return;
  const exp = row.parentElement.querySelector('.wexp');
  if (!exp) return;
  exp.classList.toggle('hidden');
  row.setAttribute('aria-expanded', exp.classList.contains('hidden') ? 'false' : 'true');
});
document.getElementById('toggle-list').addEventListener('click', ()=>{
  const wl = document.getElementById('wlist');
  wl.classList.toggle('hidden');
  document.getElementById('toggle-list').textContent = wl.classList.contains('hidden') ? LANGS[lang].ui.showList : LANGS[lang].ui.hideList;
});
document.getElementById('fcard').addEventListener('click', flip);
document.getElementById('fcard').addEventListener('keydown', e=>{ if(e.key===' '||e.key==='Enter'){e.preventDefault();flip();} });
document.getElementById('btn-yes').addEventListener('click', ()=>answerCard(true));
document.getElementById('btn-no').addEventListener('click', ()=>answerCard(false));
document.getElementById('btn-next').addEventListener('click', ()=>{ cur.pos++; renderQuestion(); });
for (const id of ['back-learn','back-quiz','back-result']){
  document.getElementById(id).addEventListener('click', ()=>{ saveNow(); openLevel(cur.level); });
}
document.getElementById('btn-again').addEventListener('click', ()=>{ cur.lastMode==='quiz' ? startQuiz() : startLearn(); });

(async ()=>{
  try{
    const r = await window.storage.get('wortschatz-lang');
    if (r && r.value && LANGS[r.value]){ lang = r.value; WORDS = LANGS[lang].words; SENTENCES = LANGS[lang].sentences; }
  }catch(e){}
  loadProgress();
})();
</script>
