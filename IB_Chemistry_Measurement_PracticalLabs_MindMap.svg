meter/vernier caliper</text><circle cx="1080.0" cy="711.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="715.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Repeat measurements and calculate a mean with propagated uncertainty</text><circle cx="1080.0" cy="733.0" r="2.6" fill="#2563eb"/><text x="1090.0" y="737.0" font-size="11.8" fill="#1e3a8a" font-family="Arial, sans-serif">Discuss which apparatus limits the overall precision of the result</text><path d="M 1030.0 620.0 C 1065.0 620.0, 1065.0 814.0, 1100.0 814.0" fill="none" stroke="#0d9488" stroke-width="3" stroke-linecap="round" opacity="0.55"/><rect x="1100.0" y="790.0" width="380.0" height="48.0" rx="10" ry="10" fill="#0d9488"/><text x="1290" y="810" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff" font-family="Arial, sans-serif">SIMULATIONS &amp; VIRTUAL LABS</text><text x="1290" y="829" text-anchor="middle" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.85" font-family="Arial, sans-serif">Simulations</text><rect x="1060.0" y="852.0" width="460.0" height="160.0" rx="10" ry="10" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/><circle cx="1080.0" cy="875.0" r="2.6" fill="#0d9488"/><text x="1090.0" y="879.0" font-size="11.8" fill="#134e4a" font-family="Arial, sans-serif">PhET 'Estimation' - build intuition for measurement and precision</text><circle cx="1080.0" cy="897.0" r="2.6" fill="#0d9488"/><text x="1090.0" y="901.0" font-size="11.8" fill="#134e4a" font-family="Arial, sans-serif">Vernier Graphical Analysis - plot, fit and analyse logged sensor data</text><circle cx="1080.0" cy="919.0" r="2.6" fill="#0d9488"/><text x="1090.0" y="923.0" font-size="11.8" fill="#134e4a" font-family="Arial, sans-serif">Desmos / Google Sheets - graphing, best-fit lines and linearization practice</text><circle cx="1080.0" cy="941.0" r="2.6" fill="#0d9488"/><text x="1090.0" y="945.0" font-size="11.8" fill="#134e4a" font-family="Arial, sans-serif">Virtual data-logger simulations for temperature, pH and pressure</text><circle cx="1080.0" cy="963.0" r="2.6" fill="#0d9488"/><text x="1090.0" y="967.0" font-size="11.8" fill="#134e4a" font-family="Arial, sans-serif">Online uncertainty/error-propagation calculators for practice problems</text><circle cx="1080.0" cy="985.0" r="2.6" fill="#0d9488"/><text x="1090.0" y="989.0" font-size="11.8" fill="#134e4a" font-family="Arial, sans-serif">IB IA exemplar datasets for practising graphing and uncertainty analysis</text><rect x="30.0" y="1026.0" width="16.0" height="16.0" rx="4" ry="4" fill="#2563eb"/><text x="54" y="1039" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">Core practicals (SL &amp; HL)</text><rect x="320.0" y="1026.0" width="16.0" height="16.0" rx="4" ry="4" fill="#0d9488"/><text x="344" y="1039" font-size="13" fill="#1e293b" font-family="Arial, sans-serif">Simulations</text><text x="1730" y="1039" text-anchor="end" font-size="11" fill="#94a3b8" font-family="Arial, sans-serif">Standard school-lab &amp; simulation resources for IB Chemistry measurement skills</text></svg>